    function saveRiderEntry() {
      if (!requireEditor()) return;
      const rows = Array.from(document.querySelectorAll("#page-rider-entry .entry-row"));
      state.data.riderTeams.assignments[state.selectedRiderPlayerId] = rows.map((row) => entryFromRiderId(row.querySelector("[data-rider-id]").value));
      saveData();
      showToast("Composition enregistrée.");
      renderApp();
    }

    function renderAbandonChips(canEdit = isEditor()) {
      const ids = state.data.riderTeams?.abandonedRiderIds || [];
      if (!ids.length) return emptyState("Aucun coureur marqué abandon.");
      return ids
        .map((id) => riderById(id))
        .filter(Boolean)
        .sort((a, b) => a.name.localeCompare(b.name, "fr"))
        .map((rider) => {
          const team = teamById(rider.teamId);
          const impacted = allRiderEntries().filter((entry) => entry.rider.riderId === rider.id).length;
          return `
            <article class="shared-card">
              <div class="shared-head">
                <img class="jersey" src="${team.image}" alt="${escapeHtml(team.name)}">
                <div class="rider-main">
                  <div class="rider-name">${escapeHtml(rider.name)}</div>
                  <div class="rider-team">${escapeHtml(team.name)}</div>
                </div>
                <span class="count-pill abandoned">AB</span>
              </div>
              <div class="toolbar" style="margin:0">
                <span class="tag red">${impacted} équipe(s) touchée(s)</span>
                <button class="secondary-btn" type="button" data-remove-abandon="${rider.id}" ${canEdit ? "" : "disabled"}>Retirer</button>
              </div>
            </article>
          `;
        }).join("");
    }

    function addGlobalAbandon() {
      if (!requireEditor()) return;
      const id = document.getElementById("abandonSelect")?.value;
      if (!id) return;
      if (!state.data.riderTeams.abandonedRiderIds.includes(id)) state.data.riderTeams.abandonedRiderIds.push(id);
      saveData();
      showToast("Abandon appliqué à toutes les équipes.");
      renderApp();
    }

    function removeGlobalAbandon(id) {
      if (!requireEditor()) return;
      state.data.riderTeams.abandonedRiderIds = state.data.riderTeams.abandonedRiderIds.filter((item) => item !== id);
      saveData();
      showToast("Abandon retiré.");
      renderApp();
    }

    function resetRiderDemo() {
      if (!requireEditor()) return;
      if (!confirm("Restaurer les compositions fictives des coureurs ?")) return;
      state.data.riderTeams = buildDefaultRiderTeams(state.data.players);
      saveData();
      showToast("Compositions coureurs restaurées.");
      renderApp();
    }

    function renderEntry() {
      const page = document.getElementById("page-entry");
      const canEdit = isEditor();
      const disabled = editorDisabledAttr();
      const activeStage = state.data.stages.find((stage) => stage.id === state.selectedStageId) || state.data.stages[0];
      state.selectedStageId = activeStage.id;
      const completion = stageCompletion(activeStage);
      const completeClass = completion.status === "complete" ? "done" : completion.status === "cancelled" ? "cancelled" : "";
      const statusText = activeStage.cancelled ? "Étape annulée" : completion.count + "/" + completion.total + " joueurs saisis";

      page.innerHTML = `
        ${renderEditorNotice("saisir ou modifier les points")}
        <div class="stage-shell">
          <div class="panel flat">
            <h2 class="panel-title">Étapes <small>Statut saisie</small></h2>
            <div class="stage-list">
              ${state.data.stages.map((stage) => {
                const status = stageCompletion(stage).status;
                return `<button class="stage-button ${stage.id === activeStage.id ? "active" : ""} ${status}" type="button" data-stage="${stage.id}">${escapeHtml(shortStageLabel(stage.name))}</button>`;
              }).join("")}
            </div>
          </div>
          <div class="panel">
            <div class="stage-toolbar">
              <h2 class="panel-title" style="margin:0">${escapeHtml(activeStage.name)} <small>${activeStage.final ? "Saisie finale" : "Saisie étape"}</small></h2>
              <span class="status-pill ${completeClass}">${statusText}</span>
            </div>
            <div class="stage-toolbar">
              <label class="toggle-row">
                <input type="checkbox" id="stageCancelled" ${activeStage.cancelled ? "checked" : ""} ${disabled}>
                Étape annulée
              </label>
              <button class="secondary-btn" type="button" id="clearStage" ${disabled}>${icon("reset")}Vider cette saisie</button>
            </div>
            <div id="entryStageNotice">${renderEntryStageNotice(activeStage)}</div>
            <div class="score-form">
              ${state.data.players.map((player) => `
                <label class="score-input-row ${activeStage.cancelled ? "disabled" : ""}">
                  <span class="player-name">
                    <span class="color-dot" style="background:${player.color}"></span>
                    <span class="name">${escapeHtml(player.name)}</span>
                    ${player.team ? `<span class="tag">${escapeHtml(player.team)}</span>` : ""}
                  </span>
                  <input class="input" type="number" step="1" min="0" inputmode="numeric" data-score-player="${player.id}" value="${Number.isInteger(activeStage.scores[player.id]) ? activeStage.scores[player.id] : ""}" ${activeStage.cancelled || !canEdit ? "disabled" : ""} placeholder="Non saisi">
                </label>
              `).join("")}
            </div>
          </div>
        </div>
      `;

      page.querySelectorAll("[data-stage]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedStageId = button.dataset.stage;
          renderEntry();
        });
      });
      page.querySelectorAll("[data-score-player]").forEach((input) => {
        input.addEventListener("input", () => {
          if (!requireEditor()) return;
          activeStage.scores[input.dataset.scorePlayer] = parseScore(input.value);
          saveData();
          renderSidebarSummary();
          refreshEntryVisuals(activeStage);
        });
      });
      document.getElementById("stageCancelled")?.addEventListener("change", (event) => {
        if (!requireEditor()) return;
        activeStage.cancelled = event.target.checked;
        saveData();
        renderEntry();
      });
      document.getElementById("clearStage")?.addEventListener("click", () => {
        if (!requireEditor()) return;
        if (!confirm("Vider les points de " + activeStage.name + " ?")) return;
        activeStage.cancelled = false;
        for (const player of state.data.players) activeStage.scores[player.id] = null;
        saveData();
        renderEntry();
      });
    }

    function renderEntryStageNotice(stage) {
      const completion = stageCompletion(stage);
      if (stage.cancelled) {
        return `
          <div class="entry-notice cancelled">
            <div class="entry-notice-title">Étape annulée</div>
            <div class="entry-notice-copy">Cette étape est intégrée à 0 point pour tout le monde et ne bloque pas les classements.</div>
          </div>
        `;
      }
      if (completion.status === "complete") {
        return `
          <div class="entry-notice done">
            <div class="entry-notice-title">Étape complète</div>
            <div class="entry-notice-copy">Tous les joueurs sont saisis : cette étape est intégrée aux classements, graphiques, prix et records.</div>
          </div>
        `;
      }
      const missing = completion.total - completion.count;
      return `
        <div class="entry-notice">
          <div class="entry-notice-title">Étape incomplète</div>
          <div class="entry-notice-copy">Il manque ${missing} joueur${missing > 1 ? "s" : ""}. Cette étape est ignorée dans les classements, graphiques, prix et records tant qu’elle n’est pas complète.</div>
        </div>
      `;
    }

    function refreshEntryVisuals(stage) {
      const completion = stageCompletion(stage);
      const status = document.querySelector(".status-pill");
      if (status) {
        status.classList.toggle("done", completion.status === "complete");
        status.classList.toggle("cancelled", completion.status === "cancelled");
        status.textContent = stage.cancelled ? "Étape annulée" : completion.count + "/" + completion.total + " joueurs saisis";
      }
      const notice = document.getElementById("entryStageNotice");
      if (notice) notice.innerHTML = renderEntryStageNotice(stage);
      document.querySelectorAll("[data-stage]").forEach((button) => {
        const buttonStage = state.data.stages.find((item) => item.id === button.dataset.stage);
        const buttonStatus = stageCompletion(buttonStage).status;
        button.classList.remove("complete", "partial", "cancelled", "empty");
        button.classList.add(buttonStatus);
      });
    }

    function renderSettings() {
      const page = document.getElementById("page-settings");
      const disabled = editorDisabledAttr();
      const importLabelClass = isEditor() ? "" : " disabled-label";
      page.innerHTML = `
        ${renderEditorNotice("modifier les joueurs, les règles ou les données")}
        <div class="grid two">
          <div class="panel">
            <h2 class="panel-title">Joueurs <small>Ajout, modification, suppression</small></h2>
            <div class="settings-grid">
              ${state.data.players.map((player) => `
                <div class="settings-row" data-settings-player="${player.id}">
                  <input class="input" type="text" value="${escapeAttr(player.name)}" data-player-name="${player.id}" aria-label="Nom" ${disabled}>
                  <input class="input" type="text" value="${escapeAttr(player.team)}" data-player-team="${player.id}" placeholder="Équipe ou vide" aria-label="Équipe" ${disabled}>
                  <label class="toggle-row"><input type="checkbox" data-player-white="${player.id}" ${player.whiteEligible ? "checked" : ""} ${disabled}> Blanc</label>
                  <input class="input" type="color" value="${escapeAttr(player.color)}" data-player-color="${player.id}" aria-label="Couleur" ${disabled}>
                  <button class="icon-button danger" type="button" data-delete-player="${player.id}" title="Supprimer" ${disabled}>${icon("trash")}</button>
                </div>
              `).join("")}
            </div>
            <div class="action-row" style="margin-top:14px">
              <input class="input" type="text" id="newPlayerName" placeholder="Nouveau joueur" ${disabled}>
              <input class="input" type="text" id="newPlayerTeam" placeholder="Équipe" ${disabled}>
              <label class="toggle-row"><input type="checkbox" id="newPlayerWhite" ${disabled}> Blanc</label>
              <button class="primary-btn" type="button" id="addPlayer" ${disabled}>${icon("plus")}Ajouter</button>
            </div>
          </div>
          <div class="panel">
            <h2 class="panel-title">Connexion cloud <small>Supabase</small></h2>
            <div id="cloudPanel">${renderCloudPanel()}</div>
          </div>
          <div class="panel">
            <h2 class="panel-title">Données <small>Cloud + sauvegarde locale</small></h2>
            <div class="action-row">
              <button class="secondary-btn" type="button" id="exportJson">${icon("download")}Exporter JSON</button>
              <label class="secondary-btn${importLabelClass}" for="importJson">${icon("upload")}Importer JSON</label>
              <input class="sr-only" type="file" id="importJson" accept="application/json,.json" ${disabled}>
            </div>
            <div class="action-row" style="margin-top:12px">
              <button class="secondary-btn" type="button" id="restoreDemo" ${disabled}>${icon("reset")}Restaurer démo</button>
              <button class="danger-btn" type="button" id="emptyScores" ${disabled}>${icon("trash")}Vider tous les scores</button>
            </div>
            <p class="subtitle" style="margin-top:14px">Les données sont sauvegardées dans Supabase quand tu es connecté. Une copie locale reste dans ce navigateur pour servir de cache et de secours.</p>
          </div>
        </div>
        <div class="panel">
          <h2 class="panel-title">Règles des maillots <small>Étapes comptabilisées</small></h2>
          <div class="rules-grid">
            ${renderRuleBox("Maillot Cyclamen", "cyclamenStages", "Maillot Cyclamen.png")}
            ${renderRuleBox("Maillot Bleu", "blueStages", "Maillot Bleu.png")}
          </div>
        </div>
      `;

      page.querySelectorAll("[data-player-name]").forEach((input) => input.addEventListener("change", () => updatePlayer(input.dataset.playerName, { name: input.value.trim() || "Joueur" })));
      page.querySelectorAll("[data-player-team]").forEach((input) => input.addEventListener("change", () => updatePlayer(input.dataset.playerTeam, { team: input.value.trim().toUpperCase() })));
      page.querySelectorAll("[data-player-white]").forEach((input) => input.addEventListener("change", () => updatePlayer(input.dataset.playerWhite, { whiteEligible: input.checked })));
      page.querySelectorAll("[data-player-color]").forEach((input) => input.addEventListener("change", () => updatePlayer(input.dataset.playerColor, { color: input.value })));
      page.querySelectorAll("[data-delete-player]").forEach((button) => button.addEventListener("click", () => deletePlayer(button.dataset.deletePlayer)));
      document.getElementById("addPlayer")?.addEventListener("click", addPlayer);
      document.getElementById("exportJson")?.addEventListener("click", exportJson);
      document.getElementById("importJson")?.addEventListener("change", importJson);
      document.getElementById("restoreDemo")?.addEventListener("click", restoreDemo);
      document.getElementById("emptyScores")?.addEventListener("click", emptyScores);
      bindCloudPanelEvents();
      page.querySelectorAll("[data-rule-stage]").forEach((input) => {
        input.disabled = !isEditor();
        input.addEventListener("change", () => {
          if (!requireEditor()) return;
          const key = input.dataset.ruleKey;
          const number = Number(input.dataset.ruleStage);
          const set = new Set(state.data.rules[key]);
          if (input.checked) set.add(number);
          else set.delete(number);
          state.data.rules[key] = Array.from(set).sort((a, b) => a - b);
          saveData();
          renderSettings();
        });
      });
    }

    function renderCloudPanel() {
      const userEmail = state.supabaseUser?.email || "";
      const statusClass = state.syncStatus === "saved" ? "done" : state.syncStatus === "saving" ? "saving" : state.syncStatus === "error" ? "error" : "local";
      if (userEmail) {
        return `
          <div class="settings-grid">
            <span class="status-pill ${statusClass}">${escapeHtml(state.syncMessage)}</span>
            <p class="subtitle">Connecté avec <strong>${escapeHtml(userEmail)}</strong>. Les modifications sont envoyées automatiquement vers Supabase.</p>
            <div class="action-row">
              <button class="primary-btn" type="button" id="saveCloudNow">${icon("upload")}Sauvegarder maintenant</button>
              <button class="secondary-btn" type="button" id="reloadCloud">${icon("download")}Recharger le cloud</button>
              <button class="secondary-btn" type="button" id="signOutCloud">Déconnexion</button>
            </div>
          </div>
        `;
      }
      return `
        <div class="settings-grid">
          <span class="status-pill ${statusClass}">${escapeHtml(state.syncMessage)}</span>
          <p class="subtitle">Connecte-toi avec l’email autorisé dans Supabase pour que les saisies soient enregistrées en ligne. Si le lien magique ne connecte pas automatiquement, utilise le code reçu par email.</p>
          <div class="action-row">
            <input class="input" type="email" id="cloudEmail" placeholder="email autorisé" value="${escapeAttr(state.pendingEmail)}">
            <button class="primary-btn" type="button" id="sendMagicLink">Envoyer le lien</button>
            <button class="secondary-btn" type="button" id="reloadCloud">${icon("download")}Recharger</button>
          </div>
          <div class="action-row">
            <input class="input" type="text" id="cloudOtp" placeholder="code à 6 chiffres" inputmode="numeric" autocomplete="one-time-code">
            <button class="primary-btn" type="button" id="verifyOtpCode">Valider le code</button>
          </div>
          <div class="action-row">
            <input class="input" type="password" id="cloudPassword" placeholder="mot de passe Supabase" autocomplete="current-password">
            <button class="secondary-btn" type="button" id="signInPassword">Connexion mot de passe</button>
          </div>
        </div>
      `;
    }

    function renderCloudPanelOnly() {
      const panel = document.getElementById("cloudPanel");
      if (!panel) return;
      panel.innerHTML = renderCloudPanel();
      bindCloudPanelEvents();
    }

    function bindCloudPanelEvents() {
      document.getElementById("sendMagicLink")?.addEventListener("click", sendMagicLink);
      document.getElementById("verifyOtpCode")?.addEventListener("click", verifyOtpCode);
      document.getElementById("signInPassword")?.addEventListener("click", signInWithPassword);
      document.getElementById("signOutCloud")?.addEventListener("click", signOutCloud);
      document.getElementById("reloadCloud")?.addEventListener("click", loadCloudData);
      document.getElementById("saveCloudNow")?.addEventListener("click", () => queueCloudSave(true));
    }

    async function sendMagicLink() {
      if (!state.supabaseClient) {
        showToast("Supabase n’est pas chargé.");
        return;
      }
      const input = document.getElementById("cloudEmail");
      const email = input?.value.trim();
      if (!email) {
        showToast("Ajoute ton email.");
        return;
      }
      state.pendingEmail = email;
      setSyncStatus("saving", "Envoi du lien");
      const redirectTo = getAuthRedirectUrl();
      const { error } = await state.supabaseClient.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: redirectTo }
      });
      if (error) {
        console.error(error);
        const message = error.message || "Lien non envoyé";
        setSyncStatus("error", message);
        showToast(message);
        return;
      }
      setSyncStatus("local", "Lien envoyé par email");
      showToast("Lien de connexion envoyé.");
    }

    function getAuthRedirectUrl() {
      const url = new URL(window.location.href);
      url.search = "";
      url.hash = "";
      return url.toString();
    }

    async function verifyOtpCode() {
      if (!state.supabaseClient) {
        showToast("Supabase n’est pas chargé.");
        return;
      }
      const email = document.getElementById("cloudEmail")?.value.trim();
      const token = document.getElementById("cloudOtp")?.value.trim();
      if (!email || !token) {
        showToast("Ajoute l’email et le code reçu.");
        return;
      }
      state.pendingEmail = email;
      setSyncStatus("saving", "Vérification du code");
      const { data, error } = await state.supabaseClient.auth.verifyOtp({
        email,
        token,
        type: "email"
      });
      if (error) {
        console.error(error);
        setSyncStatus("error", "Code refusé");
        showToast("Code refusé ou expiré.");
        return;
      }
      state.supabaseUser = data?.user || data?.session?.user || null;
      setSyncStatus("saved", "Connecté au cloud");
      showToast("Connexion réussie.");
      renderApp();
      queueCloudSave(true);
    }

    async function signInWithPassword() {
      if (!state.supabaseClient) {
        showToast("Supabase n’est pas chargé.");
        return;
      }
      const email = document.getElementById("cloudEmail")?.value.trim();
      const password = document.getElementById("cloudPassword")?.value;
      if (!email || !password) {
        showToast("Ajoute l’email et le mot de passe.");
        return;
      }
      state.pendingEmail = email;
      setSyncStatus("saving", "Connexion en cours");
      const { data, error } = await state.supabaseClient.auth.signInWithPassword({
        email,
        password
      });
      if (error) {
        console.error(error);
        const message = error.message || "Connexion refusée";
        setSyncStatus("error", message);
        showToast(message);
        return;
      }
      state.supabaseUser = data?.user || null;
      setSyncStatus("saved", "Connecté au cloud");
      showToast("Connexion réussie.");
      renderApp();
      queueCloudSave(true);
    }

    async function signOutCloud() {
      if (!state.supabaseClient) return;
      await state.supabaseClient.auth.signOut();
      state.supabaseUser = null;
      setSyncStatus("local", "Déconnecté du cloud");
      renderApp();
    }

    function syncShortLabel() {
      if (state.syncStatus === "saved") return state.supabaseUser ? "Sauvegardé" : "Cloud lu";
      if (state.syncStatus === "saving") return "En cours";
      if (state.syncStatus === "error") return "Erreur";
      return state.supabaseUser ? "Connecté" : "Local";
    }

    function renderRuleBox(title, key, image) {
      const selected = new Set(state.data.rules[key]);
      return `
        <div class="rule-box">
          <div class="jersey-head">
            <img src="${image}" alt="${escapeHtml(title)}" style="width:48px;height:48px;object-fit:contain">
            <div>
              <div class="jersey-title">${escapeHtml(title)}</div>
              <div class="muted">${selected.size} étapes sélectionnées</div>
            </div>
          </div>
          <div class="stage-checkboxes">
            ${Array.from({ length: 21 }, (_, index) => index + 1).map((number) => `
              <label class="check-pill">
                <input type="checkbox" data-rule-key="${key}" data-rule-stage="${number}" ${selected.has(number) ? "checked" : ""}>
                E${number}
              </label>
            `).join("")}
          </div>
        </div>
      `;
    }

    function updatePlayer(playerId, patch) {
      if (!requireEditor()) return;
      const player = getPlayer(playerId);
      if (!player) return;
      Object.assign(player, patch);
      saveData();
      showToast("Joueur mis à jour.");
      renderApp();
    }

    function addPlayer() {
      if (!requireEditor()) return;
      const nameInput = document.getElementById("newPlayerName");
      const teamInput = document.getElementById("newPlayerTeam");
      const whiteInput = document.getElementById("newPlayerWhite");
      const name = nameInput.value.trim();
      if (!name) {
        showToast("Ajoute un nom de joueur.");
        return;
      }
      const id = uniqueId(name, new Set(state.data.players.map((player) => player.id)));
      const player = {
        id,
        name,
        team: teamInput.value.trim().toUpperCase(),
        whiteEligible: whiteInput.checked,
        color: PLAYER_COLORS[state.data.players.length % PLAYER_COLORS.length]
      };
      state.data.players.push(player);
      for (const stage of state.data.stages) stage.scores[id] = null;
      if (!state.data.riderTeams) state.data.riderTeams = buildDefaultRiderTeams(state.data.players);
      if (!state.data.riderTeams.assignments) state.data.riderTeams.assignments = {};
      state.data.riderTeams.assignments[id] = demoRiderEntriesForIndex(state.data.players.length - 1);
      state.selectedPlayers.add(id);
      saveData();
      showToast("Joueur ajouté.");
      renderApp();
    }

    function deletePlayer(playerId) {
      if (!requireEditor()) return;
      const player = getPlayer(playerId);
      if (!player) return;
      if (state.data.players.length <= 1) {
        showToast("Il faut garder au moins un joueur.");
        return;
      }
      if (!confirm("Supprimer définitivement " + player.name + " et tous ses scores ?")) return;
      state.data.players = state.data.players.filter((item) => item.id !== playerId);
      for (const stage of state.data.stages) delete stage.scores[playerId];
      if (state.data.riderTeams?.assignments) delete state.data.riderTeams.assignments[playerId];
      state.selectedPlayers.delete(playerId);
      if (state.selectedDetailPlayerId === playerId) state.selectedDetailPlayerId = state.data.players[0]?.id || null;
      if (state.selectedRiderPlayerId === playerId) state.selectedRiderPlayerId = state.data.players[0]?.id || null;
      saveData();
      showToast("Joueur supprimé.");
      renderApp();
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(state.data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "fantasy-giro-2026.json";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showToast("Export JSON lancé.");
    }

    function importJson(event) {
      if (!requireEditor()) {
        event.target.value = "";
        return;
      }
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          state.data = normalizeData(JSON.parse(reader.result));
          state.selectedPlayers = new Set(state.data.players.map((player) => player.id));
          state.selectedDetailPlayerId = state.data.players[0]?.id || null;
          state.selectedRiderPlayerId = state.data.players[0]?.id || null;
          saveData();
          showToast("Import terminé.");
          renderApp();
        } catch (error) {
          console.error(error);
          showToast("Import impossible : JSON invalide.");
        }
      };
      reader.readAsText(file);
      event.target.value = "";
    }

    function restoreDemo() {
      if (!requireEditor()) return;
      if (!confirm("Restaurer les données fictives initiales ?")) return;
      state.data = createDemoData();
      state.selectedPlayers = new Set(state.data.players.map((player) => player.id));
      state.selectedStageId = "s1";
      state.selectedDetailPlayerId = state.data.players[0]?.id || null;
      state.selectedRiderPlayerId = state.data.players[0]?.id || null;
      saveData();
      showToast("Données démo restaurées.");
      renderApp();
    }

    function emptyScores() {
      if (!requireEditor()) return;
      if (!confirm("Vider tous les scores et conserver les joueurs/règles ?")) return;
      for (const stage of state.data.stages) {
        stage.cancelled = false;
        for (const player of state.data.players) stage.scores[player.id] = null;
      }
      saveData();
      showToast("Scores vidés.");
      renderApp();
    }

    function emptyState(text) {
      return `<div class="empty-state">${escapeHtml(text)}</div>`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    let toastTimer = null;
    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function bootstrap() {
      state.data = loadData();
      state.selectedPlayers = new Set(state.data.players.map((player) => player.id));
      state.selectedDetailPlayerId = state.data.players[0]?.id || null;
      saveData({ localOnly: true });
      renderApp();
      initSupabase();
    }

    bootstrap();
  </script>
</body>
</html>
