<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Fantasy Giro 2026</title>
  <style>
    :root {
      --pink: #e83d8a;
      --pink-dark: #b91c68;
      --pink-soft: #fde7f1;
      --cyclamen: #9b1b72;
      --blue: #1368a8;
      --blue-soft: #e5f2fb;
      --white: #ffffff;
      --paper: #f7f4f0;
      --ink: #121116;
      --muted: #6f6870;
      --line: #e8e0de;
      --green: #258b66;
      --green-soft: #e7f5ef;
      --gold: #d39b2a;
      --red: #c23939;
      --red-soft: #fff1f1;
      --shadow: 0 18px 48px rgba(39, 29, 36, 0.10);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(232, 61, 138, 0.10), rgba(255, 255, 255, 0) 280px),
        var(--paper);
      min-height: 100vh;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: 278px minmax(0, 1fr);
      min-height: 100vh;
      width: 100%;
    }

    .sidebar {
      position: sticky;
      top: 0;
      align-self: start;
      height: 100vh;
      width: 100%;
      min-width: 0;
      padding: 22px 16px;
      background: rgba(255, 255, 255, 0.92);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      gap: 18px;
      z-index: 10;
    }

    .brand {
      display: grid;
      grid-template-columns: 58px 1fr;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-width: 0;
      min-height: 68px;
      padding: 8px 8px 14px;
      border-bottom: 1px solid var(--line);
    }

    .brand-logo {
      width: 58px;
      height: 58px;
      object-fit: contain;
    }

    .brand-kicker {
      color: var(--pink-dark);
      text-transform: uppercase;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .brand-title {
      font-weight: 900;
      font-size: 19px;
      line-height: 1.04;
      overflow-wrap: anywhere;
    }

    .nav {
      display: grid;
      gap: 10px;
      width: 100%;
      min-width: 0;
    }

    .nav-section {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .nav-section-title {
      padding: 5px 12px 0;
      color: var(--pink-dark);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .nav-subnav {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .nav-subnav .nav-button {
      min-height: 38px;
      padding-left: 18px;
      font-size: 13px;
    }

    .nav-button {
      display: grid;
      grid-template-columns: 24px 1fr;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      color: #383038;
      background: transparent;
      border-radius: var(--radius);
      text-align: left;
      font-weight: 800;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .nav-button:hover {
      background: #f5eef1;
      transform: translateX(2px);
    }

    .nav-button.active {
      background: var(--pink);
      color: white;
      box-shadow: 0 12px 26px rgba(232, 61, 138, 0.24);
    }

    .nav-icon {
      width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px;
      background: #fff8fb;
      border: 1px solid #f2d5e1;
      border-radius: var(--radius);
      display: grid;
      gap: 8px;
    }

    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .footer-value {
      color: var(--ink);
      font-size: 15px;
      letter-spacing: 0;
      text-transform: none;
    }

    .main {
      min-width: 0;
      padding: 28px clamp(18px, 3vw, 42px) 42px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 26px;
    }

    .title-block {
      display: grid;
      gap: 7px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--pink-dark);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .eyebrow::before {
      content: "";
      width: 30px;
      height: 3px;
      background: var(--pink);
      border-radius: 99px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 56px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      max-width: 820px;
      line-height: 1.5;
      font-size: 15px;
    }

    .top-logo {
      width: clamp(96px, 14vw, 156px);
      max-height: 110px;
      object-fit: contain;
      filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.10));
    }

    .page {
      display: none;
      animation: pageIn 180ms ease;
    }

    .page.active {
      display: grid;
      gap: 22px;
    }

    .history-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: -8px 0 22px;
    }

    .history-item {
      min-width: 0;
      padding: 11px 12px;
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 10px 26px rgba(39, 29, 36, 0.06);
    }

    .history-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .history-value {
      font-size: 15px;
      font-weight: 900;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .grid.two {
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .panel {
      background: rgba(255, 255, 255, 0.90);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      min-width: 0;
    }

    .panel.flat {
      box-shadow: none;
    }

    .editorial-band {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 18px;
      padding: 18px;
      background:
        linear-gradient(135deg, rgba(232, 61, 138, 0.14), rgba(255, 255, 255, 0.86)),
        white;
      border: 1px solid #f2cdda;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .editorial-title {
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 6px;
    }

    .editorial-note {
      color: var(--muted);
      line-height: 1.45;
      margin: 0;
    }

    .editorial-kpi {
      display: grid;
      justify-items: end;
      gap: 4px;
      font-weight: 900;
      color: var(--pink-dark);
      text-align: right;
    }

    .panel-title {
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 18px;
      line-height: 1.1;
    }

    .panel-title small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      min-height: 92px;
      display: grid;
      align-content: space-between;
      gap: 8px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .metric-value {
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
    }

    .metric-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .ranking-list {
      display: grid;
      gap: 10px;
    }

    .ranking-row {
      display: grid;
      grid-template-columns: 52px minmax(170px, 0.82fr) minmax(200px, 1.4fr) minmax(230px, 0.62fr);
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .rank-badge {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: white;
      background: #302b2f;
      font-weight: 900;
      position: relative;
      flex: 0 0 auto;
    }

    .rank-badge.gold {
      background: linear-gradient(135deg, #f4c35b, #b97917);
    }

    .rank-badge.silver {
      background: linear-gradient(135deg, #dedede, #8d969c);
    }

    .rank-badge.bronze {
      background: linear-gradient(135deg, #d99b5f, #945228);
    }

    .player-cell {
      min-width: 0;
    }

    .player-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
      min-width: 0;
    }

    .player-name span.name {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .color-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex: 0 0 auto;
      border: 2px solid white;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.14);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 5px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 22px;
      padding: 4px 7px;
      border-radius: 99px;
      background: #f4eff1;
      color: #574e55;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .tag.pink {
      color: var(--pink-dark);
      background: var(--pink-soft);
    }

    .tag.blue {
      color: var(--blue);
      background: var(--blue-soft);
    }

    .tag.green {
      color: var(--green);
      background: var(--green-soft);
    }

    .tag.red {
      color: var(--red);
      background: var(--red-soft);
    }

    .bar-track {
      height: 14px;
      background: #f0e8e6;
      border-radius: 99px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      min-width: 5px;
      height: 100%;
      border-radius: 99px;
      background: var(--pink);
    }

    .score-cell {
      display: grid;
      justify-items: end;
      gap: 8px;
      text-align: right;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.25;
    }

    .score-main {
      color: var(--ink);
      font-weight: 900;
      font-size: 21px;
      line-height: 1;
    }

    .gap-list {
      display: grid;
      gap: 3px;
      width: 100%;
      min-width: 180px;
    }

    .gap-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      border-radius: var(--radius);
      background: transparent;
      border: 0;
    }

    .gap-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
      text-align: left;
      white-space: normal;
    }

    .gap-value {
      color: #5f545b;
      font-size: 12px;
      font-weight: 400;
    }

    .tie-pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 4px 7px;
      border-radius: 99px;
      background: #fff4e1;
      color: #9f6610;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .movement {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 24px;
      padding: 0 8px;
      border-radius: 99px;
      background: #f0e8e6;
      color: #53484f;
      font-size: 12px;
      font-weight: 900;
    }

    .movement.up {
      background: var(--green-soft);
      color: var(--green);
    }

    .movement.down {
      background: #fff1f1;
      color: #c23939;
    }

    .leader-strip {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 16px;
      align-items: center;
      padding: 16px;
      background:
        linear-gradient(135deg, rgba(232, 61, 138, 0.16), rgba(255, 255, 255, 0.86)),
        white;
      border: 1px solid #f2cdda;
      border-radius: var(--radius);
    }

    .leader-strip img {
      width: 86px;
      height: 86px;
      object-fit: contain;
    }

    .leader-name {
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
    }

    .leader-copy {
      color: var(--muted);
      line-height: 1.4;
      margin: 0;
    }

    .chart-wrap {
      width: 100%;
      min-height: 360px;
      overflow: hidden;
    }

    .chart-svg {
      width: 100%;
      height: 360px;
      display: block;
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .wide-chart-panel {
      padding-left: 0;
      padding-right: 0;
      overflow: hidden;
    }

    .wide-chart-panel .panel-title,
    .wide-chart-panel .legend {
      padding-left: 18px;
      padding-right: 18px;
    }

    .wide-chart-panel .chart-svg {
      border-left: 0;
      border-right: 0;
      border-radius: 0;
    }

    .chart-grid {
      stroke: #eee4e2;
      stroke-width: 1;
    }

    .chart-axis {
      stroke: #cfc4c1;
      stroke-width: 1.4;
    }

    .chart-label {
      fill: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .line-path {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chart-point {
      stroke: white;
      stroke-width: 2;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 8px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 99px;
      font-size: 12px;
      font-weight: 800;
    }

    .filter-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .check-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 99px;
      border: 1px solid var(--line);
      background: white;
      font-size: 13px;
      font-weight: 800;
      user-select: none;
    }

    .check-pill input {
      accent-color: var(--pink);
    }

    .jersey-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .jersey-grid.awards-v2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .jersey-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      display: grid;
      gap: 14px;
      min-width: 0;
    }

    .jersey-head {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }

    .jersey-card img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .jersey-card.award-card {
      background:
        linear-gradient(135deg, rgba(232, 61, 138, 0.10), rgba(255, 255, 255, 0.72)),
        white;
    }

    .award-hero {
      display: grid;
      grid-template-columns: 92px minmax(0, 1fr);
      align-items: center;
      gap: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f1e9e7;
    }

    .award-hero img {
      width: 92px;
      height: 92px;
    }

    .award-score {
      color: var(--pink-dark);
      font-size: 18px;
      font-weight: 900;
      margin-top: 5px;
    }

    .jersey-title {
      font-size: 12px;
      color: var(--muted);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .jersey-leader {
      font-size: 20px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .mini-ranking {
      display: grid;
      gap: 7px;
    }

    .mini-row {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 7px 0;
      border-top: 1px solid #f1e9e7;
      font-size: 13px;
    }

    .mini-row.tied {
      background: #fffaf0;
      margin-left: -6px;
      margin-right: -6px;
      padding-left: 6px;
      padding-right: 6px;
      border-radius: var(--radius);
    }

    .mini-rank {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: white;
      background: #3e383c;
      font-size: 12px;
      font-weight: 900;
    }

    .mini-rank.gold {
      background: linear-gradient(135deg, #f4c35b, #b97917);
    }

    .mini-rank.silver {
      background: linear-gradient(135deg, #dedede, #8d969c);
    }

    .mini-rank.bronze {
      background: linear-gradient(135deg, #d99b5f, #945228);
    }

    .mini-rank.tied {
      box-shadow: 0 0 0 3px rgba(211, 155, 42, 0.18);
    }

    .mini-name {
      font-weight: 900;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .mini-score {
      color: var(--muted);
      font-weight: 900;
    }

    .record-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .record-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 15px;
    }

    .record-title {
      display: flex;
      align-items: center;
      gap: 9px;
      margin: 0 0 12px;
      font-size: 17px;
    }

    .medal-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      background: var(--gold);
      flex: 0 0 auto;
    }

    .medal-icon.blue {
      background: var(--blue);
    }

    .medal-icon.dark {
      background: #343036;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 820px;
      background: white;
    }

    th,
    td {
      padding: 10px 10px;
      border-bottom: 1px solid #efe7e5;
      border-right: 1px solid #f3ecea;
      vertical-align: middle;
      text-align: right;
      white-space: nowrap;
      font-size: 13px;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #fff9fb;
      color: #5f545b;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    td:first-child,
    th:first-child {
      position: sticky;
      left: 0;
      z-index: 3;
      text-align: left;
      background: white;
      font-weight: 900;
      min-width: 160px;
      box-shadow: 1px 0 0 #efe7e5;
    }

    th:first-child {
      background: #fff9fb;
      z-index: 4;
    }

    .muted {
      color: var(--muted);
    }

    .detail-selector {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;

    function createDemoData() {

        id: "s" + (index + 1),

      }));

      stages.push({

        final: true,

      });

        Quentin: { base: 355, sprint: 34, climb: 18, final: 1250 },

        Émilien: { base: 318, sprint: 20, climb: 22, final: 880 },

      };

      const sprintStages = new Set([1, 2, 6, 12, 13, 15, 18, 21]);
      const climbStages = new Set([7, 9, 14, 16, 19, 20]);

      for (const stage of stages) {
        for (const [playerIndex, player] of players.entries()) {
          const profile = profiles[player.name];
          if (stage.final) {
            stage.scores[player.id] = profile.final + ((playerIndex % 4) * 35) + wave(playerIndex, 22, 120);
            continue;
          }
          let score = profile.base + wave(playerIndex, stage.number, 115);
          score += sprintStages.has(stage.number) ? profile.sprint * 3 : 0;
          score += climbStages.has(stage.number) ? profile.climb * 3 : 0;
          score += stage.number % 5 === playerIndex % 5 ? 120 : 0;
          score += stage.number % 7 === (playerIndex + 2) % 7 ? -80 : 0;
          stage.scores[player.id] = Math.max(55, Math.round(score));
        }
      }

      return {

        raceName: "Fantasy Giro 2026",
        players,
        stages,

    function wave(playerIndex, stageNumber, amplitude) {
      const value = Math.sin((playerIndex + 1) * 1.73 + stageNumber * 0.82) + Math.cos((playerIndex + 2) * 0.91 - stageNumber * 0.41);
      return Math.round(value * amplitude * 0.5);

    function slugify(value) {
      return value
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || "joueur";

    function uniqueId(base, existingIds) {
      let id = slugify(base);
      let suffix = 2;
      while (existingIds.has(id)) {
        id = slugify(base) + "-" + suffix;
        suffix += 1;
      }
      return id;
    }

    function parseStartlist(rawText) {
      const riderRegex = /^(\d{1,3})\.\s*(.+)$/;
      const teamRegex = /^(\d{1,2})\s+(.+)$/;
      const teams = [];
      let currentTeam = null;

      for (const rawLine of rawText.split(/\n/)) {
        const line = rawLine.trim();
        if (!line) continue;
        if (line.startsWith("procyclingstats.com") || line.startsWith("08/05/") || line.startsWith("DS:")) continue;

        const riderMatch = line.match(riderRegex);
        if (riderMatch && currentTeam) {
          currentTeam.riders.push({
            bib: riderMatch[1],
            name: formatRiderName(riderMatch[2])
          });
          continue;
        }

        const teamMatch = line.match(teamRegex);
        if (teamMatch && !riderMatch) {
          currentTeam = {
            number: teamMatch[1],
            name: teamMatch[2].trim(),
            riders: []
          };
          teams.push(currentTeam);
          continue;
        }

        if (currentTeam && !currentTeam.riders.length) {
          currentTeam.name = (currentTeam.name + " " + line).replace(/\s+/g, " ").trim();
        }
      }

      return teams.flatMap((team) => {
        const teamId = TEAM_NAME_TO_ID[team.name] || guessTeamId(team.name);
        return team.riders.map((rider) => ({
          id: "bib-" + rider.bib,
          bib: rider.bib,
          name: rider.name,
          sortName: riderSortName(rider.name),
          teamId,
          teamName: team.name
        }));
      }).sort((a, b) => a.sortName.localeCompare(b.sortName, "fr"));
    }

    function formatRiderName(value) {
      const smallWords = new Set(["DE", "DEL", "DELLA", "DI", "DA", "DOS", "VAN", "VAN DER", "VAN DEN", "VON", "LA", "LE"]);
      const parts = value.trim().split(/\s+/);
      const surname = [];
      const given = [];
      for (const part of parts) {
        if (/^[A-ZÀ-ÖØ-Þ'’-]+$/.test(part) || smallWords.has(part)) surname.push(titleCase(part));
        else given.push(titleCase(part));
      }
      if (!given.length) return parts.map(titleCase).join(" ");
      return `${given.join(" ")} ${surname.join(" ")}`.replace(/\s+/g, " ").trim();
    }

    function titleCase(value) {
      return value
        .toLowerCase()
        .split(/([-'’])/)
        .map((part) => part === "-" || part === "'" || part === "’" ? part : part.charAt(0).toUpperCase() + part.slice(1))
        .join("");
    }

    function riderSortName(name) {
      const parts = name.trim().split(/\s+/);
      if (parts.length < 2) return name;
      return `${parts[parts.length - 1]} ${parts.slice(0, -1).join(" ")}`;
    }

    function guessTeamId(teamName) {
      const normalized = teamName.toLowerCase();
      const found = TEAMS.find((team) => normalized.includes(team.name.toLowerCase().split(" ")[0]));
      return found ? found.id : TEAMS[0].id;
    }

    function riderById(id) {
      return RIDERS.find((rider) => rider.id === id) || null;
    }

    function buildDefaultRiderTeams(players) {
      return {
        assignments: buildDemoRiderAssignments(players),
        abandonedRiderIds: ["bib-128", "bib-165", "bib-187"].filter((id) => riderById(id))
      };
    }

    function buildDemoRiderAssignments(players) {
      const assignments = {};
      players.forEach((player, index) => {
        assignments[player.id] = demoRiderEntriesForIndex(index);
      });
      return assignments;
    }

    function demoRiderEntriesForIndex(playerIndex) {
      const anchors = ["bib-171", "bib-65", "bib-91", "bib-121", "bib-1", "bib-191", "bib-61", "bib-195"];
      const riderIds = RIDERS.map((rider) => rider.id);
      const used = new Set();
      const picks = [];
      const anchorA = anchors[playerIndex % anchors.length];
      const anchorB = anchors[(playerIndex + 3) % anchors.length];

      for (const id of [anchorA, anchorB]) {
        if (riderById(id) && !used.has(id)) {
          picks.push(entryFromRiderId(id));
          used.add(id);
        }
      }

      let cursor = playerIndex * 11;
      while (picks.length < 9 && riderIds.length) {
        const id = riderIds[cursor % riderIds.length];
        cursor += 13;
        if (used.has(id)) continue;
        picks.push(entryFromRiderId(id));
        used.add(id);
      }

      return picks;
    }

    function entryFromRiderId(id) {
      const rider = riderById(id) || RIDERS[0];
      return {
        riderId: rider?.id || "",
        name: rider?.name || "",
        teamId: rider?.teamId || TEAMS[0].id
      };
    }

    function normalizeRiderTeams(value, players, fallback) {
      const safeValue = value && typeof value === "object" ? value : {};
      const sourceAssignments = safeValue.assignments && typeof safeValue.assignments === "object" ? safeValue.assignments : {};
      const defaultAssignments = fallback?.assignments || buildDemoRiderAssignments(players);
      const normalized = {
        assignments: {},
        abandonedRiderIds: Array.isArray(safeValue.abandonedRiderIds)
          ? Array.from(new Set(safeValue.abandonedRiderIds.filter((id) => riderById(id))))
          : clone(fallback?.abandonedRiderIds || [])
      };

      players.forEach((player, playerIndex) => {
        const source = Array.isArray(sourceAssignments[player.id]) ? sourceAssignments[player.id] : defaultAssignments[player.id];
        normalized.assignments[player.id] = Array.from({ length: 9 }, (_, index) => {
          const entry = source?.[index] || {};
          const byId = riderById(entry.riderId);
          const byName = RIDERS.find((item) => normalizeRiderName(item.name) === normalizeRiderName(entry.name || ""));
          const selected = byId || byName || demoRiderEntriesForIndex(playerIndex)[index] || RIDERS[index % RIDERS.length];
          return entryFromRiderId(selected.riderId || selected.id);
        });
      });

      return normalized;
    }

    function riderFromEntry(entry) {
      const safeEntry = entry || {};
      const selected = riderById(safeEntry.riderId);
      if (selected) return {
        riderId: selected.id,
        name: selected.name,
        teamId: selected.teamId,
        abandoned: isRiderAbandoned(selected.id)
      };
      const fallback = RIDERS[0];
      return {
        riderId: fallback?.id || "",
        name: safeEntry.name || fallback?.name || "",
        teamId: safeEntry.teamId || fallback?.teamId || TEAMS[0].id,
        abandoned: isRiderAbandoned(fallback?.id || "")
      };
    }

    function isRiderAbandoned(riderId) {
      return state?.data?.riderTeams?.abandonedRiderIds?.includes(riderId) || false;
    }

    function allRiderEntries() {
      const assignments = state.data.riderTeams?.assignments || {};
      return state.data.players.flatMap((player) => (assignments[player.id] || []).map((entry, index) => {
        const rider = riderFromEntry(entry);
        return {
          player,
          rider,
          index,
          key: rider.riderId || normalizeRiderName(rider.name)
        };
      })).filter((entry) => entry.rider.name.trim());
    }

    function normalizeRiderName(name) {
      return String(name || "").trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }

    function riderGroups() {
      const groups = new Map();
      for (const entry of allRiderEntries()) {
        if (!groups.has(entry.key)) groups.set(entry.key, []);
        groups.get(entry.key).push(entry);
      }
      return Array.from(groups.values()).map((entries) => {
        const first = entries[0];
        return {
          key: first.key,
          name: first.rider.name,
          team: teamById(first.rider.teamId),
          entries,
          count: entries.length,
          abandoned: entries.some((entry) => entry.rider.abandoned),
          managers: entries.map((entry) => entry.player)
        };
      }).sort((a, b) => {
        if (b.count !== a.count) return b.count - a.count;
        return a.name.localeCompare(b.name, "fr");
      });
    }

    function sharedRiderGroups() {
      return riderGroups().filter((group) => group.count > 1);
    }

    function abandonedRiderGroups() {
      return riderGroups().filter((group) => group.abandoned);
    }

    function saveData(options = {}) {
      state.data.updatedAt = new Date().toISOString();
      saveLocalData();
      if (!options.localOnly) queueCloudSave();
    }

    function saveLocalData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
    }

    function isEditor() {
      return Boolean(state.supabaseUser);
    }

    function requireEditor() {
      if (isEditor()) return true;
      showToast("Connecte-toi dans Paramètres pour modifier le dashboard.");
      return false;
    }

    function editorDisabledAttr() {

    }

    function renderEditorNotice(actionText = "modifier ces données") {
      if (isEditor()) return "";
      return `

        </div>

    function loadData() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (!stored) return createDemoData();
      try {

    async function initSupabase() {
      if (!window.supabase || !SUPABASE_CONFIG.url || !SUPABASE_CONFIG.key) {
        setSyncStatus("local", "Supabase non chargé");
        return;
      }
      state.supabaseClient = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.key, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true,
          flowType: "implicit"
        }
      });
      state.supabaseClient.auth.onAuthStateChange((_event, session) => {
        state.supabaseUser = session?.user || null;
        if (!state.supabaseUser) state.cloudLoaded = false;
        setSyncStatus(state.supabaseUser ? "saved" : "local", state.supabaseUser ? "Connecté au cloud" : "Non connecté");
        renderApp();
        if (state.supabaseUser) loadCloudData();
      });
      await handleAuthRedirectFromUrl();
      const { data: sessionData } = await state.supabaseClient.auth.getSession();
      state.supabaseUser = sessionData?.session?.user || null;
      if (state.supabaseUser) setSyncStatus("saved", "Connecté au cloud");
      await loadCloudData();
    }

    async function handleAuthRedirectFromUrl() {
      if (!state.supabaseClient) return;
      const url = new URL(window.location.href);
      const code = url.searchParams.get("code");
      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
      const accessToken = hashParams.get("access_token");
      const refreshToken = hashParams.get("refresh_token");
      const authError = url.searchParams.get("error_description") || hashParams.get("error_description");

      if (authError) {
        setSyncStatus("error", decodeURIComponent(authError.replace(/\+/g, " ")));
        return;
      }

      try {
        if (accessToken && refreshToken) {
          const { error } = await state.supabaseClient.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken
          });
          if (error) throw error;
          cleanAuthUrl();
          return;
        }

        if (code) {
          const { error } = await state.supabaseClient.auth.exchangeCodeForSession(code);
          if (error) throw error;
          cleanAuthUrl(["code"]);
        }
      } catch (error) {
        console.error(error);
        setSyncStatus("error", "Connexion non finalisée");
      }
    }

    function cleanAuthUrl(paramsToRemove = []) {
      const url = new URL(window.location.href);
      for (const param of paramsToRemove) url.searchParams.delete(param);
      const cleanSearch = url.searchParams.toString();
      const cleanUrl = url.pathname + (cleanSearch ? "?" + cleanSearch : "");
      window.history.replaceState({}, document.title, cleanUrl);
    }

    async function loadCloudData() {
      if (!state.supabaseClient || state.isLoadingCloud) return;
      state.isLoadingCloud = true;
      if (state.supabaseUser) state.cloudLoaded = false;
      setSyncStatus("saving", "Chargement cloud");
      try {
        const { data, error } = await state.supabaseClient
          .from(SUPABASE_CONFIG.table)
          .select("data, updated_at")
          .eq("id", SUPABASE_CONFIG.dashboardId)
          .maybeSingle();

        if (error) throw error;
        if (data?.data) {
          state.data = normalizeData(data.data);
          saveLocalData();
          resetSelectionsAfterDataChange();
          state.cloudLoaded = true;
          setSyncStatus("saved", "Données cloud chargées");
          renderApp();
          return;
        }
        setSyncStatus(state.supabaseUser ? "saving" : "local", state.supabaseUser ? "Aucune donnée cloud" : "Connecte-toi pour sauvegarder");
        if (state.supabaseUser) {
          state.cloudLoaded = true;
          queueCloudSave(true);
        }
      } catch (error) {
        console.error(error);
        setSyncStatus("error", "Cloud indisponible");
      } finally {
        state.isLoadingCloud = false;
      }
    }

    function queueCloudSave(immediate = false) {
      if (!state.supabaseClient) {
        setSyncStatus("local", "Mode local");
        return;
      }
      if (!state.supabaseUser) {
        setSyncStatus("local", "Non connecté au cloud");
        return;
      }
      if (!state.cloudLoaded) {
        setSyncStatus("saving", "Chargement cloud");
        return;
      }
      window.clearTimeout(state.saveTimer);
      setSyncStatus("saving", "Sauvegarde en cours");
      state.saveTimer = window.setTimeout(saveCloudData, immediate ? 0 : 700);
    }

    async function saveCloudData() {
      if (!state.supabaseClient || !state.supabaseUser || state.isSavingCloud) return;
      state.isSavingCloud = true;
      try {
        const payload = {
          id: SUPABASE_CONFIG.dashboardId,
          data: state.data,
          updated_at: new Date().toISOString()
        };
        const { error } = await state.supabaseClient
          .from(SUPABASE_CONFIG.table)
          .upsert(payload, { onConflict: "id" });
        if (error) throw error;
        setSyncStatus("saved", "Sauvegardé dans Supabase");
      } catch (error) {
        console.error(error);
        setSyncStatus("error", "Sauvegarde cloud refusée");
      } finally {
        state.isSavingCloud = false;
      }
    }

    function resetSelectionsAfterDataChange() {
      const playerIds = new Set(state.data.players.map((player) => player.id));
      state.selectedPlayers = new Set(state.data.players.filter((player) => state.selectedPlayers.has(player.id) || !state.selectedPlayers.size).map((player) => player.id));
      if (!state.selectedPlayers.size) state.selectedPlayers = new Set(playerIds);
      if (!playerIds.has(state.selectedDetailPlayerId)) state.selectedDetailPlayerId = state.data.players[0]?.id || null;
      if (!state.data.stages.some((stage) => stage.id === state.selectedStageId)) state.selectedStageId = state.data.stages[0]?.id || "s1";
      state.data.riderTeams = normalizeRiderTeams(state.data.riderTeams, state.data.players, buildDefaultRiderTeams(state.data.players));
      if (!playerIds.has(state.selectedRiderPlayerId)) state.selectedRiderPlayerId = state.data.players[0]?.id || null;
    }

    function setSyncStatus(status, message) {
      state.syncStatus = status;
      state.syncMessage = message;
      renderSidebarSummary();
      if (state.activePage === "settings") renderCloudPanelOnly();
    }

    function normalizeData(data) {
      const fallback = createDemoData();
      const normalized = {
        version: 1,
        raceName: data.raceName || fallback.raceName,
        players: Array.isArray(data.players) ? data.players : fallback.players,
        stages: Array.isArray(data.stages) ? data.stages : fallback.stages,
        rules: data.rules || fallback.rules,
        riderTeams: data.riderTeams || fallback.riderTeams,
        updatedAt: data.updatedAt || new Date().toISOString()
      };
      normalized.players = normalized.players.map((player, index) => ({
        id: player.id || uniqueId(player.name || "Joueur " + (index + 1), new Set()),
        name: player.name || "Joueur " + (index + 1),
        team: player.team || "",
        whiteEligible: Boolean(player.whiteEligible),
        color: player.color || PLAYER_COLORS[index % PLAYER_COLORS.length]
      }));
      const playerIds = new Set(normalized.players.map((player) => player.id));
      normalized.stages = normalized.stages.map((stage, index) => {
        const nextStage = {
          id: stage.id || (index === 21 ? "final" : "s" + (index + 1)),
          number: stage.number || index + 1,
          name: stage.name || (index === 21 ? "Fin de course" : "Étape " + (index + 1)),
          final: Boolean(stage.final || index === 21),
          cancelled: Boolean(stage.cancelled),
          scores: stage.scores && typeof stage.scores === "object" ? stage.scores : {}
        };
        for (const id of playerIds) {
          if (!(id in nextStage.scores)) nextStage.scores[id] = null;
        }
        for (const id of Object.keys(nextStage.scores)) {
          if (!playerIds.has(id)) delete nextStage.scores[id];
          else nextStage.scores[id] = parseScore(nextStage.scores[id]);
        }
        return nextStage;
      });
      if (!normalized.rules.cyclamenStages) normalized.rules.cyclamenStages = fallback.rules.cyclamenStages;
      if (!normalized.rules.blueStages) normalized.rules.blueStages = fallback.rules.blueStages;
      normalized.riderTeams = normalizeRiderTeams(normalized.riderTeams, normalized.players, fallback.riderTeams);
      return normalized;
    }

    function parseScore(value) {
      if (value === "" || value === null || typeof value === "undefined") return null;
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return null;
      return Math.round(parsed);
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("fr-FR").format(Math.round(value || 0));
    }

    function getPlayer(id) {
      return state.data.players.find((player) => player.id === id);
    }

    function completedStages(stages = state.data.stages) {
      return stages.filter((stage) => isStageComplete(stage));
    }

    function isStageComplete(stage) {
      if (stage.cancelled) return true;
      return state.data.players.every((player) => Number.isInteger(stage.scores[player.id]));
    }

    function stageCompletion(stage) {
      if (stage.cancelled) return { status: "cancelled", count: state.data.players.length, total: state.data.players.length };
      const count = state.data.players.filter((player) => Number.isInteger(stage.scores[player.id])).length;
      const total = state.data.players.length;
      return { status: count === total ? "complete" : count === 0 ? "empty" : "partial", count, total };
    }

    function scoreOf(stage, playerId) {
      if (stage.cancelled) return 0;
      return Number.isInteger(stage.scores[playerId]) ? stage.scores[playerId] : 0;
    }

    function totalsForStages(stages) {
      const totals = Object.fromEntries(state.data.players.map((player) => [player.id, 0]));
      for (const stage of stages) {
        for (const player of state.data.players) {
          totals[player.id] += scoreOf(stage, player.id);
        }
      }
      return totals;
    }

    function rankingFromTotals(totals, players = state.data.players) {
      const rows = players.map((player) => ({ player, score: totals[player.id] || 0 }));
      rows.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return a.player.name.localeCompare(b.player.name, "fr");
      });
      for (const row of rows) {
        row.rank = 1 + rows.filter((other) => other.score > row.score).length;
      }
      return rows;
    }

    function overallRanking(stageList = completedStages()) {
      return rankingFromTotals(totalsForStages(stageList));
    }

    function previousMovementMap() {
      const complete = completedStages();
      if (complete.length < 2) return {};
      const current = overallRanking(complete);
      const previous = overallRanking(complete.slice(0, -1));
      const previousRanks = Object.fromEntries(previous.map((row) => [row.player.id, row.rank]));
      return Object.fromEntries(current.map((row) => [row.player.id, (previousRanks[row.player.id] || row.rank) - row.rank]));
    }

    function movementLabel(value) {
      if (value > 0) return { text: "+" + value, className: "up" };
      if (value < 0) return { text: String(value), className: "down" };
      return { text: "=", className: "" };
    }

    function rankBadgeClass(rank) {
      if (rank === 1) return "gold";
      if (rank === 2) return "silver";
      if (rank === 3) return "bronze";
      return "";
    }

    function tieCount(row, ranking) {
      return ranking.filter((other) => other.score === row.score).length;
    }

    function renderTiePill(row, ranking) {
      const count = tieCount(row, ranking);
      return count > 1 ? `<span class="tie-pill">Égalité x${count}</span>` : "";
    }

    function miniRankClass(row, ranking) {
      return [rankBadgeClass(row.rank), tieCount(row, ranking) > 1 ? "tied" : ""].filter(Boolean).join(" ");
    }

    function miniRowClass(row, ranking) {
      return tieCount(row, ranking) > 1 ? "tied" : "";
    }

    function renderGapList(gapLeader, gapPrevious) {
      return `
        <div class="gap-list">
          <div class="gap-item">
            <span class="gap-label">Écart vs 1ère place</span>
            <span class="gap-value">${gapLeader === 0 ? "0" : "+" + formatNumber(gapLeader)}</span>
          </div>
          <div class="gap-item">
            <span class="gap-label">Écart vs joueur précédent</span>
            <span class="gap-value">${gapPrevious === 0 ? "0" : "+" + formatNumber(gapPrevious)}</span>
          </div>
        </div>
      `;
    }

    function stageRanking(stage) {
      const totals = Object.fromEntries(state.data.players.map((player) => [player.id, scoreOf(stage, player.id)]));
      return rankingFromTotals(totals);
    }

    function evolutionSeries(players = state.data.players) {
      const cumulative = Object.fromEntries(state.data.players.map((player) => [player.id, 0]));
      const points = [];
      const ranks = [];
      for (const stage of state.data.stages) {
        if (!isStageComplete(stage)) continue;
        for (const player of state.data.players) {
          cumulative[player.id] += scoreOf(stage, player.id);
        }
        const ranking = rankingFromTotals(cumulative);
        const rankMap = Object.fromEntries(ranking.map((row) => [row.player.id, row.rank]));
        points.push({
          stage: stage.name,
          values: Object.fromEntries(players.map((player) => [player.id, cumulative[player.id] || 0]))
        });
        ranks.push({
          stage: stage.name,
          values: Object.fromEntries(players.map((player) => [player.id, rankMap[player.id] || null]))
        });
      }
      return { points, ranks };
    }

    function teamNames() {
      return Array.from(new Set(state.data.players.map((player) => player.team).filter(Boolean))).sort((a, b) => a.localeCompare(b, "fr"));
    }

    function teamColor(team) {
      const colors = {
        SALES: "#e83d8a",
        "ÉTUDES": "#1368a8",
        PRODUIT: "#258b66"
      };
      return colors[team] || "#343036";
    }

    function teamMembers(team) {
      return state.data.players.filter((player) => player.team === team);
    }

    function teamTotals(stageList = completedStages()) {
      const playerTotals = totalsForStages(stageList);
      return Object.fromEntries(teamNames().map((team) => {
        const members = teamMembers(team);
        const average = members.length ? members.reduce((sum, player) => sum + (playerTotals[player.id] || 0), 0) / members.length : 0;
        return [team, Math.round(average)];
      }));
    }

    function teamRanking(stageList = completedStages()) {
      const totals = teamTotals(stageList);
      const rows = teamNames().map((team) => ({ team, score: totals[team] || 0, members: teamMembers(team) }));
      rows.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return a.team.localeCompare(b.team, "fr");
      });
      for (const row of rows) {
        row.rank = 1 + rows.filter((other) => other.score > row.score).length;
      }
      return rows;
    }

    function teamMovementMap() {
      const complete = completedStages();
      if (complete.length < 2) return {};
      const current = teamRanking(complete);
      const previous = teamRanking(complete.slice(0, -1));
      const previousRanks = Object.fromEntries(previous.map((row) => [row.team, row.rank]));
      return Object.fromEntries(current.map((row) => [row.team, (previousRanks[row.team] || row.rank) - row.rank]));
    }

    function teamEvolutionSeries() {
      const teams = teamNames();
      const points = [];
      const ranks = [];
      for (const stage of state.data.stages) {
        if (!isStageComplete(stage)) continue;
        const completedUntilStage = state.data.stages.slice(0, state.data.stages.indexOf(stage) + 1).filter(isStageComplete);
        const ranking = teamRanking(completedUntilStage);
        const rankMap = Object.fromEntries(ranking.map((row) => [row.team, row.rank]));
        const totals = teamTotals(completedUntilStage);
        points.push({ stage: stage.name, values: Object.fromEntries(teams.map((team) => [team, totals[team] || 0])) });
        ranks.push({ stage: stage.name, values: Object.fromEntries(teams.map((team) => [team, rankMap[team] || null])) });
      }
      return { teams, points, ranks };
    }

    function rankingForRule(stageNumbers, onlyEligible = false) {
      const ids = new Set(stageNumbers.map((number) => "s" + number));
      const ruleStages = state.data.stages.filter((stage) => ids.has(stage.id) && isStageComplete(stage) && !stage.cancelled);
      const players = onlyEligible ? state.data.players.filter((player) => player.whiteEligible) : state.data.players;
      return rankingFromTotals(totalsForStages(ruleStages), players);
    }

    function whiteRanking() {
      return rankingFromTotals(totalsForStages(completedStages()), state.data.players.filter((player) => player.whiteEligible));
    }

    function raceStageRecords() {
      const records = Object.fromEntries(state.data.players.map((player) => [player.id, { wins: 0, podiums: 0, last: 0 }]));
      const raceStages = state.data.stages.filter((stage) => !stage.final && !stage.cancelled && isStageComplete(stage));
      for (const stage of raceStages) {
        const ranking = stageRanking(stage);
        const minScore = Math.min(...ranking.map((row) => row.score));
        for (const row of ranking) {
          if (row.rank === 1) records[row.player.id].wins += 1;
          if (row.rank <= 3) records[row.player.id].podiums += 1;
          if (row.score === minScore) records[row.player.id].last += 1;
        }
      }
      return records;
    }

    function renderApp() {
      renderNav();
      renderHeader();
      renderSidebarSummary();
      renderHistoryStrip();

    function ensureSelectedPlayers() {
      const currentIds = new Set(state.data.players.map((player) => player.id));
      for (const id of Array.from(state.selectedPlayers)) {
        if (!currentIds.has(id)) state.selectedPlayers.delete(id);
      }
      if (!state.selectedPlayers.size) {
        state.data.players.forEach((player) => state.selectedPlayers.add(player.id));
      }
    }

    function renderLineChart({ type, series, entities, valueLabel, wide = false, rankMax = state.data.players.length }) {
      if (!entities.length) return emptyState("Sélectionne au moins un joueur.");
      if (!series.length) return emptyState("Aucune étape complète pour tracer le graphique.");

      const width = wide ? getMainContentWidth() : 900;
      const height = 360;
      const margin = { top: 24, right: 24, bottom: 48, left: 52 };
      const chartWidth = width - margin.left - margin.right;
      const chartHeight = height - margin.top - margin.bottom;
      const allValues = [];
      for (const point of series) {
        for (const entity of entities) {
          const value = point.values[entity.id || entity.team];
          if (Number.isFinite(value)) allValues.push(value);
        }
      }
      const minValue = type === "rank" ? 1 : Math.min(0, ...allValues);
      const maxValue = type === "rank" ? Math.max(rankMax, ...allValues) : Math.max(1, ...allValues);
      const xFor = (index) => margin.left + (series.length === 1 ? chartWidth / 2 : (index / (series.length - 1)) * chartWidth);
      const yFor = (value) => {
        if (maxValue === minValue) return margin.top + chartHeight / 2;
        if (type === "rank") return margin.top + ((value - minValue) / (maxValue - minValue)) * chartHeight;
        return margin.top + chartHeight - ((value - minValue) / (maxValue - minValue)) * chartHeight;
      };
      const yTicks = type === "rank"
        ? Array.from({ length: Math.min(8, maxValue) }, (_, index) => 1 + Math.round(index * ((maxValue - 1) / Math.max(1, Math.min(8, maxValue) - 1))))
        : makeTicks(minValue, maxValue, 5);
      const xTicks = series.map((point, index) => ({ point, index })).filter((item) => {
        if (series.length <= 8) return true;
        return item.index === 0 || item.index === series.length - 1 || item.index % Math.ceil(series.length / 7) === 0;
      });

      const paths = entities.map((entity) => {
        const key = entity.id || entity.team;
        const coords = series
          .map((point, index) => ({ value: point.values[key], x: xFor(index), y: yFor(point.values[key]) }))
          .filter((coord) => Number.isFinite(coord.value));
        const path = coords.map((coord, index) => (index === 0 ? "M" : "L") + coord.x.toFixed(1) + " " + coord.y.toFixed(1)).join(" ");
        const color = entity.color || teamColor(entity.team);
        return `
          <path class="line-path" d="${path}" stroke="${color}"></path>
          ${coords.map((coord) => `<circle class="chart-point" cx="${coord.x.toFixed(1)}" cy="${coord.y.toFixed(1)}" r="4" fill="${color}"><title>${escapeHtml(entity.name || entity.team)} - ${escapeHtml(series[coords.indexOf(coord)]?.stage || "")} : ${formatNumber(coord.value)}</title></circle>`).join("")}
        `;
      }).join("");

      return `
        <svg class="chart-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="${escapeHtml(valueLabel)}">
          ${yTicks.map((tick) => `
            <line class="chart-grid" x1="${margin.left}" y1="${yFor(tick).toFixed(1)}" x2="${width - margin.right}" y2="${yFor(tick).toFixed(1)}"></line>
            <text class="chart-label" x="${margin.left - 10}" y="${yFor(tick).toFixed(1)}" text-anchor="end" dominant-baseline="middle">${type === "rank" ? tick : formatNumber(tick)}</text>
          `).join("")}
          ${xTicks.map(({ point, index }) => `
            <line class="chart-grid" x1="${xFor(index).toFixed(1)}" y1="${margin.top}" x2="${xFor(index).toFixed(1)}" y2="${margin.top + chartHeight}"></line>
            <text class="chart-label" x="${xFor(index).toFixed(1)}" y="${height - 18}" text-anchor="middle">${escapeHtml(shortStageLabel(point.stage))}</text>
          `).join("")}
          <line class="chart-axis" x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${margin.top + chartHeight}"></line>
          <line class="chart-axis" x1="${margin.left}" y1="${margin.top + chartHeight}" x2="${width - margin.right}" y2="${margin.top + chartHeight}"></line>
          ${paths}
        </svg>
      `;
    }

    function getMainContentWidth() {
      const main = document.querySelector(".main");
      if (!main) return 900;
      const styles = window.getComputedStyle(main);
      const horizontalPadding = parseFloat(styles.paddingLeft) + parseFloat(styles.paddingRight);
      return Math.max(360, Math.round(main.clientWidth - horizontalPadding - 2));
    }

    function makeTicks(min, max, count) {
      if (max <= min) return [min, max];
      return Array.from({ length: count }, (_, index) => Math.round(min + index * ((max - min) / (count - 1))));
    }

    function shortStageLabel(label) {
      if (label === "Fin de course") return "Final";
      return label.replace("Étape ", "E");
    }

    function teamStageAverage(team, stage) {
      const members = teamMembers(team);
      if (!members.length) return 0;
      return Math.round(members.reduce((sum, player) => sum + scoreOf(stage, player.id), 0) / members.length);
    }

    function renderRecordCard(title, iconName, key, records) {
      const rows = state.data.players.map((player) => ({
        player,
        score: records[player.id]?.[key] || 0
      })).filter((row) => row.score !== 0).sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return a.player.name.localeCompare(b.player.name, "fr");
      });
      rows.forEach((row) => {
        row.rank = 1 + rows.filter((other) => other.score > row.score).length;
      });
      return `
        <article class="record-card">
          <h2 class="record-title"><span class="medal-icon ${key === "podiums" ? "blue" : key === "last" ? "dark" : ""}">${icon(iconName)}</span>${escapeHtml(title)}</h2>
          <div class="mini-ranking">

              ${state.data.players.map((player) => `<option value="${player.id}" ${player.id === state.selectedDetailPlayerId ? "selected" : ""}>${escapeHtml(player.name)}</option>`).join("")}
            </select>
          </div>
          ${renderPlayerDetail(state.selectedDetailPlayerId, detailStages)}
        </div>
      `;
      document.getElementById("detailSearch")?.addEventListener("input", (event) => {
        const cursor = event.target.selectionStart || event.target.value.length;
        state.detailSearch = event.target.value;
        renderDetails();
        const nextInput = document.getElementById("detailSearch");
        nextInput?.focus();
        nextInput?.setSelectionRange(cursor, cursor);
      });
      document.getElementById("detailStageFilter")?.addEventListener("change", (event) => {
        state.detailStageFilter = event.target.value;
        renderDetails();
      });
      document.getElementById("detailStatusFilter")?.addEventListener("change", (event) => {
        state.detailStatusFilter = event.target.value;
        renderDetails();
      });
      document.getElementById("detailPlayer")?.addEventListener("change", (event) => {
        state.selectedDetailPlayerId = event.target.value;
        renderDetails();
      });
    }

    function filteredDetailPlayers() {
      const query = normalizeRiderName(state.detailSearch);
      return state.data.players.filter((player) => {
        const matchesQuery = !query || normalizeRiderName(player.name + " " + player.team).includes(query);
        const matchesStatus =
          state.detailStatusFilter === "team" ? Boolean(player.team) :
          state.detailStatusFilter === "white" ? player.whiteEligible :
          state.detailStatusFilter === "solo" ? !player.team :
          true;
        return matchesQuery && matchesStatus;
      });
    }

    function filteredDetailStages() {
      return state.data.stages.filter((stage) => {
        if (state.detailStageFilter === "completed") return isStageComplete(stage);
        if (state.detailStageFilter === "incomplete") return !isStageComplete(stage);
        if (state.detailStageFilter === "race") return !stage.final;
        if (state.detailStageFilter === "final") return stage.final;
        return true;
      });
    }

    function renderFullDetailTable(players = state.data.players, stages = state.data.stages) {
      const cumulative = Object.fromEntries(state.data.players.map((player) => [player.id, 0]));
      const stageMaps = [];
      for (const stage of state.data.stages) {
        if (!isStageComplete(stage)) {
          stageMaps.push({ stage, info: null });
          continue;
        }
        const stageRankMap = Object.fromEntries(stageRanking(stage).map((row) => [row.player.id, row.rank]));
        for (const player of state.data.players) cumulative[player.id] += scoreOf(stage, player.id);
        const generalRankMap = Object.fromEntries(rankingFromTotals(cumulative).map((row) => [row.player.id, row.rank]));
        stageMaps.push({ stage, info: { stageRankMap, generalRankMap, cumulative: { ...cumulative } } });
      }
      const infoByStage = Object.fromEntries(stageMaps.map((item) => [item.stage.id, item.info]));
      if (!players.length || !stages.length) return emptyState("Aucun résultat avec ces filtres.");
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Joueur</th>
                ${stages.map((stage) => `<th>${escapeHtml(shortStageLabel(stage.name))}</th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${players.map((player) => `
                <tr>
                  <td><span class="color-dot" style="background:${player.color}"></span> ${escapeHtml(player.name)}</td>
                  ${stages.map((stage) => {
                    const info = infoByStage[stage.id];
                    if (!info) return `<td class="muted">Non saisie</td>`;
                    if (stage.cancelled) return `<td class="muted">Annulée</td>`;
                    return `<td><strong>${formatNumber(scoreOf(stage, player.id))}</strong><br><span class="muted">E${info.stageRankMap[player.id]} · CG${info.generalRankMap[player.id]}</span></td>`;
                  }).join("")}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderRaceBrief(ranking, movement) {
      const lastRaceStage = completedStages().filter((stage) => !stage.final && !stage.cancelled).at(-1);
      const lastWinner = lastRaceStage ? stageRanking(lastRaceStage).filter((row) => row.rank === 1).map((row) => row.player.name).join(", ") : "-";
      const bestMover = ranking
        .map((row) => ({ player: row.player, move: movement[row.player.id] || 0 }))
        .sort((a, b) => b.move - a.move || a.player.name.localeCompare(b.player.name, "fr"))[0];
      return `
        <div class="editorial-band">
          <div>
            <div class="editorial-title">Résumé de course</div>
            <p class="editorial-note">Dernier vainqueur d'étape : <strong>${escapeHtml(lastWinner)}</strong>. Plus forte progression : <strong>${bestMover && bestMover.move > 0 ? escapeHtml(bestMover.player.name) + " +" + bestMover.move : "aucune progression"}</strong>.</p>
          </div>
        </div>
      `;
    }

    function renderPlayerDetail(playerId, stages = state.data.stages) {
      const player = getPlayer(playerId);
      if (!player) return emptyState("Aucun joueur sélectionné.");
      let cumulative = 0;
      const rows = [];
      for (const stage of stages) {
        if (!isStageComplete(stage)) {
          rows.push({ stage, status: "Non saisie" });
          continue;
        }
        const stageRankMap = Object.fromEntries(stageRanking(stage).map((row) => [row.player.id, row.rank]));
        const totalsBeforeRank = totalsForStages(state.data.stages.slice(0, state.data.stages.indexOf(stage) + 1).filter(isStageComplete));
        const generalRankMap = Object.fromEntries(rankingFromTotals(totalsBeforeRank).map((row) => [row.player.id, row.rank]));
        cumulative += scoreOf(stage, player.id);
        rows.push({
          stage,
          points: scoreOf(stage, player.id),
          cumulative,
          stageRank: stage.cancelled ? null : stageRankMap[player.id],
          generalRank: generalRankMap[player.id],
          status: stage.cancelled ? "Annulée" : "OK"
        });
      }
      return `
        <div class="metric-grid">
          ${metric("Total", formatNumber(cumulative), "Points sur étapes complètes")}
          ${metric("Équipe", player.team || "Sans équipe", player.team ? "Compte pour le classement équipe" : "Exclu des équipes")}
          ${metric("Maillot Blanc", player.whiteEligible ? "Éligible" : "Non", player.whiteEligible ? "Inclus dans le classement jeune" : "Non inclus")}
          ${metric("Couleur", player.color, "Trait fixe sur les graphiques")}
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Étape</th>
                <th>Points</th>
                <th>Rang étape</th>
                <th>Cumul</th>
                <th>Rang général</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((row) => `
                <tr>
                  <td>${escapeHtml(row.stage.name)}</td>
                  <td>${row.status === "Non saisie" ? "Non saisie" : row.status === "Annulée" ? "0" : formatNumber(row.points)}</td>
                  <td>${row.stageRank ? row.stageRank : row.status}</td>
                  <td>${Number.isFinite(row.cumulative) ? formatNumber(row.cumulative) : "-"}</td>
                  <td>${row.generalRank || "-"}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }


    function renderRiderOverview() {
      const page = document.getElementById("page-rider-overview");
      const groups = riderGroups();
      const countMap = Object.fromEntries(groups.map((group) => [group.key, group.count]));
      const abandonedMap = Object.fromEntries(groups.map((group) => [group.key, group.abandoned]));
      page.innerHTML = `
        ${renderRiderMetrics()}
        <div class="panel flat">
          <div class="toolbar">
            <input class="input" type="search" id="overviewSearch" placeholder="Filtrer un coureur ou joueur">
            <select class="select" id="overviewTeam">
              <option value="">Toutes les équipes cyclistes</option>
              ${TEAMS.map((team) => `<option value="${team.id}">${escapeHtml(team.name)}</option>`).join("")}
            </select>
          </div>
          <div class="manager-grid" id="managerGrid">
            ${renderRiderManagerCards(countMap, abandonedMap)}
          </div>
        </div>
      `;
      document.getElementById("overviewSearch")?.addEventListener("input", applyRiderOverviewFilters);
      document.getElementById("overviewTeam")?.addEventListener("change", applyRiderOverviewFilters);
    }

    function renderRiderMetrics() {
      const entries = allRiderEntries();
      const uniqueCount = riderGroups().length;
      const shared = sharedRiderGroups();
      const abandoned = abandonedRiderGroups();
      const mostPicked = shared[0];
      return `
        <div class="metric-grid">
          ${metric("Compositions", state.data.players.length, "9 coureurs par joueur")}
          ${metric("Coureurs uniques", uniqueCount, entries.length + " sélections au total")}
          ${metric("Coureurs communs", shared.length, mostPicked ? mostPicked.name + " x" + mostPicked.count : "Aucun doublon")}
          ${metric("Abandons", abandoned.length, riderAbandonmentImpactCount() + " équipe(s) touchée(s)")}
        </div>
      `;
    }

    function renderRiderManagerCards(countMap, abandonedMap, query = "", teamFilter = "") {
      const assignments = state.data.riderTeams?.assignments || {};
      return state.data.players.map((player) => {
        const riders = (assignments[player.id] || []).map(riderFromEntry);
        const visibleRiders = riders.filter((rider) => {
          const haystack = (player.name + " " + rider.name + " " + teamById(rider.teamId).name).toLowerCase();
          const matchQuery = !query || haystack.includes(query.toLowerCase());
          const matchTeam = !teamFilter || rider.teamId === teamFilter;
          return matchQuery && matchTeam;
        });
        if (!visibleRiders.length) return "";
        const abandonedCount = riders.filter((rider) => abandonedMap[rider.riderId]).length;
        const activeCount = Math.max(0, riders.length - abandonedCount);
        visibleRiders.sort((a, b) => a.name.localeCompare(b.name, "fr"));
        return `
          <article class="manager-card">
            <div class="manager-head">
              <div>
                <div class="manager-name"><span class="color-dot" style="background:${player.color}"></span>${escapeHtml(player.name)}</div>
                <div class="tag-row">
                  <span class="tag green">${activeCount}/${riders.length} en course</span>
                  ${abandonedCount ? `<span class="tag red">${abandonedCount} abandon${abandonedCount > 1 ? "s" : ""}</span>` : ""}
                </div>
              </div>
            </div>
            <div class="rider-list">
              ${visibleRiders.map((rider) => renderRiderRow(rider, countMap, abandonedMap)).join("")}
            </div>
          </article>
        `;
      }).join("") || emptyState("Aucun résultat.");
    }

    function renderRiderRow(rider, countMap, abandonedMap) {
      const team = teamById(rider.teamId);
      const abandoned = abandonedMap[rider.riderId] || rider.abandoned;
      return `
        <div class="rider-row ${abandoned ? "abandoned" : ""}">
          <img class="jersey" src="${team.image}" alt="${escapeHtml(team.name)}">
          <div class="rider-main">
            <div class="rider-name">${escapeHtml(rider.name)}</div>
          </div>
          ${abandoned ? `<span class="count-pill abandoned">AB</span>` : ""}
        </div>
      `;
    }

    function applyRiderOverviewFilters() {
      const query = document.getElementById("overviewSearch")?.value.trim() || "";
      const teamFilter = document.getElementById("overviewTeam")?.value || "";
      const groups = riderGroups();
      const countMap = Object.fromEntries(groups.map((group) => [group.key, group.count]));
      const abandonedMap = Object.fromEntries(groups.map((group) => [group.key, group.abandoned]));
      const grid = document.getElementById("managerGrid");
      if (grid) grid.innerHTML = renderRiderManagerCards(countMap, abandonedMap, query, teamFilter);
    }

    function renderRiderShared() {
      const page = document.getElementById("page-rider-shared");
      const groups = sharedRiderGroups();
      const heavyGroups = groups.filter((group) => group.count >= 4).length;
      page.innerHTML = `
        ${renderRiderMetrics()}
        <div class="editorial-band">
          <div>
            <div class="editorial-title">Coureurs en commun</div>
            <p class="editorial-note">Les cartes distinguent les doublons simples, les choix très partagés et les coureurs vraiment structurants dans plusieurs compositions.</p>
          </div>
          <div class="editorial-kpi">
            <span>${heavyGroups}</span>
            <span>communs forts</span>
          </div>
        </div>
        <div class="panel">
          <h2 class="panel-title">Coureurs pris par plusieurs joueurs <small>${groups.length} doublons</small></h2>
          <div class="shared-grid">
            ${groups.map((group) => renderRiderSharedCard(group)).join("") || emptyState("Aucun coureur en commun.")}
          </div>
        </div>
      `;

    function renderRiderSharedCard(group) {
      return `
        <article class="shared-card ${sharedLevelClass(group)}">
          <div class="shared-head">
            <img class="jersey" src="${group.team.image}" alt="${escapeHtml(group.team.name)}">
            <div class="rider-main">
              <div class="rider-name">${escapeHtml(group.name)}</div>
              <div class="rider-team">${escapeHtml(group.team.name)}</div>
            </div>
            <span class="count-pill ${group.abandoned ? "abandoned" : "shared"}">${group.abandoned ? "AB" : "x" + group.count}</span>
          </div>
          <div class="shared-meta">
            <span class="tag ${group.count >= 4 ? "pink" : group.count >= 3 ? "blue" : ""}">${sharedLevelLabel(group)}</span>
            ${group.abandoned ? `<span class="tag red">Abandon</span>` : ""}
          </div>
          <div class="impact-list">
            ${group.managers.map((player) => `<span class="tag"><span class="color-dot" style="background:${player.color}"></span>${escapeHtml(player.name)}</span>`).join("")}
          </div>
        </article>
      `;

    function sharedLevelClass(group) {
      if (group.count >= 4) return "shared-high";
      if (group.count >= 3) return "shared-medium";
      return "";
    }

    function sharedLevelLabel(group) {
      if (group.count >= 4) return "Commun fort";
      if (group.count >= 3) return "Très partagé";
      return "Duo";
    }

    function renderRiderAbandons() {
      const page = document.getElementById("page-rider-abandons");
      const abandoned = abandonedRiderGroups();
      const impactByPlayer = state.data.players.map((player) => {
        const count = (state.data.riderTeams?.assignments?.[player.id] || []).map(riderFromEntry).filter((rider) => abandoned.some((group) => group.key === rider.riderId)).length;
        return { player, count };
      }).sort((a, b) => b.count - a.count || a.player.name.localeCompare(b.player.name, "fr"));
      page.innerHTML = `
        <div class="grid two">
          <div class="panel">
            <h2 class="panel-title">Joueurs touchés <small>${riderAbandonmentImpactCount()} impacts</small></h2>
            <div class="abandon-grid">
              ${impactByPlayer.map((row) => `
                <article class="abandon-card ${row.count ? "danger" : ""}">
                  <div class="manager-name"><span class="color-dot" style="background:${row.player.color}"></span>${escapeHtml(row.player.name)}</div>
                  <div class="abandon-score">${row.count}</div>
                  <div class="muted">${row.count ? "coureur(s) abandonné(s)" : "aucun abandon"}</div>
                </article>
              `).join("")}
            </div>
          </div>
          <div class="panel">
            <h2 class="panel-title">Coureurs abandonnés <small>${abandoned.length} coureurs</small></h2>
            <div class="shared-grid">
              ${abandoned.map((group) => renderRiderSharedCard(group)).join("") || emptyState("Aucun abandon renseigné.")}
            </div>
          </div>
        </div>
        <div class="panel">
          <h2 class="panel-title">Détail des impacts <small>par joueur</small></h2>
          ${renderRiderAbandonTable(abandoned)}
        </div>
      `;

    function riderAbandonmentImpactCount() {
      const abandoned = new Set(abandonedRiderGroups().map((group) => group.key));
      return allRiderEntries().filter((entry) => abandoned.has(entry.key)).length;
    }

    function renderRiderAbandonTable(abandoned) {
      if (!abandoned.length) return emptyState("Aucun abandon renseigné.");
      const abandonedSet = new Set(abandoned.map((group) => group.key));
      const rows = allRiderEntries().filter((entry) => abandonedSet.has(entry.key)).sort((a, b) => a.player.name.localeCompare(b.player.name, "fr"));
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Joueur</th>
                <th>Coureur</th>
                <th>Équipe cycliste</th>
                <th>Présent chez</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((entry) => {
                const group = abandoned.find((item) => item.key === entry.key);
                const team = teamById(entry.rider.teamId);
                return `
                  <tr>
                    <td><span class="color-dot" style="background:${entry.player.color}"></span> ${escapeHtml(entry.player.name)}</td>
                    <td><strong>${escapeHtml(entry.rider.name)}</strong></td>
                    <td><img class="jersey" src="${team.image}" alt=""> ${escapeHtml(team.name)}</td>
                    <td>${group.count} joueur(s)</td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

          const rider = riderById(select.value);

    function renderRiderOptions(selectedId) {
      return RIDERS_ALPHABETICAL.map((rider) => {
        const team = teamById(rider.teamId);
        return `<option value="${rider.id}" ${rider.id === selectedId ? "selected" : ""}>${escapeHtml(rider.name)} - ${escapeHtml(team.name)}</option>`;
      }).join("");
