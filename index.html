<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Fantasy Tour de France 2026</title>
  <style>
    @font-face {
      font-family: "Galibier";
      src: url("Galibier-Regular.otf") format("opentype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Galibier";
      src: url("Galibier-Bold.otf") format("opentype");
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Galibier Etroit";
      src: url("Galibier-EtroitBold.otf") format("opentype");
      font-weight: 900;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --yellow: #ffed00;
      --yellow-dark: #c79a00;
      --yellow-soft: #fff8b8;
      --pink: var(--yellow);
      --pink-dark: #6b5200;
      --pink-soft: var(--yellow-soft);
      --cyclamen: #e1007a;
      --blue: #005baa;
      --blue-soft: #e5f0ff;
      --navy: #061b3a;
      --navy-2: #00112b;
      --sky: #00a3e0;
      --white: #ffffff;
      --paper: #f3f6fb;
      --ink: #071a35;
      --muted: #66758c;
      --line: #dbe4f0;
      --green: #16805b;
      --green-soft: #e5f7ee;
      --gold: #d39b2a;
      --red: #d71920;
      --red-soft: #fff0f0;
      --shadow: 0 18px 48px rgba(6, 27, 58, 0.10);
      --radius: 8px;
      --font-title: "Galibier Etroit", "Galibier", Arial, Helvetica, sans-serif;
      --font-body: "Galibier", Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: var(--font-body);
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(255, 237, 0, 0.18), rgba(255, 255, 255, 0) 320px),
        repeating-linear-gradient(135deg, rgba(0, 91, 170, 0.045) 0 2px, transparent 2px 28px),
        var(--paper);
      min-height: 100vh;
    }

    button,
    input,
    select,
    textarea {
      font-family: var(--font-body);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: 278px minmax(0, 1fr);
      min-height: 100vh;
      width: 100%;
    }

    .sidebar {
      position: sticky;
      top: 0;
      align-self: start;
      height: 100vh;
      width: 100%;
      min-width: 0;
      padding: 22px 16px;
      background:
        linear-gradient(180deg, rgba(255, 237, 0, 0.14), rgba(255, 237, 0, 0) 210px),
        linear-gradient(160deg, var(--navy), var(--navy-2));
      border-right: 1px solid rgba(255, 255, 255, 0.12);
      color: white;
      display: flex;
      flex-direction: column;
      gap: 18px;
      z-index: 10;
    }

    .brand {
      display: grid;
      grid-template-columns: 86px 1fr;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-width: 0;
      min-height: 68px;
      padding: 8px 8px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.16);
    }

    .brand-logo {
      width: 86px;
      height: 62px;
      object-fit: contain;
    }

    .brand-kicker {
      color: var(--yellow);
      text-transform: uppercase;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .brand-title {
      font-family: var(--font-title);
      font-weight: 900;
      font-size: 22px;
      line-height: 0.94;
      overflow-wrap: anywhere;
    }

    .nav {
      display: grid;
      gap: 10px;
      width: 100%;
      min-width: 0;
    }

    .nav-section {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .nav-section-title {
      padding: 5px 12px 0;
      color: var(--yellow);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .nav-subnav {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .nav-subnav .nav-button {
      min-height: 38px;
      padding-left: 18px;
      font-size: 13px;
    }

    .nav-button {
      display: grid;
      grid-template-columns: 24px 1fr;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      color: rgba(255, 255, 255, 0.78);
      background: transparent;
      border-radius: var(--radius);
      text-align: left;
      font-weight: 800;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .nav-button:hover {
      background: rgba(255, 255, 255, 0.10);
      color: white;
      transform: translateX(2px);
    }

    .nav-button.active {
      background: var(--yellow);
      color: var(--navy);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.22);
    }

    .nav-icon {
      width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: var(--radius);
      display: grid;
      gap: 8px;
    }

    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.62);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .footer-value {
      color: white;
      font-size: 15px;
      letter-spacing: 0;
      text-transform: none;
    }

    .main {
      min-width: 0;
      padding: 28px clamp(18px, 3vw, 42px) 42px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 26px;
      padding: 18px 20px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--line);
      border-left: 6px solid var(--yellow);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .title-block {
      display: grid;
      gap: 7px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--blue);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .eyebrow::before {
      content: "";
      width: 30px;
      height: 3px;
      background: var(--yellow);
      border-radius: 99px;
    }

    h1 {
      margin: 0;
      font-family: var(--font-title);
      font-size: clamp(30px, 4vw, 56px);
      line-height: 0.95;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      max-width: 820px;
      line-height: 1.5;
      font-size: 15px;
    }

    .top-logo {
      width: clamp(96px, 14vw, 156px);
      max-height: 110px;
      object-fit: contain;
      filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.10));
    }

    .topbar-side {
      display: grid;
      justify-items: end;
      gap: 10px;
      flex: 0 0 auto;
    }

    .updated-pill {
      display: inline-flex;
      align-items: center;
      min-height: 25px;
      padding: 5px 8px;
      border-radius: 99px;
      background: rgba(6, 27, 58, 0.06);
      color: rgba(6, 27, 58, 0.58);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    .page {
      display: none;
      animation: pageIn 180ms ease;
    }

    .page.active {
      display: grid;
      gap: 22px;
    }

    .stage-ribbon {
      display: flex;
      align-items: center;
      gap: 5px;
      margin: -10px 0 22px;
      padding: 8px 4px 6px;
      background: transparent;
      border: 0;
      box-shadow: none;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    .ribbon-stage {
      min-width: 48px;
      min-height: 55px;
      padding: 3px 2px 15px;
      border-radius: 0;
      border: 0;
      background: transparent;
      color: #667489;
      display: grid;
      place-items: center;
      gap: 2px;
      font-family: var(--font-title);
      font-weight: 900;
      font-size: 13px;
      line-height: 1;
      position: relative;
      overflow: visible;
      transition: transform 160ms ease, color 160ms ease;
    }

    .ribbon-stage::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 5px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #cad5e4;
      transform: translateX(-50%);
      box-shadow: 0 0 0 5px var(--paper);
      z-index: 2;
    }

    .ribbon-stage::after {
      content: "";
      position: absolute;
      left: 50%;
      right: -50%;
      bottom: 9px;
      height: 2px;
      background: #d8e1ed;
      z-index: 1;
    }

    .ribbon-stage:hover {
      transform: translateY(-2px);
      color: var(--navy);
    }

    .ribbon-stage span {
      width: 35px;
      height: 35px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: white;
      border: 1px solid var(--line);
      box-shadow: 0 8px 18px rgba(6, 27, 58, 0.08);
      position: relative;
      z-index: 3;
    }

    .ribbon-stage.complete {
      color: var(--green);
    }

    .ribbon-stage.complete span {
      background: #f5fff9;
      border-color: #8fd8b9;
    }

    .ribbon-stage.complete::before {
      background: var(--green);
    }

    .ribbon-stage.partial {
      color: #9f6610;
    }

    .ribbon-stage.partial span {
      background: #fff8eb;
      border-color: #f2d7a6;
    }

    .ribbon-stage.partial::before {
      background: #f0a42a;
    }

    .ribbon-stage.cancelled {
      color: #596679;
      text-decoration: line-through;
    }

    .ribbon-stage.cancelled span {
      background: #eef1f5;
      border-color: #c5ced9;
    }

    .ribbon-stage.cancelled::before {
      background: #596679;
    }

    .ribbon-stage.active {
      color: var(--navy);
    }

    .ribbon-stage.active span {
      background: var(--yellow);
      border-color: var(--yellow-dark);
      box-shadow: 0 10px 22px rgba(199, 154, 0, 0.22);
    }

    .ribbon-stage.stage-break {
      margin-left: 13px;
    }

    .ribbon-stage small {
      font-family: var(--font-body);
      color: currentColor;
      opacity: 0.66;
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      position: relative;
      z-index: 3;
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .grid.two {
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .panel {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(6, 27, 58, 0.10);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      min-width: 0;
    }

    .panel.flat {
      box-shadow: none;
      background: rgba(255, 255, 255, 0.78);
    }

    .editorial-band {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 18px;
      padding: 18px;
      background:
        linear-gradient(135deg, rgba(255, 237, 0, 0.28), rgba(255, 255, 255, 0.90)),
        white;
      border: 1px solid #eadb5a;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .editorial-title {
      font-family: var(--font-title);
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .editorial-note {
      color: var(--muted);
      line-height: 1.45;
      margin: 0;
    }

    .editorial-kpi {
      display: grid;
      justify-items: end;
      gap: 4px;
      font-weight: 900;
      color: var(--navy);
      text-align: right;
    }

    .panel-title {
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 18px;
      line-height: 1.1;
      font-family: var(--font-title);
      text-transform: uppercase;
    }

    .panel-title small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      background: white;
      border: 1px solid var(--line);
      border-top: 4px solid var(--yellow);
      border-radius: var(--radius);
      padding: 14px;
      min-height: 92px;
      display: grid;
      align-content: space-between;
      gap: 8px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .metric-value {
      font-family: var(--font-title);
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
    }

    .metric-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .classification-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 12px;
    }

    .classification-card {
      min-width: 0;
      min-height: 154px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
      padding: 14px;
      border-radius: var(--radius);
      border: 1px solid rgba(6, 27, 58, 0.10);
      background:
        linear-gradient(135deg, rgba(255, 237, 0, 0.12), rgba(255, 255, 255, 0) 48%),
        white;
      box-shadow: 0 14px 34px rgba(6, 27, 58, 0.08);
      overflow: hidden;
    }

    .classification-card.green {
      background:
        linear-gradient(135deg, rgba(20, 128, 86, 0.15), rgba(255, 255, 255, 0) 50%),
        white;
    }

    .classification-card.polka {
      background:
        radial-gradient(circle at 18% 22%, rgba(216, 28, 35, 0.18) 0 9px, transparent 10px),
        radial-gradient(circle at 86% 16%, rgba(216, 28, 35, 0.16) 0 8px, transparent 9px),
        radial-gradient(circle at 72% 78%, rgba(216, 28, 35, 0.13) 0 10px, transparent 11px),
        white;
    }

    .classification-card.white {
      background:
        linear-gradient(135deg, rgba(0, 91, 170, 0.10), rgba(255, 255, 255, 0) 46%),
        white;
    }

    .classification-card.team {
      background:
        linear-gradient(135deg, rgba(6, 27, 58, 0.08), rgba(255, 237, 0, 0.16)),
        white;
    }

    .classification-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .classification-body {
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr);
      align-items: center;
      gap: 11px;
    }

    .classification-visual {
      width: 86px;
      height: 86px;
      display: grid;
      place-items: center;
      border-radius: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      overflow: visible;
    }

    .classification-visual img {
      width: 82px;
      height: 82px;
      object-fit: contain;
      display: block;
    }

    .classification-visual.wide img {
      width: 88px;
      height: 62px;
      object-fit: contain;
      border-radius: 0;
    }

    .classification-name {
      min-width: 0;
      font-family: var(--font-title);
      font-size: 22px;
      font-weight: 900;
      line-height: 0.98;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .classification-note {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.25;
    }

    .ranking-list {
      display: grid;
      gap: 10px;
    }

    .ranking-row {
      display: grid;
      grid-template-columns: 52px minmax(170px, 0.82fr) minmax(200px, 1.4fr) minmax(230px, 0.62fr);
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 8px 24px rgba(6, 27, 58, 0.05);
    }

    .general-ranking-row {
      grid-template-columns: 58px minmax(180px, 0.78fr) minmax(180px, 1.35fr) minmax(210px, 0.46fr);
      padding: 14px;
      border-left: 5px solid var(--yellow);
      background:
        linear-gradient(90deg, rgba(255, 237, 0, 0.08), rgba(255, 255, 255, 0) 38%),
        white;
    }

    .general-ranking-row .player-name {
      font-size: 17px;
    }

    .general-ranking-row .score-cell {
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f7fbff;
      grid-template-columns: auto 92px;
      gap: 9px;
    }

    .general-ranking-row .score-main {
      font-size: 28px;
    }

    .general-ranking-row .gap-list {
      width: 92px;
      min-width: 92px;
      gap: 4px;
    }

    .general-ranking-row .gap-item {
      grid-template-columns: 1fr;
      justify-items: center;
      min-height: 31px;
      gap: 2px;
      padding: 4px 7px;
    }

    .general-ranking-row .gap-label {
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      text-align: center;
      font-size: 8.5px;
      line-height: 1;
      letter-spacing: 0;
    }

    .general-ranking-row .gap-value {
      font-size: 13.5px;
    }

    .rank-badge {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: white;
      background: var(--navy);
      font-weight: 900;
      position: relative;
      flex: 0 0 auto;
    }

    .rank-badge.gold {
      background: linear-gradient(135deg, #f4c35b, #b97917);
    }

    .rank-badge.silver {
      background: linear-gradient(135deg, #dedede, #8d969c);
    }

    .rank-badge.bronze {
      background: linear-gradient(135deg, #d99b5f, #945228);
    }

    .player-cell {
      min-width: 0;
    }

    .player-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
      min-width: 0;
      flex-wrap: wrap;
    }

    .player-name span.name {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .name-awards {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      flex-wrap: wrap;
      min-width: max-content;
    }

    .award-badge {
      width: 37px;
      height: 37px;
      display: inline-grid;
      place-items: center;
      border-radius: 0;
      background: transparent;
      border: 0;
      box-shadow: none;
      overflow: visible;
      flex: 0 0 auto;
    }

    .award-badge.stage-win {
      background: transparent;
    }

    .award-badge img {
      width: 37px;
      height: 37px;
      object-fit: contain;
      display: block;
    }

    .award-badge.team-leader {
      width: 52px;
      height: 37px;
      border-radius: 0;
      background: transparent;
    }

    .award-badge.team-leader img {
      width: 52px;
      height: 37px;
      object-fit: contain;
      object-position: center;
    }

    .color-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex: 0 0 auto;
      border: 2px solid white;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.14);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 5px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 22px;
      padding: 4px 7px;
      border-radius: 99px;
      background: #edf2f8;
      color: var(--navy);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .tag.pink {
      color: var(--navy);
      background: var(--pink-soft);
    }

    .tag.blue {
      color: var(--blue);
      background: var(--blue-soft);
    }

    .tag.green {
      color: var(--green);
      background: var(--green-soft);
    }

    .tag.red {
      color: var(--red);
      background: var(--red-soft);
    }

    .change-count-chip,
    .change-score {
      border: 1px solid transparent;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }

    .change-level-0 {
      background: #080808 !important;
      color: white !important;
      border-color: #080808 !important;
    }

    .change-level-low {

    .chart-wrap {
      width: 100%;
      min-height: 360px;
      overflow: hidden;
      position: relative;
    }

    .chart-svg {
      width: 100%;
      height: 360px;
      display: block;
      background:
        linear-gradient(90deg, rgba(6, 27, 58, 0.035) 1px, transparent 1px),
        linear-gradient(180deg, rgba(6, 27, 58, 0.035) 1px, transparent 1px),
        linear-gradient(135deg, rgba(255, 237, 0, 0.08), rgba(255, 255, 255, 0) 42%),
        white;
      background-size: 54px 54px, 54px 54px, auto, auto;

    .wide-chart-panel {
      padding-left: 0;
      padding-right: 0;
      overflow: hidden;
    }

    .wide-chart-panel .legend {
      padding-left: 18px;
      padding-right: 18px;
    }

    .wide-chart-panel .chart-svg {
      border-left: 0;
      border-right: 0;
      border-radius: 0;
    }

    .chart-grid {
      stroke: rgba(6, 27, 58, 0.10);
      stroke-width: 1;
    }

    .chart-axis {
      stroke: rgba(6, 27, 58, 0.28);
      stroke-width: 1.4;
    }

    .chart-label {
      fill: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .line-path {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: opacity 160ms ease, stroke-width 160ms ease, filter 160ms ease;
    }

    .chart-point {
      stroke: white;
      stroke-width: 2;
      transition: opacity 160ms ease, r 160ms ease;
    }

    .chart-series {
      transition: opacity 160ms ease;
    }

    .chart-hit-line {
      fill: none;
      stroke: transparent;
      stroke-width: 16;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: stroke;
    }

    .chart-svg.has-hover .chart-series {
      opacity: 0.16;
    }

    .chart-svg.has-hover .chart-series.active {
      opacity: 1;
    }

    .chart-svg.has-hover .chart-series.active .line-path {
      stroke-width: 5;
      filter: drop-shadow(0 3px 5px rgba(6, 27, 58, 0.20));
    }

    .chart-svg.has-hover .chart-series.active .chart-point {
      r: 5.5;
    }

    .chart-tooltip {

      top: 0;

      font-weight: 900;

      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfdff;
    }

    .jersey-entry-card img {
      width: 46px;
      height: 46px;
      object-fit: contain;
    }

    .jersey-entry-card label {
      display: grid;
      gap: 5px;
    }

    .jersey-entry-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 99px;
      background: #edf2f8;
      color: #4e454c;
      font-size: 13px;
      font-weight: 900;
    }

    .status-pill.done {
      background: var(--green-soft);
      color: var(--green);
    }

    .status-pill.saving {
      background: #fff4e1;
      color: #9f6610;
    }

    .status-pill.error {
      background: #fff1f1;
      color: var(--red);
    }

    .status-pill.local {
      background: #edf2f8;
      color: var(--navy);
    }

    .status-pill.cancelled {
      background: var(--navy-2);
      color: white;
    }

    .entry-notice {
      display: grid;
      gap: 5px;
      margin-bottom: 14px;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid #f2d7a6;
      background: #fff8eb;
      color: #5f4216;
    }

    .entry-notice.done {
      border-color: #b8e4d1;
      background: var(--green-soft);
      color: var(--green);
    }

    .entry-notice.cancelled {
      border-color: var(--navy-2);
      background: var(--navy-2);
      color: white;
    }

    .entry-notice-title {
      font-weight: 900;
    }

    .entry-notice-copy {
      font-size: 13px;
      line-height: 1.35;
    }

    .toggle-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
      color: var(--navy);
      user-select: none;
    }

    .toggle-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--pink);
    }

    .settings-grid {
      display: grid;
      gap: 12px;
    }

    .settings-row {
      display: grid;
      grid-template-columns: 1.1fr 0.8fr 120px 86px 40px;
      gap: 10px;
      align-items: center;
      padding: 10px;
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .settings-row .input,
    .settings-row .select {
      width: 100%;
    }

    .settings-row input[type="color"] {
      width: 100%;
      height: 38px;
      padding: 3px;
    }

    .icon-button {
      width: 38px;
      height: 38px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      color: white;
      background: var(--navy);
    }

    .icon-button.danger {
      background: var(--red);
    }

    .action-row,
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .toolbar {
      margin-bottom: 14px;
      min-width: 0;
    }

    .primary-btn,
    .secondary-btn,
    .danger-btn {
      min-height: 40px;
      padding: 9px 13px;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
    }

    .primary-btn {
      background: var(--pink);
      color: var(--navy);
      box-shadow: 0 12px 24px rgba(255, 237, 0, 0.28);
    }

    .secondary-btn {
      background: white;
      color: var(--navy);
      border: 1px solid var(--line);
    }

    .danger-btn {
      background: var(--red);
      color: white;
    }

    .primary-btn:disabled,
    .secondary-btn:disabled,
    .danger-btn:disabled,
    .icon-button:disabled,
    .input:disabled,
    .select:disabled {
      opacity: 0.52;
      cursor: not-allowed;
      box-shadow: none;
    }

    .secondary-btn.disabled-label {
      opacity: 0.52;
      cursor: not-allowed;
      pointer-events: none;
    }

    .edit-lock {
      border-color: #eadb5a;
      background: linear-gradient(135deg, rgba(255, 237, 0, 0.18), rgba(255, 255, 255, 0.94));
      box-shadow: none;
    }

    .empty-state {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed #b9c7d8;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.72);
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 100;
      max-width: 320px;
      padding: 12px 14px;
      background: var(--navy);
      color: white;
      border-radius: var(--radius);
      font-weight: 800;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.22);
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 1180px) {
      .grid.two,
      .grid.three,
      .detail-filter-panel,
      .entry-shell {
        grid-template-columns: 1fr;
      }

      .metric-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .classification-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .ranking-row {
        grid-template-columns: 44px minmax(0, 1fr);
      }

      .general-ranking-row {
        grid-template-columns: 44px minmax(0, 1fr);
      }

      .ranking-row .bar-track,
      .ranking-row .score-cell {
        grid-column: 1 / -1;
      }

      .score-cell {
        grid-template-columns: auto minmax(150px, 1fr);
        justify-content: start;
        justify-items: start;
        text-align: left;
      }

      .change-event {
        grid-template-columns: 1fr;
      }

      .change-event-riders {
        grid-template-columns: minmax(0, 1fr);
      }

      .change-arrow {
        justify-self: start;
      }
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: sticky;
        top: 0;
        height: auto;
        padding: 10px 12px;
      }

      .brand {
        grid-template-columns: 46px 1fr;
        min-height: 54px;
        padding: 4px 4px 8px;
      }

      .brand > div {

      }

      .brand-logo {
        width: 46px;
        height: 46px;
      }

      .nav {
        display: flex;
        overflow-x: auto;
        max-width: 100%;
        padding-bottom: 5px;
      }

      .nav-section,
      .nav-subnav {
        display: flex;
        gap: 7px;
        flex: 0 0 auto;
        min-width: max-content;
      }

      .nav-section-title {
        display: none;
      }

      .nav-button {
        grid-template-columns: 22px max-content;
        min-width: max-content;
      }

      .sidebar-footer {
        display: none;
      }

      .main {
        padding: 22px 14px 34px;
      }

      .editorial-band {
        grid-template-columns: 1fr;
      }

      .editorial-kpi {
        justify-items: start;
        text-align: left;
      }

      .topbar {
        align-items: center;
      }

      .topbar-side {
        justify-items: end;
      }

      .top-logo {
        display: none;
      }

      .stage-shell {
        grid-template-columns: 1fr;
      }

      .stage-list {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .settings-row {
        grid-template-columns: 1fr;
      }

      .entry-row {
        grid-template-columns: 42px minmax(0, 1fr);
      }

      .entry-row .select,
      .entry-row .entry-team-preview,
      .entry-row .tag {
        grid-column: 2;
      }

      .toolbar .input,
      .toolbar .select,
      .toolbar .primary-btn,
      .toolbar .secondary-btn {
        width: 100%;
      }
    }

    @media (max-width: 640px) {
      .metric-grid {
        grid-template-columns: 1fr;
      }

      .classification-grid {
        grid-template-columns: 1fr;
      }

      .stage-list {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .score-input-row {
        grid-template-columns: 1fr;
      }

      .score-input-row input {
        text-align: left;
      }

      .jersey-entry-grid {
        grid-template-columns: 1fr;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .topbar-side {
        width: 100%;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        justify-items: start;
      }

      .updated-pill {
        white-space: normal;
      }

      .score-cell {
        grid-template-columns: 1fr;
      }

      .gap-list {
        min-width: 0;
      }

      .leader-strip {
        grid-template-columns: 64px 1fr;
      }

      .leader-strip img {
        width: 64px;
        height: 64px;
      }

      .rider-row,
      .shared-head {
        grid-template-columns: 44px minmax(0, 1fr);
      }

      .rider-row .count-pill,
      .shared-head .count-pill {
        grid-column: 2;
        width: max-content;
      }
    }
  </style>
</head>

        cancelled: false,
        greenJerseyPlayerId: "",
        polkaJerseyPlayerId: "",

      }));

      for (const stage of stages) {
        for (const player of players) {
          stage.scores[player.id] = randomScore();
        }
      }

      return {

    function slugify(value) {
      return value
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || "joueur";
    }

    function uniqueId(base, existingIds) {
      let id = slugify(base);
      let suffix = 2;
      while (existingIds.has(id)) {
        id = slugify(base) + "-" + suffix;
        suffix += 1;
      }
      return id;
    }


    function clone(value) {

    function riderSortName(name) {
      const parts = name.trim().split(/\s+/);
      if (parts.length < 2) return name;
      return `${parts[parts.length - 1]} ${parts.slice(0, -1).join(" ")}`;
    }

    function riderById(id) {

    function buildDefaultRiderTeams(players) {
      return {
        assignments: buildDemoRiderAssignments(players),

        changeHistory: []
      };

    function buildDemoRiderAssignments(players) {
      const assignments = {};
      players.forEach((player, index) => {
        assignments[player.id] = demoRiderEntriesForIndex(index);
      });
      return assignments;
    }

    function demoRiderEntriesForIndex(playerIndex) {
      const anchors = ["uae-tadej-pogacar", "alpecin-jasper-philipsen", "visma-jonas-vingegaard", "lidl-jonathan-milan", "redbull-primoz-roglic", "alpecin-mathieu-van-der-poel", "uae-adam-yates", "pinarello-tom-pidcock"];
      const riderIds = RIDERS.map((rider) => rider.id);
      const used = new Set();
      const picks = [];
      const anchorA = anchors[playerIndex % anchors.length];
      const anchorB = anchors[(playerIndex + 3) % anchors.length];

      for (const id of [anchorA, anchorB]) {
        if (riderById(id) && !used.has(id)) {
          picks.push(entryFromRiderId(id));
          used.add(id);
        }
      }

      let cursor = playerIndex * 11;
      while (picks.length < RIDERS_PER_FANTASY_TEAM && riderIds.length) {
        const id = riderIds[cursor % riderIds.length];
        cursor += 13;
        if (used.has(id)) continue;
        picks.push(entryFromRiderId(id));
        used.add(id);
      }

      return picks;
    }

    function entryFromRiderId(id) {
      const rider = riderById(id) || RIDERS[0];
      return {
        riderId: rider?.id || "",
        name: rider?.name || "",
        teamId: rider?.teamId || TEAMS[0].id
      };
    }

    function normalizeChangeHistoryEntry(entry) {
      const previous = entry.previous || {};
      const next = entry.next || {};
      const previousRider = riderById(previous.riderId);
      const nextRider = riderById(next.riderId);
      return {
        id: entry.id || uniqueId("change", new Set()),
        at: entry.at || new Date().toISOString(),
        playerId: entry.playerId || "",
        playerName: entry.playerName || "Joueur",
        slot: Math.max(1, Math.round(Number(entry.slot) || 1)),
        previous: {
          riderId: previous.riderId || previousRider?.id || "",
          name: previous.name || previousRider?.name || "Coureur",
          teamId: previous.teamId || previousRider?.teamId || TEAMS[0].id
        },
        next: {
          riderId: next.riderId || nextRider?.id || "",
          name: next.name || nextRider?.name || "Coureur",
          teamId: next.teamId || nextRider?.teamId || TEAMS[0].id
        }
      };
    }

    function normalizeRiderTeams(value, players, fallback) {
      const safeValue = value && typeof value === "object" ? value : {};
      const sourceAssignments = safeValue.assignments && typeof safeValue.assignments === "object" ? safeValue.assignments : {};
      const defaultAssignments = fallback?.assignments || buildDemoRiderAssignments(players);
      const normalized = {
        assignments: {},
        abandonedRiderIds: Array.isArray(safeValue.abandonedRiderIds)
          ? Array.from(new Set(safeValue.abandonedRiderIds.filter((id) => riderById(id))))
          : clone(fallback?.abandonedRiderIds || []),
        changeCounts: {},
        changeHistory: []
      };
      const playerIds = new Set(players.map((player) => player.id));
      normalized.changeHistory = Array.isArray(safeValue.changeHistory)
        ? safeValue.changeHistory.filter((entry) => entry && playerIds.has(entry.playerId)).map(normalizeChangeHistoryEntry)
        : clone(fallback?.changeHistory || []);

      players.forEach((player, playerIndex) => {
        const source = Array.isArray(sourceAssignments[player.id]) ? sourceAssignments[player.id] : defaultAssignments[player.id];
        normalized.assignments[player.id] = Array.from({ length: RIDERS_PER_FANTASY_TEAM }, (_, index) => {
          const entry = source?.[index] || {};
          const byId = riderById(entry.riderId);
          const byName = RIDERS.find((item) => normalizeRiderName(item.name) === normalizeRiderName(entry.name || ""));
          const selected = byId || byName || demoRiderEntriesForIndex(playerIndex)[index] || RIDERS[index % RIDERS.length];
          return entryFromRiderId(selected.riderId || selected.id);
        });
        const rawCount = safeValue.changeCounts?.[player.id] ?? fallback?.changeCounts?.[player.id] ?? 0;
        normalized.changeCounts[player.id] = Math.max(0, Math.round(Number(rawCount) || 0));
      });

      return normalized;
    }

    function riderFromEntry(entry) {
      const safeEntry = entry || {};
      const selected = riderById(safeEntry.riderId);
      if (selected) return {
        riderId: selected.id,
        name: selected.name,
        teamId: selected.teamId,
        status: selected.status || "",
        stars: Number(selected.stars) || 0,
        abandoned: isRiderAbandoned(selected.id)
      };
      const fallback = RIDERS[0];
      return {
        riderId: fallback?.id || "",
        name: safeEntry.name || fallback?.name || "",
        teamId: safeEntry.teamId || fallback?.teamId || TEAMS[0].id,
        status: fallback?.status || "",
        stars: Number(fallback?.stars) || 0,
        abandoned: isRiderAbandoned(fallback?.id || "")
      };
    }

    function isRiderAbandoned(riderId) {
      return state?.data?.riderTeams?.abandonedRiderIds?.includes(riderId) || false;
    }

    function allRiderEntries() {
      const assignments = state.data.riderTeams?.assignments || {};
      return state.data.players.flatMap((player) => (assignments[player.id] || []).map((entry, index) => {
        const rider = riderFromEntry(entry);
        return {
          player,
          rider,
          index,
          key: rider.riderId || normalizeRiderName(rider.name)
        };
      })).filter((entry) => entry.rider.name.trim());
    }

    function normalizeRiderName(name) {
      return String(name || "").trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }

    function riderGroups() {
      const groups = new Map();
      for (const entry of allRiderEntries()) {
        if (!groups.has(entry.key)) groups.set(entry.key, []);
        groups.get(entry.key).push(entry);
      }
      return Array.from(groups.values()).map((entries) => {
        const first = entries[0];
        return {
          key: first.key,
          name: first.rider.name,
          team: teamById(first.rider.teamId),
          entries,
          count: entries.length,
          abandoned: entries.some((entry) => entry.rider.abandoned),
          managers: entries.map((entry) => entry.player)
        };
      }).sort((a, b) => {
        if (b.count !== a.count) return b.count - a.count;
        return a.name.localeCompare(b.name, "fr");
      });
    }

    function sharedRiderGroups() {
      return riderGroups().filter((group) => group.count > 1);
    }

    function abandonedRiderGroups() {
      return riderGroups().filter((group) => group.abandoned);
    }

    function riderChangeCounts() {
      return state.data.riderTeams?.changeCounts || {};
    }

    function riderChangeCount(playerId) {
      return Math.max(0, Math.round(Number(riderChangeCounts()[playerId]) || 0));
    }

    function changeLevelClass(count) {
      if (count <= 0) return "change-level-0";
      if (count <= 2) return "change-level-low";
      if (count <= 5) return "change-level-medium";
      if (count === 6) return "change-level-high";
      if (count === 7) return "change-level-alert";
      return "change-level-max";
    }

    function riderChangeRows() {
      const rows = state.data.players.map((player) => ({
        player,
        count: riderChangeCount(player.id)
      })).sort((a, b) => {
        if (b.count !== a.count) return b.count - a.count;
        return a.player.name.localeCompare(b.player.name, "fr");
      });
      rows.forEach((row) => {
        row.rank = 1 + rows.filter((other) => other.count > row.count).length;
      });
      return rows;
    }

    function totalRiderChanges() {
      return state.data.players.reduce((sum, player) => sum + riderChangeCount(player.id), 0);
    }

    function countCompositionChanges(previousEntries, nextEntries) {
      const length = Math.max(previousEntries?.length || 0, nextEntries?.length || 0);
      let changes = 0;
      for (let index = 0; index < length; index += 1) {
        const previousId = riderFromEntry(previousEntries?.[index]).riderId;
        const nextId = riderFromEntry(nextEntries?.[index]).riderId;
        if (previousId !== nextId) changes += 1;
      }
      return changes;
    }

    function compositionChangeRecords(player, previousEntries, nextEntries) {
      const now = new Date().toISOString();
      const length = Math.max(previousEntries?.length || 0, nextEntries?.length || 0);
      const records = [];
      for (let index = 0; index < length; index += 1) {
        const previous = riderFromEntry(previousEntries?.[index]);
        const next = riderFromEntry(nextEntries?.[index]);
        if (previous.riderId === next.riderId) continue;
        records.push({
          id: player.id + "-change-" + Date.now() + "-" + index,
          at: now,
          playerId: player.id,
          playerName: player.name,
          slot: index + 1,
          previous: {
            riderId: previous.riderId,
            name: previous.name,
            teamId: previous.teamId
          },
          next: {
            riderId: next.riderId,
            name: next.name,
            teamId: next.teamId
          }
        });
      }
      return records;
    }

    async function initSupabase() {
      if (!window.supabase || !SUPABASE_CONFIG.url || !SUPABASE_CONFIG.key) {
        setSyncStatus("local", "Supabase non chargé");
        return;
      }
      state.supabaseClient = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.key, {
        auth: {
          persistSession: true,
          autoRefreshToken: true,
          detectSessionInUrl: true,
          flowType: "implicit"
        }
      });
      state.supabaseClient.auth.onAuthStateChange((_event, session) => {
        state.supabaseUser = session?.user || null;
        if (!state.supabaseUser) state.cloudLoaded = false;
        setSyncStatus(state.supabaseUser ? "saved" : "local", state.supabaseUser ? "Connecté au cloud" : "Non connecté");
        renderApp();
        if (state.supabaseUser) loadCloudData();
      });
      await handleAuthRedirectFromUrl();
      const { data: sessionData } = await state.supabaseClient.auth.getSession();
      state.supabaseUser = sessionData?.session?.user || null;
      if (state.supabaseUser) setSyncStatus("saved", "Connecté au cloud");
      await loadCloudData();
    }

    async function handleAuthRedirectFromUrl() {
      if (!state.supabaseClient) return;
      const url = new URL(window.location.href);
      const code = url.searchParams.get("code");
      const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ""));
      const accessToken = hashParams.get("access_token");
      const refreshToken = hashParams.get("refresh_token");
      const authError = url.searchParams.get("error_description") || hashParams.get("error_description");

      if (authError) {
        setSyncStatus("error", decodeURIComponent(authError.replace(/\+/g, " ")));
        return;
      }

      try {
        if (accessToken && refreshToken) {
          const { error } = await state.supabaseClient.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken
          });
          if (error) throw error;
          cleanAuthUrl();
          return;
        }

        if (code) {
          const { error } = await state.supabaseClient.auth.exchangeCodeForSession(code);
          if (error) throw error;
          cleanAuthUrl(["code"]);
        }
      } catch (error) {
        console.error(error);
        setSyncStatus("error", "Connexion non finalisée");
      }
    }

    function cleanAuthUrl(paramsToRemove = []) {
      const url = new URL(window.location.href);
      for (const param of paramsToRemove) url.searchParams.delete(param);
      const cleanSearch = url.searchParams.toString();
      const cleanUrl = url.pathname + (cleanSearch ? "?" + cleanSearch : "");
      window.history.replaceState({}, document.title, cleanUrl);
    }

    async function loadCloudData() {
      if (!state.supabaseClient || state.isLoadingCloud) return;
      state.isLoadingCloud = true;
      if (state.supabaseUser) state.cloudLoaded = false;
      setSyncStatus("saving", "Chargement cloud");
      try {
        const { data, error } = await state.supabaseClient
          .from(SUPABASE_CONFIG.table)
          .select("data, updated_at")
          .eq("id", SUPABASE_CONFIG.dashboardId)
          .maybeSingle();

        if (error) throw error;
        if (data?.data) {
          state.data = normalizeData(data.data);
          const seeded = seedRandomScoresIfNeeded(state.data);
          saveLocalData();
          resetSelectionsAfterDataChange();
          state.cloudLoaded = true;
          setSyncStatus("saved", seeded ? "Données test générées" : "Données cloud chargées");
          renderApp();
          if (seeded) queueCloudSave(true);
          return;
        }
        setSyncStatus(state.supabaseUser ? "saving" : "local", state.supabaseUser ? "Aucune donnée cloud" : "Connecte-toi pour sauvegarder");
        if (state.supabaseUser) {
          state.cloudLoaded = true;
          queueCloudSave(true);
        }
      } catch (error) {
        console.error(error);
        setSyncStatus("error", "Cloud indisponible");
      } finally {
        state.isLoadingCloud = false;
      }
    }

    function queueCloudSave(immediate = false) {
      if (!state.supabaseClient) {
        setSyncStatus("local", "Mode local");
        return;
      }
      if (!state.supabaseUser) {
        setSyncStatus("local", "Non connecté au cloud");
        return;
      }
      if (!state.cloudLoaded) {
        setSyncStatus("saving", "Chargement cloud");
        return;
      }
      window.clearTimeout(state.saveTimer);
      setSyncStatus("saving", "Sauvegarde en cours");
      state.saveTimer = window.setTimeout(saveCloudData, immediate ? 0 : 700);
    }

    async function saveCloudData() {
      if (!state.supabaseClient || !state.supabaseUser || state.isSavingCloud) return;
      state.isSavingCloud = true;
      try {
        const payload = {
          id: SUPABASE_CONFIG.dashboardId,
          data: state.data,
          updated_at: new Date().toISOString()
        };
        const { error } = await state.supabaseClient
          .from(SUPABASE_CONFIG.table)
          .upsert(payload, { onConflict: "id" });
        if (error) throw error;
        setSyncStatus("saved", "Sauvegardé dans Supabase");
      } catch (error) {
        console.error(error);
        setSyncStatus("error", "Sauvegarde cloud refusée");
      } finally {
        state.isSavingCloud = false;
      }
    }

    function resetSelectionsAfterDataChange() {
      const playerIds = new Set(state.data.players.map((player) => player.id));
      state.selectedPlayers = new Set(state.data.players.filter((player) => state.selectedPlayers.has(player.id) || !state.selectedPlayers.size).map((player) => player.id));
      if (!state.selectedPlayers.size) state.selectedPlayers = new Set(playerIds);
      if (!playerIds.has(state.selectedDetailPlayerId)) state.selectedDetailPlayerId = state.data.players[0]?.id || null;
      if (!state.data.stages.some((stage) => stage.id === state.selectedStageId)) state.selectedStageId = state.data.stages[0]?.id || "s1";
      state.data.riderTeams = normalizeRiderTeams(state.data.riderTeams, state.data.players, buildDefaultRiderTeams(state.data.players));
      if (!playerIds.has(state.selectedRiderPlayerId)) state.selectedRiderPlayerId = state.data.players[0]?.id || null;
    }

    function setSyncStatus(status, message) {
      state.syncStatus = status;
      state.syncMessage = message;
      renderSidebarSummary();
      if (state.activePage === "settings") renderCloudPanelOnly();
    }

    function normalizeData(data) {
      const fallback = createDemoData();
      const normalized = {
        version: 1,
        raceName: data.raceName || fallback.raceName,
        players: Array.isArray(data.players) ? data.players : fallback.players,
        stages: Array.isArray(data.stages) ? data.stages : fallback.stages,
        rules: data.rules || fallback.rules,
        riderTeams: data.riderTeams || fallback.riderTeams,
        previewScoresSeeded: Boolean(data.previewScoresSeeded),
        previewScoresBatch: data.previewScoresBatch || "",
        updatedAt: data.updatedAt || new Date().toISOString()
      };
      normalized.players = normalized.players.map((player, index) => ({
        id: player.id || uniqueId(player.name || "Joueur " + (index + 1), new Set()),
        name: player.name || "Joueur " + (index + 1),
        team: player.team || "",
        whiteEligible: Boolean(player.whiteEligible),
        color: player.color || PLAYER_COLORS[index % PLAYER_COLORS.length]
      }));
      const playerIds = new Set(normalized.players.map((player) => player.id));
      const sourceStages = normalized.stages;
      normalized.stages = Array.from({ length: 21 }, (_, index) => {
        const number = index + 1;
        const stageId = "s" + number;
        const stage = sourceStages.find((item) => item && (item.id === stageId || Number(item.number) === number)) || fallback.stages[index];
        const nextStage = {
          id: stageId,
          number,
          name: "Étape " + number,
          cancelled: Boolean(stage.cancelled),
          greenJerseyPlayerId: playerIds.has(stage.greenJerseyPlayerId) ? stage.greenJerseyPlayerId : "",
          polkaJerseyPlayerId: playerIds.has(stage.polkaJerseyPlayerId) ? stage.polkaJerseyPlayerId : "",
          scores: stage.scores && typeof stage.scores === "object" ? stage.scores : {}
        };
        for (const id of playerIds) {
          if (!(id in nextStage.scores)) nextStage.scores[id] = null;
        }
        for (const id of Object.keys(nextStage.scores)) {
          if (!playerIds.has(id)) delete nextStage.scores[id];
          else nextStage.scores[id] = parseScore(nextStage.scores[id]);
        }
        return nextStage;
      });
      if (!normalized.rules.cyclamenStages) normalized.rules.cyclamenStages = fallback.rules.cyclamenStages;
      if (!normalized.rules.blueStages) normalized.rules.blueStages = fallback.rules.blueStages;
      normalized.riderTeams = normalizeRiderTeams(normalized.riderTeams, normalized.players, fallback.riderTeams);
      return normalized;
    }

    function parseScore(value) {
      if (value === "" || value === null || typeof value === "undefined") return null;
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return null;
      return Math.round(parsed);
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("fr-FR").format(Math.round(value || 0));
    }

    function getPlayer(id) {
      return state.data.players.find((player) => player.id === id);
    }

    function completedStages(stages = state.data.stages) {
      return stages.filter((stage) => isStageComplete(stage));
    }

    function isStageComplete(stage) {
      if (stage.cancelled) return true;
      return state.data.players.every((player) => Number.isInteger(stage.scores[player.id]));
    }

    function stageCompletion(stage) {
      if (stage.cancelled) return { status: "cancelled", count: state.data.players.length, total: state.data.players.length };
      const count = state.data.players.filter((player) => Number.isInteger(stage.scores[player.id])).length;
      const total = state.data.players.length;
      return { status: count === total ? "complete" : count === 0 ? "empty" : "partial", count, total };
    }

    function scoreOf(stage, playerId) {
      if (stage.cancelled) return 0;
      return Number.isInteger(stage.scores[playerId]) ? stage.scores[playerId] : 0;
    }

    function totalsForStages(stages) {
      const totals = Object.fromEntries(state.data.players.map((player) => [player.id, 0]));
      for (const stage of stages) {
        for (const player of state.data.players) {
          totals[player.id] += scoreOf(stage, player.id);
        }
      }
      return totals;
    }

    function rankingFromTotals(totals, players = state.data.players) {
      const rows = players.map((player) => ({ player, score: totals[player.id] || 0 }));
      rows.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return a.player.name.localeCompare(b.player.name, "fr");
      });
      for (const row of rows) {
        row.rank = 1 + rows.filter((other) => other.score > row.score).length;
      }
      return rows;
    }

    function overallRanking(stageList = completedStages()) {
      return rankingFromTotals(totalsForStages(stageList));
    }

    function previousMovementMap() {
      const complete = completedStages();
      if (complete.length < 2) return {};
      const current = overallRanking(complete);
      const previous = overallRanking(complete.slice(0, -1));
      const previousRanks = Object.fromEntries(previous.map((row) => [row.player.id, row.rank]));
      return Object.fromEntries(current.map((row) => [row.player.id, (previousRanks[row.player.id] || row.rank) - row.rank]));
    }

    function movementLabel(value) {
      if (value > 0) return { text: "+" + value, className: "up" };
      if (value < 0) return { text: String(value), className: "down" };
      return { text: "=", className: "" };
    }

    function rankBadgeClass(rank) {
      if (rank === 1) return "gold";
      if (rank === 2) return "silver";
      if (rank === 3) return "bronze";
      return "";
    }

    function tieCount(row, ranking) {
      return ranking.filter((other) => other.score === row.score).length;
    }

    function renderTiePill(row, ranking) {
      const count = tieCount(row, ranking);
      return count > 1 ? `<span class="tie-pill">Égalité x${count}</span>` : "";
    }

    function renderGapList(gapLeader, gapPrevious) {
      return `
        <div class="gap-list">
          <div class="gap-item leader-gap">
            <span class="gap-label">Écart vs 1ère place</span>
            <span class="gap-value">${gapLeader === 0 ? "0" : "+" + formatNumber(gapLeader)}</span>
          </div>
          <div class="gap-item previous-gap">
            <span class="gap-label">Écart vs joueur précédent</span>
            <span class="gap-value">${gapPrevious === 0 ? "0" : "+" + formatNumber(gapPrevious)}</span>
          </div>
        </div>
      `;
    }

    function stageRanking(stage) {
      const totals = Object.fromEntries(state.data.players.map((player) => [player.id, scoreOf(stage, player.id)]));
      return rankingFromTotals(totals);
    }

    function evolutionSeries(players = state.data.players) {
      const cumulative = Object.fromEntries(state.data.players.map((player) => [player.id, 0]));
      const points = [];
      const ranks = [];
      for (const stage of state.data.stages) {
        if (!isStageComplete(stage)) continue;
        for (const player of state.data.players) {
          cumulative[player.id] += scoreOf(stage, player.id);
        }
        const ranking = rankingFromTotals(cumulative);
        const rankMap = Object.fromEntries(ranking.map((row) => [row.player.id, row.rank]));
        points.push({
          stage: stage.name,
          values: Object.fromEntries(players.map((player) => [player.id, cumulative[player.id] || 0]))
        });
        ranks.push({
          stage: stage.name,
          values: Object.fromEntries(players.map((player) => [player.id, rankMap[player.id] || null]))
        });
      }
      return { points, ranks };
    }

    function teamNames() {
      return Array.from(new Set(state.data.players.map((player) => player.team).filter(Boolean))).sort((a, b) => a.localeCompare(b, "fr"));
    }

    function teamColor(team) {
      const colors = {
        SALES: "#ffed00",
        "ÉTUDES": "#005baa",
        PRODUIT: "#16805b"
      };
      return colors[team] || "#071a35";
    }

    function teamMembers(team) {
      return state.data.players.filter((player) => player.team === team);
    }

    function teamTotals(stageList = completedStages()) {
      const playerTotals = totalsForStages(stageList);
      return Object.fromEntries(teamNames().map((team) => {
        const members = teamMembers(team);
        const average = members.length ? members.reduce((sum, player) => sum + (playerTotals[player.id] || 0), 0) / members.length : 0;
        return [team, Math.round(average)];
      }));
    }

    function teamRanking(stageList = completedStages()) {
      const totals = teamTotals(stageList);
      const rows = teamNames().map((team) => ({ team, score: totals[team] || 0, members: teamMembers(team) }));
      rows.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return a.team.localeCompare(b.team, "fr");
      });
      for (const row of rows) {
        row.rank = 1 + rows.filter((other) => other.score > row.score).length;
      }
      return rows;
    }

    function teamMovementMap() {
      const complete = completedStages();
      if (complete.length < 2) return {};
      const current = teamRanking(complete);
      const previous = teamRanking(complete.slice(0, -1));
      const previousRanks = Object.fromEntries(previous.map((row) => [row.team, row.rank]));
      return Object.fromEntries(current.map((row) => [row.team, (previousRanks[row.team] || row.rank) - row.rank]));
    }

    function teamEvolutionSeries() {
      const teams = teamNames();
      const points = [];
      const ranks = [];
      for (const stage of state.data.stages) {
        if (!isStageComplete(stage)) continue;
        const completedUntilStage = state.data.stages.slice(0, state.data.stages.indexOf(stage) + 1).filter(isStageComplete);
        const ranking = teamRanking(completedUntilStage);
        const rankMap = Object.fromEntries(ranking.map((row) => [row.team, row.rank]));
        const totals = teamTotals(completedUntilStage);
        points.push({ stage: stage.name, values: Object.fromEntries(teams.map((team) => [team, totals[team] || 0])) });
        ranks.push({ stage: stage.name, values: Object.fromEntries(teams.map((team) => [team, rankMap[team] || null])) });
      }
      return { teams, points, ranks };
    }

    function rankingForRule(stageNumbers, onlyEligible = false) {
      const ids = new Set(stageNumbers.map((number) => "s" + number));
      const ruleStages = state.data.stages.filter((stage) => ids.has(stage.id) && isStageComplete(stage) && !stage.cancelled);
      const players = onlyEligible ? state.data.players.filter((player) => player.whiteEligible) : state.data.players;
      return rankingFromTotals(totalsForStages(ruleStages), players);
    }

    function whiteRanking() {
      return rankingFromTotals(totalsForStages(completedStages()), state.data.players.filter((player) => player.whiteEligible));
    }

    function raceStageRecords() {
      const records = Object.fromEntries(state.data.players.map((player) => [player.id, { wins: 0, podiums: 0, last: 0 }]));
      const raceStages = state.data.stages.filter((stage) => !stage.cancelled && isStageComplete(stage));
      for (const stage of raceStages) {
        const ranking = stageRanking(stage);
        const minScore = Math.min(...ranking.map((row) => row.score));
        for (const row of ranking) {
          if (row.rank === 1) records[row.player.id].wins += 1;
          if (row.rank <= 3) records[row.player.id].podiums += 1;
          if (row.score === minScore) records[row.player.id].last += 1;
        }
      }
      return records;
    }

    function currentTeamLeaderNames() {
      const ranking = teamRanking();
      const leader = ranking[0];
      if (!leader) return new Set();
      return new Set(ranking.filter((row) => row.score === leader.score).map((row) => row.team));
    }

    function renderPlayerBadges(player, records = raceStageRecords(), leaderTeams = currentTeamLeaderNames()) {
      const badges = [];
      const wins = records[player.id]?.wins || 0;
      for (let index = 0; index < wins; index += 1) {
        badges.push(`<span class="award-badge stage-win" title="Victoire d'étape"><img src="Médaille vainqueur étape.png" alt="Victoire d'étape"></span>`);
      }
      if (player.team && leaderTeams.has(player.team)) {
        badges.push(`<span class="award-badge team-leader" title="Équipe leader"><img src="Dossard meilleure équipe.jpg" alt="Équipe leader"></span>`);
      }
      return badges.length ? `<span class="name-awards">${badges.join("")}</span>` : "";
    }

    function latestStageWithManualJersey(field) {
      return state.data.stages
        .filter((stage) => !stage.cancelled && getPlayer(stage[field]))
        .at(-1) || null;
    }

    function latestManualJerseyPlayer(field) {
      const stage = latestStageWithManualJersey(field);
      return stage ? getPlayer(stage[field]) : null;
    }

    function latestStageWinner() {
      const lastRaceStage = completedStages().filter((stage) => !stage.cancelled).at(-1);
      if (!lastRaceStage) return null;
      const winners = stageRanking(lastRaceStage).filter((row) => row.rank === 1).map((row) => row.player);
      return { stage: lastRaceStage, winners };
    }

    function classificationCard({ label, image, value, note = "", className = "", wide = false }) {
      return `
        <article class="classification-card ${className}">
          <div class="classification-label">${escapeHtml(label)}</div>
          <div class="classification-body">
            <div class="classification-visual ${wide ? "wide" : ""}">
              <img src="${escapeAttr(image)}" alt="${escapeAttr(label)}">
            </div>
            <div>
              <div class="classification-name">${escapeHtml(value || "-")}</div>
              ${note ? `<div class="classification-note">${escapeHtml(note)}</div>` : ""}
            </div>
          </div>
        </article>
      `;
    }

    function renderApp() {
      renderNav();
      renderHeader();
      renderSidebarSummary();
      renderStageRibbon();
      document.querySelectorAll(".page").forEach((page) => page.classList.toggle("active", page.id === "page-" + state.activePage));
      const renderers = {
        general: renderGeneral,
        evolutions: renderEvolutions,
        teams: renderTeams,
        details: renderDetails,
        "rider-overview": renderRiderOverview,
        "rider-shared": renderRiderShared,
        "rider-changes": renderRiderChanges,
        entry: renderEntry,
        "rider-entry": renderRiderEntry,
        settings: renderSettings
      };
      const renderer = renderers[state.activePage] || renderGeneral;
      renderer();
    }

    function renderNav() {
      const nav = document.getElementById("nav");
      nav.innerHTML = NAV_SECTIONS.map((section) => `
        <div class="nav-section">
          ${section.title ? `<div class="nav-section-title">${escapeHtml(section.title)}</div>` : ""}
          <div class="nav-subnav">
            ${section.items.map((item) => `
              <button class="nav-button ${state.activePage === item.id ? "active" : ""}" type="button" data-page="${item.id}" title="${escapeHtml(item.label)}">
                <span class="nav-icon">${icon(item.icon)}</span>
                <span>${escapeHtml(item.short)}</span>
              </button>
            `).join("")}
          </div>
        </div>
      `).join("");
      nav.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => {
          state.activePage = button.dataset.page;
          renderApp();
        });

    function renderHeader() {
      const item = NAV_ITEMS.find((navItem) => navItem.id === state.activePage) || NAV_ITEMS[0];
      document.getElementById("pageEyebrow").textContent = "Le Tour";
      document.getElementById("pageTitle").textContent = item.title;
      document.getElementById("pageSubtitle").textContent = item.subtitle;
      const updated = document.getElementById("lastUpdatedTop");
      if (updated) updated.textContent = "Mis à jour " + formatUpdatedAt(state.data.updatedAt);
    }

    function renderSidebarSummary() {
      const complete = completedStages().length;
      const total = state.data.stages.length;
      const ranking = overallRanking();
      const leader = ranking[0];
      document.getElementById("sidebarSummary").innerHTML = `
        <div class="footer-row"><span>Étapes complètes</span><span class="footer-value">${complete}/${total}</span></div>
        <div class="footer-row"><span>Leader</span><span class="footer-value">${leader ? escapeHtml(leader.player.name) : "-"}</span></div>
        <div class="footer-row"><span>Joueurs</span><span class="footer-value">${state.data.players.length}</span></div>
        <div class="footer-row"><span>Cloud</span><span class="footer-value">${escapeHtml(syncShortLabel())}</span></div>
        <div class="footer-row"><span>Version</span><span class="footer-value">${APP_VERSION}</span></div>
      `;
    }

    function renderStageRibbon() {
      const target = document.getElementById("stageRibbon");
      if (!target) return;
      target.innerHTML = state.data.stages.map((stage) => {
        const completion = stageCompletion(stage);
        const label = shortStageLabel(stage.name);
        const statusLabel = stage.cancelled ? "annulée" : completion.status === "complete" ? "ok" : completion.status === "partial" ? completion.count + "/" + completion.total : "vide";
        const breakClass = stage.number === 8 || stage.number === 15 ? "stage-break" : "";
        return `
          <button class="ribbon-stage ${completion.status} ${breakClass} ${stage.id === state.selectedStageId ? "active" : ""}" type="button" data-ribbon-stage="${stage.id}" title="${escapeHtml(stage.name)} - ${escapeHtml(statusLabel)}">
            <span>${escapeHtml(label)}</span>
            <small>${escapeHtml(statusLabel)}</small>
          </button>
        `;
      }).join("");
      target.querySelectorAll("[data-ribbon-stage]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedStageId = button.dataset.ribbonStage;
          state.activePage = "entry";
          renderApp();
        });
      });
    }

    function formatUpdatedAt(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";
      return new Intl.DateTimeFormat("fr-FR", {
        day: "2-digit",
        month: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

      const stageRecords = raceStageRecords();
      const leaderTeams = currentTeamLeaderNames();

      const greenStage = latestStageWithManualJersey("greenJerseyPlayerId");
      const polkaLeader = latestManualJerseyPlayer("polkaJerseyPlayerId");
      const polkaStage = latestStageWithManualJersey("polkaJerseyPlayerId");

      const lastWinner = latestStageWinner();

      page.innerHTML = `
        <div class="classification-grid">
          ${classificationCard({

            className: "yellow"
          })}
          ${classificationCard({
            label: "Maillot Vert",
            image: "Maillot Vert.png",
            value: greenLeader?.name || "À saisir",

          })}

            className: "polka"
          })}
          ${classificationCard({
            label: "Maillot Blanc",
            image: "Maillot Blanc.png",
            value: whiteLeader?.player.name || "-",
            note: "",
            className: "white"
          })}
          ${classificationCard({
            label: "Dernier vainqueur d'étape",

            value: lastWinner?.winners.map((player) => player.name).join(", ") || "-",
            note: lastWinner ? lastWinner.stage.name : "Aucune étape complète",

          })}
          ${classificationCard({
            label: "Meilleure équipe",
            image: "Dossard meilleure équipe.jpg",
            value: teamLeader?.team || "-",
            note: "",
            className: "team",
            wide: true
          })}
        </div>
        <div class="panel">
          <h2 class="panel-title">Classement <small>Écart vs 1ère place et joueur précédent</small></h2>
          ${ranking.length ? `<div class="ranking-list">${ranking.map((row, index) => {
            const gapLeader = leader.score - row.score;
            const previousRow = ranking[index - 1];
            const gapPrevious = previousRow ? previousRow.score - row.score : 0;
            const move = movementLabel(movement[row.player.id] || 0);
            return `
              <article class="ranking-row general-ranking-row">
                <div class="rank-badge ${rankBadgeClass(row.rank)}">${row.rank}</div>
                <div class="player-cell">
                  <div class="player-name">
