    function ensureSelectedPlayers() {
      const currentIds = new Set(state.data.players.map((player) => player.id));
      for (const id of Array.from(state.selectedPlayers)) {
        if (!currentIds.has(id)) state.selectedPlayers.delete(id);
      }
      if (!state.selectedPlayers.size) {
        state.data.players.forEach((player) => state.selectedPlayers.add(player.id));
      }
    }

    function renderLineChart({ type, series, entities, valueLabel, wide = false, rankMax = state.data.players.length }) {
      if (!entities.length) return emptyState("Sélectionne au moins un joueur.");
      if (!series.length) return emptyState("Aucune étape complète pour tracer le graphique.");

      const width = wide ? getMainContentWidth() : 900;
      const height = 360;
      const margin = { top: 24, right: 24, bottom: 48, left: 52 };
      const chartWidth = width - margin.left - margin.right;
      const chartHeight = height - margin.top - margin.bottom;
      const allValues = [];
      for (const point of series) {
        for (const entity of entities) {
          const value = point.values[entity.id || entity.team];
          if (Number.isFinite(value)) allValues.push(value);
        }
      }
      const minValue = type === "rank" ? 1 : Math.min(0, ...allValues);
      const maxValue = type === "rank" ? Math.max(rankMax, ...allValues) : Math.max(1, ...allValues);
      const xFor = (index) => margin.left + (series.length === 1 ? chartWidth / 2 : (index / (series.length - 1)) * chartWidth);
      const yFor = (value) => {
        if (maxValue === minValue) return margin.top + chartHeight / 2;
        if (type === "rank") return margin.top + ((value - minValue) / (maxValue - minValue)) * chartHeight;
        return margin.top + chartHeight - ((value - minValue) / (maxValue - minValue)) * chartHeight;
      };
      const yTicks = type === "rank"
        ? Array.from({ length: Math.min(8, maxValue) }, (_, index) => 1 + Math.round(index * ((maxValue - 1) / Math.max(1, Math.min(8, maxValue) - 1))))
        : makeTicks(minValue, maxValue, 5);
      const xTicks = series.map((point, index) => ({ point, index })).filter((item) => {
        if (series.length <= 8) return true;
        return item.index === 0 || item.index === series.length - 1 || item.index % Math.ceil(series.length / 7) === 0;
      });

      const paths = entities.map((entity) => {
        const key = entity.id || entity.team;
        const coords = series
          .map((point, index) => ({ value: point.values[key], stage: point.stage, x: xFor(index), y: yFor(point.values[key]) }))
          .filter((coord) => Number.isFinite(coord.value));
        const path = coords.map((coord, index) => (index === 0 ? "M" : "L") + coord.x.toFixed(1) + " " + coord.y.toFixed(1)).join(" ");
        const color = entity.color || teamColor(entity.team);
        const label = entity.name || entity.team;
        return `
          <g class="chart-series" data-series-key="${escapeAttr(key)}">
            <path class="line-path" d="${path}" stroke="${color}"></path>
            <path class="chart-hit-line" d="${path}"></path>
            ${coords.map((coord) => {
              const formattedValue = type === "rank" ? "#" + formatNumber(coord.value) : formatNumber(coord.value);
              const tooltip = `${label} · ${coord.stage} · ${valueLabel} : ${formattedValue}`;
              return `<circle class="chart-point" cx="${coord.x.toFixed(1)}" cy="${coord.y.toFixed(1)}" r="4" fill="${color}" data-tooltip="${escapeAttr(tooltip)}"><title>${escapeHtml(tooltip)}</title></circle>`;
            }).join("")}
          </g>
        `;
      }).join("");

      return `
        <svg class="chart-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="${escapeHtml(valueLabel)}">
          ${yTicks.map((tick) => `
            <line class="chart-grid" x1="${margin.left}" y1="${yFor(tick).toFixed(1)}" x2="${width - margin.right}" y2="${yFor(tick).toFixed(1)}"></line>
            <text class="chart-label" x="${margin.left - 10}" y="${yFor(tick).toFixed(1)}" text-anchor="end" dominant-baseline="middle">${type === "rank" ? tick : formatNumber(tick)}</text>
          `).join("")}
          ${xTicks.map(({ point, index }) => `
            <line class="chart-grid" x1="${xFor(index).toFixed(1)}" y1="${margin.top}" x2="${xFor(index).toFixed(1)}" y2="${margin.top + chartHeight}"></line>
            <text class="chart-label" x="${xFor(index).toFixed(1)}" y="${height - 18}" text-anchor="middle">${escapeHtml(shortStageLabel(point.stage))}</text>
          `).join("")}
          <line class="chart-axis" x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${margin.top + chartHeight}"></line>
          <line class="chart-axis" x1="${margin.left}" y1="${margin.top + chartHeight}" x2="${width - margin.right}" y2="${margin.top + chartHeight}"></line>
          ${paths}
        </svg>
        <div class="chart-tooltip" aria-hidden="true"></div>
      `;
    }

    function getMainContentWidth() {
      const main = document.querySelector(".main");
      if (!main) return 900;
      const styles = window.getComputedStyle(main);
      const horizontalPadding = parseFloat(styles.paddingLeft) + parseFloat(styles.paddingRight);
      return Math.max(360, Math.round(main.clientWidth - horizontalPadding - 2));
    }

    function makeTicks(min, max, count) {
      if (max <= min) return [min, max];
      return Array.from({ length: count }, (_, index) => Math.round(min + index * ((max - min) / (count - 1))));
    }

    function shortStageLabel(label) {
      return label.replace("Étape ", "E");
    }

    function renderLegend(entities) {
      return `
        <div class="legend">
          ${entities.map((entity) => `
            <span class="legend-item" tabindex="0" data-series-key="${escapeAttr(entity.id || entity.team)}">
              <span class="color-dot" style="background:${entity.color || teamColor(entity.team)}"></span>
              ${escapeHtml(entity.name || entity.team)}
            </span>
          `).join("")}
        </div>
      `;
    }

    function bindChartHover(root = document) {
      root.querySelectorAll(".wide-chart-panel").forEach((panel) => {
        const svg = panel.querySelector(".chart-svg");
        const legend = panel.querySelector(".legend");
        const chartWrap = panel.querySelector(".chart-wrap");
        const tooltip = panel.querySelector(".chart-tooltip");
        if (!svg) return;
        const setActive = (key) => {
          svg.classList.toggle("has-hover", Boolean(key));
          legend?.classList.toggle("has-hover", Boolean(key));
          svg.querySelectorAll("[data-series-key]").forEach((item) => item.classList.toggle("active", item.dataset.seriesKey === key));
          legend?.querySelectorAll("[data-series-key]").forEach((item) => item.classList.toggle("active", item.dataset.seriesKey === key));
        };
        const showTooltip = (event, text) => {
          if (!tooltip || !chartWrap || !text) return;
          const rect = chartWrap.getBoundingClientRect();
          tooltip.textContent = text;
          tooltip.style.left = Math.min(rect.width - 18, Math.max(8, event.clientX - rect.left)) + "px";
          tooltip.style.top = Math.max(10, event.clientY - rect.top) + "px";
          tooltip.classList.add("show");
        };
        const hideTooltip = () => tooltip?.classList.remove("show");
        panel.querySelectorAll("[data-series-key]").forEach((item) => {
          item.addEventListener("mouseenter", () => setActive(item.dataset.seriesKey));
          item.addEventListener("focus", () => setActive(item.dataset.seriesKey));
          item.addEventListener("mouseleave", () => setActive(""));
          item.addEventListener("blur", () => setActive(""));
        });
        panel.querySelectorAll("[data-tooltip]").forEach((item) => {
          item.addEventListener("mouseenter", (event) => showTooltip(event, item.dataset.tooltip));
          item.addEventListener("mousemove", (event) => showTooltip(event, item.dataset.tooltip));
          item.addEventListener("mouseleave", hideTooltip);
          item.addEventListener("blur", hideTooltip);
        });
      });
    }

    function renderTeamStageTable() {
      const stages = completedStages();
      if (!stages.length) return emptyState("Aucune étape complète.");

      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Équipe</th>
                ${stages.map((stage) => `<th>${escapeHtml(shortStageLabel(stage.name))}</th>`).join("")}

            <tbody>
              ${teams.map((team) => `
                <tr>
                  <td><span class="color-dot" style="background:${teamColor(team)}"></span> ${escapeHtml(team)}</td>
                  ${stages.map((stage) => `<td>${formatNumber(teamStageAverage(team, stage))}</td>`).join("")}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function teamStageAverage(team, stage) {
      const members = teamMembers(team);
      if (!members.length) return 0;
      return Math.round(members.reduce((sum, player) => sum + scoreOf(stage, player.id), 0) / members.length);
    }

    function filteredDetailPlayers() {
      const query = normalizeRiderName(state.detailSearch);
      return state.data.players.filter((player) => {
        const matchesQuery = !query || normalizeRiderName(player.name + " " + player.team).includes(query);
        const matchesStatus =
          state.detailStatusFilter === "team" ? Boolean(player.team) :
          state.detailStatusFilter === "white" ? player.whiteEligible :
          state.detailStatusFilter === "solo" ? !player.team :
          true;
        return matchesQuery && matchesStatus;
      });
    }

    function filteredDetailStages() {
      return state.data.stages.filter((stage) => {
        if (state.detailStageFilter === "completed") return isStageComplete(stage);
        if (state.detailStageFilter === "incomplete") return !isStageComplete(stage);
        return true;
      });
    }

    function renderFullDetailTable(players = state.data.players, stages = state.data.stages) {
      const cumulative = Object.fromEntries(state.data.players.map((player) => [player.id, 0]));
      const stageMaps = [];
      for (const stage of state.data.stages) {
        if (!isStageComplete(stage)) {
          stageMaps.push({ stage, info: null });
          continue;
        }
        const stageRankMap = Object.fromEntries(stageRanking(stage).map((row) => [row.player.id, row.rank]));
        for (const player of state.data.players) cumulative[player.id] += scoreOf(stage, player.id);
        const generalRankMap = Object.fromEntries(rankingFromTotals(cumulative).map((row) => [row.player.id, row.rank]));
        stageMaps.push({ stage, info: { stageRankMap, generalRankMap, cumulative: { ...cumulative } } });
      }
      const infoByStage = Object.fromEntries(stageMaps.map((item) => [item.stage.id, item.info]));
      if (!players.length || !stages.length) return emptyState("Aucun résultat avec ces filtres.");
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Joueur</th>
                ${stages.map((stage) => `<th>${escapeHtml(shortStageLabel(stage.name))}</th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${players.map((player) => `
                <tr>
                  <td><span class="color-dot" style="background:${player.color}"></span> ${escapeHtml(player.name)}</td>
                  ${stages.map((stage) => {
                    const info = infoByStage[stage.id];
                    if (!info) return `<td class="muted">Non saisie</td>`;
                    if (stage.cancelled) return `<td class="muted">Annulée</td>`;
                    return `<td><strong>${formatNumber(scoreOf(stage, player.id))}</strong><br><span class="muted">E${info.stageRankMap[player.id]} · CG${info.generalRankMap[player.id]}</span></td>`;
                  }).join("")}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderPlayerDetail(playerId, stages = state.data.stages) {
      const player = getPlayer(playerId);
      if (!player) return emptyState("Aucun joueur sélectionné.");
      let cumulative = 0;
      const rows = [];
      for (const stage of stages) {
        if (!isStageComplete(stage)) {
          rows.push({ stage, status: "Non saisie" });
          continue;
        }
        const stageRankMap = Object.fromEntries(stageRanking(stage).map((row) => [row.player.id, row.rank]));
        const totalsBeforeRank = totalsForStages(state.data.stages.slice(0, state.data.stages.indexOf(stage) + 1).filter(isStageComplete));
        const generalRankMap = Object.fromEntries(rankingFromTotals(totalsBeforeRank).map((row) => [row.player.id, row.rank]));
        cumulative += scoreOf(stage, player.id);
        rows.push({
          stage,
          points: scoreOf(stage, player.id),
          cumulative,
          stageRank: stage.cancelled ? null : stageRankMap[player.id],
          generalRank: generalRankMap[player.id],
          status: stage.cancelled ? "Annulée" : "OK"
        });
      }
      return `
        <div class="metric-grid">
          ${metric("Total", formatNumber(cumulative), "Points sur étapes complètes")}
          ${metric("Équipe", player.team || "Sans équipe", player.team ? "Compte pour le classement équipe" : "Exclu des équipes")}
          ${metric("Maillot Blanc", player.whiteEligible ? "Éligible" : "Non", player.whiteEligible ? "Inclus dans le classement jeune" : "Non inclus")}
          ${metric("Couleur", player.color, "Trait fixe sur les graphiques")}
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Étape</th>
                <th>Points</th>
                <th>Rang étape</th>
                <th>Cumul</th>
                <th>Rang général</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((row) => `
                <tr>
                  <td>${escapeHtml(row.stage.name)}</td>
                  <td>${row.status === "Non saisie" ? "Non saisie" : row.status === "Annulée" ? "0" : formatNumber(row.points)}</td>
                  <td>${row.stageRank ? row.stageRank : row.status}</td>
                  <td>${Number.isFinite(row.cumulative) ? formatNumber(row.cumulative) : "-"}</td>
                  <td>${row.generalRank || "-"}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderRiderMetrics() {
      const entries = allRiderEntries();
      const uniqueCount = riderGroups().length;
      const shared = sharedRiderGroups();
      const abandoned = abandonedRiderGroups();
      const mostPicked = shared[0];
      return `
        <div class="metric-grid">
          ${metric("Compositions", state.data.players.length, RIDERS_PER_FANTASY_TEAM + " coureurs par joueur")}
          ${metric("Coureurs uniques", uniqueCount, entries.length + " sélections au total")}
          ${metric("Coureurs communs", shared.length, mostPicked ? mostPicked.name + " x" + mostPicked.count : "Aucun doublon")}
          ${metric("Abandons", abandoned.length, riderAbandonmentImpactCount() + " équipe(s) touchée(s)")}
        </div>
      `;
    }

    function renderRiderManagerCards(countMap, abandonedMap, query = "", teamFilter = "") {
      const assignments = state.data.riderTeams?.assignments || {};
      const stageRecords = raceStageRecords();
      const leaderTeams = currentTeamLeaderNames();
      return state.data.players.map((player) => {
        const riders = (assignments[player.id] || []).map(riderFromEntry);
        const visibleRiders = riders.filter((rider) => {
          const haystack = (player.name + " " + rider.name + " " + teamById(rider.teamId).name).toLowerCase();
          const matchQuery = !query || haystack.includes(query.toLowerCase());
          const matchTeam = !teamFilter || rider.teamId === teamFilter;
          return matchQuery && matchTeam;
        });
        if (!visibleRiders.length) return "";
        const abandonedCount = riders.filter((rider) => abandonedMap[rider.riderId]).length;
        const activeCount = Math.max(0, riders.length - abandonedCount);
        const changeCount = riderChangeCount(player.id);
        const starTotal = riders.reduce((sum, rider) => sum + (Number(rider.stars) || 0), 0);
        visibleRiders.sort((a, b) => a.name.localeCompare(b.name, "fr"));
        return `
          <article class="manager-card">
            <div class="manager-head">
              <div>
                <div class="manager-name"><span class="color-dot" style="background:${player.color}"></span><span class="name">${escapeHtml(player.name)}</span>${renderPlayerBadges(player, stageRecords, leaderTeams)}</div>
                <div class="tag-row">
                  <span class="tag green">${activeCount}/${riders.length} en course</span>
                  ${abandonedCount ? `<span class="tag red">${abandonedCount} abandon${abandonedCount > 1 ? "s" : ""}</span>` : ""}
                  <span class="tag change-count-chip ${changeLevelClass(changeCount)}">${changeCount} changement${changeCount > 1 ? "s" : ""}</span>
                </div>
              </div>
              <div class="manager-stars" title="Total étoiles de l'équipe"><span aria-hidden="true">★</span>${formatNumber(starTotal)}</div>
            </div>
            <div class="rider-list">
              ${visibleRiders.map((rider) => renderRiderRow(rider, countMap, abandonedMap)).join("")}
            </div>
          </article>
        `;
      }).join("") || emptyState("Aucun résultat.");
    }

    function renderRiderRow(rider, countMap, abandonedMap) {
      const team = teamById(rider.teamId);
      const abandoned = abandonedMap[rider.riderId] || rider.abandoned;
      const statusClass = abandoned ? "" : riderStatusClass(rider.status);
      return `
        <div class="rider-row ${abandoned ? "abandoned" : ""} ${statusClass}">
          <img class="jersey" src="${team.image}" alt="${escapeHtml(team.name)}">
          <div class="rider-main">
            <div class="rider-name">${escapeHtml(rider.name)}</div>
          </div>
          ${abandoned ? `<span class="count-pill abandoned">AB</span>` : ""}
        </div>
      `;
    }

    function riderStatusClass(status) {
      const classes = {
        LEADER: "rider-status-leader",
        SPRINTER: "rider-status-sprinter",
        GRIMPEUR: "rider-status-grimpeur",
        POLYVALENT: "rider-status-polyvalent"
      };
      return classes[String(status || "").toUpperCase()] || "";
    }

    function applyRiderOverviewFilters() {
      const query = document.getElementById("overviewSearch")?.value.trim() || "";
      const teamFilter = document.getElementById("overviewTeam")?.value || "";
      const groups = riderGroups();
      const countMap = Object.fromEntries(groups.map((group) => [group.key, group.count]));

    function renderRiderSharedCard(group) {
      return `
        <article class="shared-card ${sharedLevelClass(group)}">
          <div class="shared-head">

      if (group.count >= 4) return "shared-high";

      if (group.count >= 4) return "Commun fort";
      if (group.count >= 3) return "Très partagé";
      return "Duo";
    }

    function renderRiderChanges() {
      const page = document.getElementById("page-rider-changes");
      const rows = riderChangeRows();
      const total = totalRiderChanges();
      const activeRows = rows.filter((row) => row.count > 0);
      const leader = activeRows[0];
      const zeroCount = rows.length - activeRows.length;
      const average = rows.length ? Math.round(total / rows.length) : 0;
      const historyRows = riderChangeHistoryRows();
      const latest = historyRows[0];
      page.innerHTML = `
        <div class="metric-grid">
          ${metric("Total changements", total, "Depuis la dernière remise à zéro")}
          ${metric("Joueurs concernés", activeRows.length, zeroCount + " joueur" + (zeroCount > 1 ? "s" : "") + " à 0")}
          ${metric("Plus haut compteur", leader ? leader.player.name : "-", leader ? leader.count + " changement" + (leader.count > 1 ? "s" : "") : "Aucun changement")}
          ${metric("Dernier changement", latest ? latest.player.name : "-", latest ? formatUpdatedAt(latest.at) : "Aucun historique")}
        </div>
        <div class="editorial-band">
          <div>
            <div class="editorial-title">Changements de coureurs</div>
            <p class="editorial-note">Chaque case de coureur modifiée ajoute un changement au joueur concerné et alimente le journal détaillé depuis la dernière remise à zéro.</p>

          <div class="editorial-kpi">
            <span>${total}</span>
            <span>changements</span>
          </div>

          <div class="manager-name"><span class="color-dot" style="background:${row.player.color}"></span>${escapeHtml(row.player.name)}</div>

    function renderRiderChangeHistory(rows) {
      if (!rows.length) return emptyState("Aucun changement enregistré depuis la dernière remise à zéro.");
      return `
        <div class="change-history-list">
          ${rows.slice(0, 80).map((row) => `
            <article class="change-event">
              <div class="change-event-meta">
                <div class="change-event-date">${escapeHtml(formatUpdatedAt(row.at))}</div>
                <div class="manager-name"><span class="color-dot" style="background:${row.player.color}"></span>${escapeHtml(row.player.name)}</div>

              <div class="tag-row">
                ${row.player.team ? `<span class="tag">${escapeHtml(row.player.team)}</span>` : `<span class="tag">Sans équipe</span>`}
              </div>
              <div class="change-event-riders">
                ${renderChangeRiderPill(row.previous, row.previousTeam, false)}
                <span class="change-arrow">→</span>
                ${renderChangeRiderPill(row.next, row.nextTeam, true)}
              </div>
            </article>
          `).join("")}
        </div>

    function renderChangeRiderPill(rider, team, isNew) {

          <img class="jersey" src="${team.image}" alt="${escapeHtml(team.name)}">
          <div class="rider-main">

            <div class="rider-team">${escapeHtml(team.name)}</div>
          </div>
        </div>
      `;
    }

    function riderAbandonmentImpactCount() {
      const abandoned = new Set(abandonedRiderGroups().map((group) => group.key));
      return allRiderEntries().filter((entry) => abandoned.has(entry.key)).length;
    }

        state.selectedRiderPlayerId = state.data.players[0]?.id || null;
      }
      const selected = riderPlayerById(state.selectedRiderPlayerId);
      const assignments = state.data.riderTeams?.assignments || {};
      page.innerHTML = `
        ${renderEditorNotice("modifier les compositions et les abandons")}
        <div class="entry-shell">
          <div class="panel flat">
            <h2 class="panel-title">Joueurs <small>${state.data.players.length} managers</small></h2>
            <div class="manager-list">

                <button class="manager-button ${player.id === selected.id ? "active" : ""}" type="button" data-rider-entry-player="${player.id}">

            <select class="select" id="abandonSelect" ${disabled}>
              ${RIDERS_ALPHABETICAL.map((rider) => `<option value="${rider.id}">${escapeHtml(rider.name)} - ${escapeHtml(teamById(rider.teamId).name)}</option>`).join("")}
            </select>
            <button class="primary-btn" type="button" id="addAbandon" ${disabled}>Marquer abandon</button>
          </div>
          <div class="shared-grid">
            ${renderAbandonChips(canEdit)}
          </div>
        </div>
      `;

      page.querySelectorAll("[data-rider-entry-player]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedRiderPlayerId = button.dataset.riderEntryPlayer;
          renderRiderEntry();
        });
      });
      page.querySelectorAll("[data-rider-id]").forEach((select) => {
        select.addEventListener("change", () => {
          if (!requireEditor()) return;
          const rider = riderById(select.value);
          const team = teamById(rider.teamId);
          const img = document.getElementById("entryJersey-" + select.dataset.riderId);
          const label = document.getElementById("entryTeam-" + select.dataset.riderId);
          const status = document.getElementById("entryStatus-" + select.dataset.riderId);
          if (img) img.src = team.image;
          if (label) label.textContent = team.name;
          if (status) {
            const abandoned = isRiderAbandoned(rider.id);
            status.classList.toggle("red", abandoned);
            status.classList.toggle("green", !abandoned);
            status.textContent = abandoned ? "Abandon" : "En course";
          }
        });
      });
      document.getElementById("saveRiderEntry")?.addEventListener("click", saveRiderEntry);
      document.getElementById("resetChangeCounters")?.addEventListener("click", resetRiderChangeCounters);
      document.getElementById("resetRiderDemo")?.addEventListener("click", resetRiderDemo);
      document.getElementById("addAbandon")?.addEventListener("click", addGlobalAbandon);
      page.querySelectorAll("[data-remove-abandon]").forEach((button) => button.addEventListener("click", () => removeGlobalAbandon(button.dataset.removeAbandon)));
    }

    function renderRiderOptions(selectedId) {
      return RIDERS_ALPHABETICAL.map((rider) => {
        const team = teamById(rider.teamId);
        return `<option value="${rider.id}" ${rider.id === selectedId ? "selected" : ""}>${escapeHtml(rider.name)} - ${escapeHtml(team.name)}</option>`;
      }).join("");
    }

    function saveRiderEntry() {
      if (!requireEditor()) return;
      const rows = Array.from(document.querySelectorAll("#page-rider-entry .entry-row"));
      const playerId = state.selectedRiderPlayerId;
      const player = riderPlayerById(playerId);
      const previousEntries = state.data.riderTeams.assignments[playerId] || [];
      const nextEntries = rows.map((row) => entryFromRiderId(row.querySelector("[data-rider-id]").value));
      const records = compositionChangeRecords(player, previousEntries, nextEntries);
      const changes = records.length;
      state.data.riderTeams.assignments[playerId] = nextEntries;
      if (!state.data.riderTeams.changeCounts) state.data.riderTeams.changeCounts = {};
      if (changes > 0) state.data.riderTeams.changeCounts[playerId] = riderChangeCount(playerId) + changes;
      if (!state.data.riderTeams.changeHistory) state.data.riderTeams.changeHistory = [];
      if (records.length) state.data.riderTeams.changeHistory.unshift(...records);
      saveData();
      showToast(changes > 0 ? "Composition enregistrée : +" + changes + " changement" + (changes > 1 ? "s" : "") + "." : "Composition enregistrée sans changement.");
      renderApp();
    }

    function resetRiderChangeCounters() {
      if (!requireEditor()) return;
      if (!confirm("Réinitialiser tous les compteurs de changements ?")) return;
      state.data.riderTeams.changeCounts = Object.fromEntries(state.data.players.map((player) => [player.id, 0]));
      state.data.riderTeams.changeHistory = [];
      saveData();
      showToast("Compteurs et historique des changements réinitialisés.");
      renderApp();
    }

    function renderAbandonChips(canEdit = isEditor()) {
      const ids = state.data.riderTeams?.abandonedRiderIds || [];
      if (!ids.length) return emptyState("Aucun coureur marqué abandon.");
      return ids
        .map((id) => riderById(id))
        .filter(Boolean)
        .sort((a, b) => a.name.localeCompare(b.name, "fr"))
        .map((rider) => {
          const team = teamById(rider.teamId);
          const impacted = allRiderEntries().filter((entry) => entry.rider.riderId === rider.id).length;
          return `
            <article class="shared-card">
              <div class="shared-head">
                <img class="jersey" src="${team.image}" alt="${escapeHtml(team.name)}">
                <div class="rider-main">
                  <div class="rider-name">${escapeHtml(rider.name)}</div>
                  <div class="rider-team">${escapeHtml(team.name)}</div>
                </div>
                <span class="count-pill abandoned">AB</span>
              </div>
              <div class="toolbar" style="margin:0">
                <span class="tag red">${impacted} équipe(s) touchée(s)</span>
                <button class="secondary-btn" type="button" data-remove-abandon="${rider.id}" ${canEdit ? "" : "disabled"}>Retirer</button>
              </div>
            </article>
          `;
        }).join("");
    }

    function addGlobalAbandon() {
      if (!requireEditor()) return;
      const id = document.getElementById("abandonSelect")?.value;
      if (!id) return;
      if (!state.data.riderTeams.abandonedRiderIds.includes(id)) state.data.riderTeams.abandonedRiderIds.push(id);
      saveData();
      showToast("Abandon appliqué à toutes les équipes.");
      renderApp();
    }

    function removeGlobalAbandon(id) {
      if (!requireEditor()) return;
      state.data.riderTeams.abandonedRiderIds = state.data.riderTeams.abandonedRiderIds.filter((item) => item !== id);
      saveData();
      showToast("Abandon retiré.");
      renderApp();
    }

    function resetRiderDemo() {
      if (!requireEditor()) return;
      if (!confirm("Restaurer les compositions fictives des coureurs ?")) return;
      state.data.riderTeams = buildDefaultRiderTeams(state.data.players);
      saveData();
      showToast("Compositions coureurs restaurées.");
      renderApp();
    }

    function renderEntry() {
      const page = document.getElementById("page-entry");
      const canEdit = isEditor();
      const disabled = editorDisabledAttr();
      const activeStage = state.data.stages.find((stage) => stage.id === state.selectedStageId) || state.data.stages[0];
      state.selectedStageId = activeStage.id;
      const completion = stageCompletion(activeStage);
      const completeClass = completion.status === "complete" ? "done" : completion.status === "cancelled" ? "cancelled" : "";
      const statusText = activeStage.cancelled ? "Étape annulée" : completion.count + "/" + completion.total + " joueurs saisis";

      page.innerHTML = `
        ${renderEditorNotice("saisir ou modifier les points")}
        <div class="stage-shell">
          <div class="panel flat">
            <h2 class="panel-title">Étapes <small>Statut saisie</small></h2>
            <div class="stage-list">
              ${state.data.stages.map((stage) => {
                const status = stageCompletion(stage).status;
                return `<button class="stage-button ${stage.id === activeStage.id ? "active" : ""} ${status}" type="button" data-stage="${stage.id}">${escapeHtml(shortStageLabel(stage.name))}</button>`;
              }).join("")}
            </div>
          </div>
          <div class="panel">
            <div class="stage-toolbar">
              <h2 class="panel-title" style="margin:0">${escapeHtml(activeStage.name)} <small>Saisie étape</small></h2>
              <span class="status-pill ${completeClass}">${statusText}</span>
            </div>
            <div class="stage-toolbar">
              <label class="toggle-row">
                <input type="checkbox" id="stageCancelled" ${activeStage.cancelled ? "checked" : ""} ${disabled}>
                Étape annulée
              </label>
              <button class="secondary-btn" type="button" id="clearStage" ${disabled}>${icon("reset")}Vider cette saisie</button>
            </div>
            <div id="entryStageNotice">${renderEntryStageNotice(activeStage)}</div>
            <div class="jersey-entry-grid">
              ${manualJerseySelect("Maillot Vert", "Maillot Vert.png", "greenJerseyPlayerId", activeStage.greenJerseyPlayerId, activeStage.cancelled || !canEdit)}
              ${manualJerseySelect("Maillot à Pois", "Maillot à Pois.png", "polkaJerseyPlayerId", activeStage.polkaJerseyPlayerId, activeStage.cancelled || !canEdit)}
            </div>
            <div class="score-form">
              ${state.data.players.map((player) => `
                <label class="score-input-row ${activeStage.cancelled ? "disabled" : ""}">
                  <span class="player-name">
                    <span class="color-dot" style="background:${player.color}"></span>
                    <span class="name">${escapeHtml(player.name)}</span>
                    ${player.team ? `<span class="tag">${escapeHtml(player.team)}</span>` : ""}
                  </span>
                  <input class="input" type="number" step="1" min="0" inputmode="numeric" data-score-player="${player.id}" value="${Number.isInteger(activeStage.scores[player.id]) ? activeStage.scores[player.id] : ""}" ${activeStage.cancelled || !canEdit ? "disabled" : ""} placeholder="Non saisi">
                </label>
              `).join("")}
            </div>
          </div>
        </div>
      `;

      page.querySelectorAll("[data-stage]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedStageId = button.dataset.stage;
          renderEntry();
        });
      });
      page.querySelectorAll("[data-score-player]").forEach((input) => {
        input.addEventListener("input", () => {
          if (!requireEditor()) return;
          activeStage.scores[input.dataset.scorePlayer] = parseScore(input.value);
          saveData();
          renderSidebarSummary();
          refreshEntryVisuals(activeStage);
        });
      });
      page.querySelectorAll("[data-manual-jersey]").forEach((select) => {
        select.addEventListener("change", () => {
          if (!requireEditor()) return;
          activeStage[select.dataset.manualJersey] = select.value;
          saveData();
          renderSidebarSummary();
          showToast("Maillot enregistré.");
        });
      });
      document.getElementById("stageCancelled")?.addEventListener("change", (event) => {
        if (!requireEditor()) return;
        activeStage.cancelled = event.target.checked;
        saveData();
        renderEntry();
      });
      document.getElementById("clearStage")?.addEventListener("click", () => {
        if (!requireEditor()) return;
        if (!confirm("Vider les points de " + activeStage.name + " ?")) return;
        activeStage.cancelled = false;
        activeStage.greenJerseyPlayerId = "";
        activeStage.polkaJerseyPlayerId = "";
        for (const player of state.data.players) activeStage.scores[player.id] = null;
        saveData();
        renderEntry();
      });
    }

    function manualJerseySelect(label, image, field, selectedId, disabled) {
      return `
        <div class="jersey-entry-card">
          <img src="${escapeAttr(image)}" alt="${escapeAttr(label)}">
          <label>
            <span class="jersey-entry-label">${escapeHtml(label)}</span>
            <select class="select" data-manual-jersey="${escapeAttr(field)}" ${disabled ? "disabled" : ""}>
              <option value="">À saisir</option>
              ${state.data.players.map((player) => `<option value="${player.id}" ${player.id === selectedId ? "selected" : ""}>${escapeHtml(player.name)}</option>`).join("")}
            </select>
          </label>
        </div>
      `;
    }

    function renderEntryStageNotice(stage) {
      const completion = stageCompletion(stage);
      if (stage.cancelled) {
        return `
          <div class="entry-notice cancelled">
            <div class="entry-notice-title">Étape annulée</div>
            <div class="entry-notice-copy">Cette étape est intégrée à 0 point pour tout le monde et ne bloque pas les classements.</div>
          </div>
        `;
      }
      if (completion.status === "complete") {
        return `
          <div class="entry-notice done">
            <div class="entry-notice-title">Étape complète</div>
            <div class="entry-notice-copy">Tous les joueurs sont saisis : cette étape est intégrée aux classements et graphiques.</div>
          </div>
        `;
      }
      const missing = completion.total - completion.count;
      return `
        <div class="entry-notice">
          <div class="entry-notice-title">Étape incomplète</div>
          <div class="entry-notice-copy">Il manque ${missing} joueur${missing > 1 ? "s" : ""}. Cette étape est ignorée dans les classements et graphiques tant qu’elle n’est pas complète.</div>
        </div>
      `;
    }

    function refreshEntryVisuals(stage) {
      const completion = stageCompletion(stage);
      const status = document.querySelector(".status-pill");
      if (status) {
        status.classList.toggle("done", completion.status === "complete");
        status.classList.toggle("cancelled", completion.status === "cancelled");
        status.textContent = stage.cancelled ? "Étape annulée" : completion.count + "/" + completion.total + " joueurs saisis";
      }
      const notice = document.getElementById("entryStageNotice");
      if (notice) notice.innerHTML = renderEntryStageNotice(stage);
      document.querySelectorAll("[data-stage]").forEach((button) => {
        const buttonStage = state.data.stages.find((item) => item.id === button.dataset.stage);
        const buttonStatus = stageCompletion(buttonStage).status;
        button.classList.remove("complete", "partial", "cancelled", "empty");
        button.classList.add(buttonStatus);
      });
    }

    function renderSettings() {
      const page = document.getElementById("page-settings");
      const disabled = editorDisabledAttr();
      const importLabelClass = isEditor() ? "" : " disabled-label";
      page.innerHTML = `
        ${renderEditorNotice("modifier les joueurs ou les données")}
        <div class="grid two">
          <div class="panel">
            <h2 class="panel-title">Joueurs <small>Ajout, modification, suppression</small></h2>
            <div class="settings-grid">
              ${state.data.players.map((player) => `
                <div class="settings-row" data-settings-player="${player.id}">
                  <input class="input" type="text" value="${escapeAttr(player.name)}" data-player-name="${player.id}" aria-label="Nom" ${disabled}>
                  <input class="input" type="text" value="${escapeAttr(player.team)}" data-player-team="${player.id}" placeholder="Équipe ou vide" aria-label="Équipe" ${disabled}>
                  <label class="toggle-row"><input type="checkbox" data-player-white="${player.id}" ${player.whiteEligible ? "checked" : ""} ${disabled}> Blanc</label>
                  <input class="input" type="color" value="${escapeAttr(player.color)}" data-player-color="${player.id}" aria-label="Couleur" ${disabled}>
                  <button class="icon-button danger" type="button" data-delete-player="${player.id}" title="Supprimer" ${disabled}>${icon("trash")}</button>
                </div>
              `).join("")}
            </div>
            <div class="action-row" style="margin-top:14px">
              <input class="input" type="text" id="newPlayerName" placeholder="Nouveau joueur" ${disabled}>
              <input class="input" type="text" id="newPlayerTeam" placeholder="Équipe" ${disabled}>
              <label class="toggle-row"><input type="checkbox" id="newPlayerWhite" ${disabled}> Blanc</label>
              <button class="primary-btn" type="button" id="addPlayer" ${disabled}>${icon("plus")}Ajouter</button>
            </div>
          </div>
          <div class="panel">
            <h2 class="panel-title">Connexion cloud <small>Supabase</small></h2>
            <div id="cloudPanel">${renderCloudPanel()}</div>
          </div>
          <div class="panel">
            <h2 class="panel-title">Données <small>Cloud + sauvegarde locale</small></h2>
            <div class="action-row">
              <button class="secondary-btn" type="button" id="exportJson">${icon("download")}Exporter JSON</button>
              <label class="secondary-btn${importLabelClass}" for="importJson">${icon("upload")}Importer JSON</label>
              <input class="sr-only" type="file" id="importJson" accept="application/json,.json" ${disabled}>
            </div>
            <div class="action-row" style="margin-top:12px">
              <button class="secondary-btn" type="button" id="restoreDemo" ${disabled}>${icon("reset")}Restaurer démo</button>
              <button class="danger-btn" type="button" id="emptyScores" ${disabled}>${icon("trash")}Vider tous les scores</button>
            </div>
            <p class="subtitle" style="margin-top:14px">Les données sont sauvegardées dans Supabase quand tu es connecté. Une copie locale reste dans ce navigateur pour servir de cache et de secours.</p>
          </div>
        </div>
      `;

      page.querySelectorAll("[data-player-name]").forEach((input) => input.addEventListener("change", () => updatePlayer(input.dataset.playerName, { name: input.value.trim() || "Joueur" })));
      page.querySelectorAll("[data-player-team]").forEach((input) => input.addEventListener("change", () => updatePlayer(input.dataset.playerTeam, { team: input.value.trim().toUpperCase() })));
      page.querySelectorAll("[data-player-white]").forEach((input) => input.addEventListener("change", () => updatePlayer(input.dataset.playerWhite, { whiteEligible: input.checked })));
      page.querySelectorAll("[data-player-color]").forEach((input) => input.addEventListener("change", () => updatePlayer(input.dataset.playerColor, { color: input.value })));
      page.querySelectorAll("[data-delete-player]").forEach((button) => button.addEventListener("click", () => deletePlayer(button.dataset.deletePlayer)));
      document.getElementById("addPlayer")?.addEventListener("click", addPlayer);
      document.getElementById("exportJson")?.addEventListener("click", exportJson);
      document.getElementById("importJson")?.addEventListener("change", importJson);
      document.getElementById("restoreDemo")?.addEventListener("click", restoreDemo);
      document.getElementById("emptyScores")?.addEventListener("click", emptyScores);
      bindCloudPanelEvents();
    }

    function renderCloudPanel() {
      const userEmail = state.supabaseUser?.email || "";
      const statusClass = state.syncStatus === "saved" ? "done" : state.syncStatus === "saving" ? "saving" : state.syncStatus === "error" ? "error" : "local";
      if (userEmail) {
        return `
          <div class="settings-grid">
            <span class="status-pill ${statusClass}">${escapeHtml(state.syncMessage)}</span>
            <p class="subtitle">Connecté avec <strong>${escapeHtml(userEmail)}</strong>. Les modifications sont envoyées automatiquement vers Supabase.</p>
            <div class="action-row">
              <button class="primary-btn" type="button" id="saveCloudNow">${icon("upload")}Sauvegarder maintenant</button>
              <button class="secondary-btn" type="button" id="reloadCloud">${icon("download")}Recharger le cloud</button>
              <button class="secondary-btn" type="button" id="signOutCloud">Déconnexion</button>
            </div>
          </div>
        `;
      }
      return `
        <div class="settings-grid">
          <span class="status-pill ${statusClass}">${escapeHtml(state.syncMessage)}</span>
          <p class="subtitle">Connecte-toi avec l’email autorisé dans Supabase pour que les saisies soient enregistrées en ligne. Si le lien magique ne connecte pas automatiquement, utilise le code reçu par email.</p>
          <div class="action-row">
            <input class="input" type="email" id="cloudEmail" placeholder="email autorisé" value="${escapeAttr(state.pendingEmail)}">
            <button class="primary-btn" type="button" id="sendMagicLink">Envoyer le lien</button>
            <button class="secondary-btn" type="button" id="reloadCloud">${icon("download")}Recharger</button>
          </div>
          <div class="action-row">
            <input class="input" type="text" id="cloudOtp" placeholder="code à 6 chiffres" inputmode="numeric" autocomplete="one-time-code">
            <button class="primary-btn" type="button" id="verifyOtpCode">Valider le code</button>
          </div>
          <div class="action-row">
            <input class="input" type="password" id="cloudPassword" placeholder="mot de passe Supabase" autocomplete="current-password">
            <button class="secondary-btn" type="button" id="signInPassword">Connexion mot de passe</button>
          </div>
        </div>
      `;
    }

    function renderCloudPanelOnly() {
      const panel = document.getElementById("cloudPanel");
      if (!panel) return;
      panel.innerHTML = renderCloudPanel();
      bindCloudPanelEvents();
    }

    function bindCloudPanelEvents() {
      document.getElementById("sendMagicLink")?.addEventListener("click", sendMagicLink);
      document.getElementById("verifyOtpCode")?.addEventListener("click", verifyOtpCode);
      document.getElementById("signInPassword")?.addEventListener("click", signInWithPassword);
      document.getElementById("signOutCloud")?.addEventListener("click", signOutCloud);
      document.getElementById("reloadCloud")?.addEventListener("click", loadCloudData);
      document.getElementById("saveCloudNow")?.addEventListener("click", () => queueCloudSave(true));
    }

    async function sendMagicLink() {
      if (!state.supabaseClient) {
        showToast("Supabase n’est pas chargé.");
        return;
      }
      const input = document.getElementById("cloudEmail");
      const email = input?.value.trim();
      if (!email) {
        showToast("Ajoute ton email.");
        return;
      }
      state.pendingEmail = email;
      setSyncStatus("saving", "Envoi du lien");
      const redirectTo = getAuthRedirectUrl();
      const { error } = await state.supabaseClient.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: redirectTo }
      });
      if (error) {
        console.error(error);
        const message = error.message || "Lien non envoyé";
        setSyncStatus("error", message);
        showToast(message);
        return;
      }
      setSyncStatus("local", "Lien envoyé par email");
      showToast("Lien de connexion envoyé.");
    }

    function getAuthRedirectUrl() {
      const url = new URL(window.location.href);
      url.search = "";
      url.hash = "";
      return url.toString();
    }

    async function verifyOtpCode() {
      if (!state.supabaseClient) {
        showToast("Supabase n’est pas chargé.");
        return;
      }
      const email = document.getElementById("cloudEmail")?.value.trim();
      const token = document.getElementById("cloudOtp")?.value.trim();
      if (!email || !token) {
        showToast("Ajoute l’email et le code reçu.");
        return;
      }
      state.pendingEmail = email;
      setSyncStatus("saving", "Vérification du code");
      const { data, error } = await state.supabaseClient.auth.verifyOtp({
        email,
        token,
        type: "email"
      });
      if (error) {
        console.error(error);
        setSyncStatus("error", "Code refusé");
        showToast("Code refusé ou expiré.");
        return;
      }
      state.supabaseUser = data?.user || data?.session?.user || null;
      setSyncStatus("saved", "Connecté au cloud");
      showToast("Connexion réussie.");
      renderApp();
      queueCloudSave(true);
    }

    async function signInWithPassword() {
      if (!state.supabaseClient) {
        showToast("Supabase n’est pas chargé.");
        return;
      }
      const email = document.getElementById("cloudEmail")?.value.trim();
      const password = document.getElementById("cloudPassword")?.value;
      if (!email || !password) {
        showToast("Ajoute l’email et le mot de passe.");
        return;
      }
      state.pendingEmail = email;
      setSyncStatus("saving", "Connexion en cours");
      const { data, error } = await state.supabaseClient.auth.signInWithPassword({
        email,
        password
      });
      if (error) {
        console.error(error);
        const message = error.message || "Connexion refusée";
        setSyncStatus("error", message);
        showToast(message);
        return;
      }
      state.supabaseUser = data?.user || null;
      setSyncStatus("saved", "Connecté au cloud");
      showToast("Connexion réussie.");
      renderApp();
      queueCloudSave(true);
    }

    async function signOutCloud() {
      if (!state.supabaseClient) return;
      await state.supabaseClient.auth.signOut();
      state.supabaseUser = null;
      setSyncStatus("local", "Déconnecté du cloud");
      renderApp();
    }

    function syncShortLabel() {
      if (state.syncStatus === "saved") return state.supabaseUser ? "Sauvegardé" : "Cloud lu";
      if (state.syncStatus === "saving") return "En cours";
      if (state.syncStatus === "error") return "Erreur";
      return state.supabaseUser ? "Connecté" : "Local";
    }

    function updatePlayer(playerId, patch) {
      if (!requireEditor()) return;
      const player = getPlayer(playerId);
      if (!player) return;
      Object.assign(player, patch);
      saveData();
      showToast("Joueur mis à jour.");
      renderApp();
    }

    function addPlayer() {
      if (!requireEditor()) return;
      const nameInput = document.getElementById("newPlayerName");
      const teamInput = document.getElementById("newPlayerTeam");
      const whiteInput = document.getElementById("newPlayerWhite");
      const name = nameInput.value.trim();
      if (!name) {
        showToast("Ajoute un nom de joueur.");
        return;
      }
      const id = uniqueId(name, new Set(state.data.players.map((player) => player.id)));
      const player = {
        id,
        name,
        team: teamInput.value.trim().toUpperCase(),
        whiteEligible: whiteInput.checked,
        color: PLAYER_COLORS[state.data.players.length % PLAYER_COLORS.length]
      };
      state.data.players.push(player);
      for (const stage of state.data.stages) stage.scores[id] = null;
      if (!state.data.riderTeams) state.data.riderTeams = buildDefaultRiderTeams(state.data.players);
      if (!state.data.riderTeams.assignments) state.data.riderTeams.assignments = {};
      state.data.riderTeams.assignments[id] = demoRiderEntriesForIndex(state.data.players.length - 1);
      if (!state.data.riderTeams.changeCounts) state.data.riderTeams.changeCounts = {};
      state.data.riderTeams.changeCounts[id] = 0;
      state.selectedPlayers.add(id);
      saveData();
      showToast("Joueur ajouté.");
      renderApp();
    }

    function deletePlayer(playerId) {
      if (!requireEditor()) return;
      const player = getPlayer(playerId);
      if (!player) return;
      if (state.data.players.length <= 1) {
        showToast("Il faut garder au moins un joueur.");
        return;
      }
      if (!confirm("Supprimer définitivement " + player.name + " et tous ses scores ?")) return;
      state.data.players = state.data.players.filter((item) => item.id !== playerId);
      for (const stage of state.data.stages) {
        delete stage.scores[playerId];
        if (stage.greenJerseyPlayerId === playerId) stage.greenJerseyPlayerId = "";
        if (stage.polkaJerseyPlayerId === playerId) stage.polkaJerseyPlayerId = "";
      }
      if (state.data.riderTeams?.assignments) delete state.data.riderTeams.assignments[playerId];
      if (state.data.riderTeams?.changeCounts) delete state.data.riderTeams.changeCounts[playerId];
      if (state.data.riderTeams?.changeHistory) state.data.riderTeams.changeHistory = state.data.riderTeams.changeHistory.filter((entry) => entry.playerId !== playerId);
      state.selectedPlayers.delete(playerId);
      if (state.selectedDetailPlayerId === playerId) state.selectedDetailPlayerId = state.data.players[0]?.id || null;
      if (state.selectedRiderPlayerId === playerId) state.selectedRiderPlayerId = state.data.players[0]?.id || null;
      saveData();
      showToast("Joueur supprimé.");
      renderApp();
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(state.data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "fantasy-giro-2026.json";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showToast("Export JSON lancé.");
    }

    function importJson(event) {
      if (!requireEditor()) {
        event.target.value = "";
        return;
      }
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          state.data = normalizeData(JSON.parse(reader.result));
          state.selectedPlayers = new Set(state.data.players.map((player) => player.id));
          state.selectedDetailPlayerId = state.data.players[0]?.id || null;
          state.selectedRiderPlayerId = state.data.players[0]?.id || null;
          saveData();
          showToast("Import terminé.");
          renderApp();
        } catch (error) {
          console.error(error);
          showToast("Import impossible : JSON invalide.");
        }
      };
      reader.readAsText(file);
      event.target.value = "";
    }

    function restoreDemo() {
      if (!requireEditor()) return;
      if (!confirm("Restaurer les données fictives initiales ?")) return;
      state.data = createDemoData();
      state.selectedPlayers = new Set(state.data.players.map((player) => player.id));
      state.selectedStageId = "s1";
      state.selectedDetailPlayerId = state.data.players[0]?.id || null;
      state.selectedRiderPlayerId = state.data.players[0]?.id || null;
      saveData();
      showToast("Données démo restaurées.");
      renderApp();
    }

    function emptyScores() {
      if (!requireEditor()) return;
      if (!confirm("Vider tous les scores et conserver les joueurs ?")) return;
      for (const stage of state.data.stages) {
        stage.cancelled = false;
        stage.greenJerseyPlayerId = "";
        stage.polkaJerseyPlayerId = "";
        for (const player of state.data.players) stage.scores[player.id] = null;
      }
      state.data.previewScoresSeeded = true;
      state.data.previewScoresBatch = TEST_SCORE_BATCH;
      saveData();
      showToast("Scores vidés.");
      renderApp();
    }

    function emptyState(text) {
      return `<div class="empty-state">${escapeHtml(text)}</div>`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    let toastTimer = null;
    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function bootstrap() {
      state.data = loadData();
      seedRandomScoresIfNeeded(state.data);
      state.selectedPlayers = new Set(state.data.players.map((player) => player.id));
      state.selectedDetailPlayerId = state.data.players[0]?.id || null;
      saveData({ localOnly: true });
      renderApp();
      initSupabase();
    }

    bootstrap();
  </script>
</body>
</html>
