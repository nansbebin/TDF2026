<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fantasy Giro 2026</title>
  <style>
    :root {
      --pink: #e83d8a;
      --pink-dark: #b91c68;
      --pink-soft: #fde7f1;
      --cyclamen: #9b1b72;
      --blue: #1368a8;
      --blue-soft: #e5f2fb;
      --white: #ffffff;
      --paper: #f7f4f0;
      --ink: #121116;
      --muted: #6f6870;
      --line: #e8e0de;
      --green: #258b66;
      --green-soft: #e7f5ef;
      --gold: #d39b2a;
      --shadow: 0 18px 48px rgba(39, 29, 36, 0.10);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(232, 61, 138, 0.10), rgba(255, 255, 255, 0) 280px),
        var(--paper);
      min-height: 100vh;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: 278px minmax(0, 1fr);
      min-height: 100vh;
      width: 100%;
    }

    .sidebar {
      position: sticky;
      top: 0;
      align-self: start;
      height: 100vh;
      width: 100%;
      min-width: 0;
      padding: 22px 16px;
      background: rgba(255, 255, 255, 0.92);
      border-right: 1px solid var(--line);
      backdrop-filter: blur(12px);
      display: flex;
      flex-direction: column;
      gap: 18px;
      z-index: 10;
    }

    .brand {
      display: grid;
      grid-template-columns: 58px 1fr;
      align-items: center;
      gap: 12px;
      width: 100%;
      min-width: 0;
      min-height: 68px;
      padding: 8px 8px 14px;
      border-bottom: 1px solid var(--line);
    }

    .brand-logo {
      width: 58px;
      height: 58px;
      object-fit: contain;
    }

    .brand-kicker {
      color: var(--pink-dark);
      text-transform: uppercase;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      margin-bottom: 3px;
    }

    .brand-title {
      font-weight: 900;
      font-size: 19px;
      line-height: 1.04;
      overflow-wrap: anywhere;
    }

    .nav {
      display: grid;
      gap: 7px;
      width: 100%;
      min-width: 0;
    }

    .nav-button {
      display: grid;
      grid-template-columns: 24px 1fr;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      color: #383038;
      background: transparent;
      border-radius: var(--radius);
      text-align: left;
      font-weight: 800;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .nav-button:hover {
      background: #f5eef1;
      transform: translateX(2px);
    }

    .nav-button.active {
      background: var(--pink);
      color: white;
      box-shadow: 0 12px 26px rgba(232, 61, 138, 0.24);
    }

    .nav-icon {
      width: 22px;
      height: 22px;
      display: inline-grid;
      place-items: center;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 12px;
      background: #fff8fb;
      border: 1px solid #f2d5e1;
      border-radius: var(--radius);
      display: grid;
      gap: 8px;
    }

    .footer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .footer-value {
      color: var(--ink);
      font-size: 15px;
      letter-spacing: 0;
      text-transform: none;
    }

    .main {
      min-width: 0;
      padding: 28px clamp(18px, 3vw, 42px) 42px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 26px;
    }

    .title-block {
      display: grid;
      gap: 7px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--pink-dark);
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .eyebrow::before {
      content: "";
      width: 30px;
      height: 3px;
      background: var(--pink);
      border-radius: 99px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 4vw, 56px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      max-width: 820px;
      line-height: 1.5;
      font-size: 15px;
    }

    .top-logo {
      width: clamp(96px, 14vw, 156px);
      max-height: 110px;
      object-fit: contain;
      filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.10));
    }

    .page {
      display: none;
      animation: pageIn 180ms ease;
    }

    .page.active {
      display: grid;
      gap: 22px;
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .grid.two {
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
    }

    .grid.three {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .panel {
      background: rgba(255, 255, 255, 0.90);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      min-width: 0;
    }

    .panel.flat {
      box-shadow: none;
    }

    .panel-title {
      margin: 0 0 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 18px;
      line-height: 1.1;
    }

    .panel-title small {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      min-height: 92px;
      display: grid;
      align-content: space-between;
      gap: 8px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .metric-value {
      font-size: 30px;
      font-weight: 900;
      line-height: 1;
    }

    .metric-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
    }

    .ranking-list {
      display: grid;
      gap: 10px;
    }

    .ranking-row {
      display: grid;
      grid-template-columns: 52px minmax(170px, 0.82fr) minmax(200px, 1.4fr) 158px;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .rank-badge {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: white;
      background: #302b2f;
      font-weight: 900;
      position: relative;
      flex: 0 0 auto;
    }

    .rank-badge.gold {
      background: linear-gradient(135deg, #f4c35b, #b97917);
    }

    .rank-badge.silver {
      background: linear-gradient(135deg, #dedede, #8d969c);
    }

    .rank-badge.bronze {
      background: linear-gradient(135deg, #d99b5f, #945228);
    }

    .player-cell {
      min-width: 0;
    }

    .player-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
      min-width: 0;
    }

    .player-name span.name {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .color-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex: 0 0 auto;
      border: 2px solid white;
      box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.14);
    }

    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 5px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 22px;
      padding: 4px 7px;
      border-radius: 99px;
      background: #f4eff1;
      color: #574e55;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .tag.pink {
      color: var(--pink-dark);
      background: var(--pink-soft);
    }

    .tag.blue {
      color: var(--blue);
      background: var(--blue-soft);
    }

    .bar-track {
      height: 14px;
      background: #f0e8e6;
      border-radius: 99px;
      overflow: hidden;
      position: relative;
    }

    .bar-fill {
      min-width: 5px;
      height: 100%;
      border-radius: 99px;
      background: var(--pink);
    }

    .score-cell {
      display: grid;
      justify-items: end;
      gap: 5px;
      text-align: right;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.25;
    }

    .score-main {
      color: var(--ink);
      font-weight: 900;
      font-size: 21px;
      line-height: 1;
    }

    .movement {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 34px;
      height: 24px;
      padding: 0 8px;
      border-radius: 99px;
      background: #f0e8e6;
      color: #53484f;
      font-size: 12px;
      font-weight: 900;
    }

    .movement.up {
      background: var(--green-soft);
      color: var(--green);
    }

    .movement.down {
      background: #fff1f1;
      color: #c23939;
    }

    .leader-strip {
      display: grid;
      grid-template-columns: 86px 1fr;
      gap: 16px;
      align-items: center;
      padding: 16px;
      background:
        linear-gradient(135deg, rgba(232, 61, 138, 0.16), rgba(255, 255, 255, 0.86)),
        white;
      border: 1px solid #f2cdda;
      border-radius: var(--radius);
    }

    .leader-strip img {
      width: 86px;
      height: 86px;
      object-fit: contain;
    }

    .leader-name {
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
    }

    .leader-copy {
      color: var(--muted);
      line-height: 1.4;
      margin: 0;
    }

    .chart-wrap {
      width: 100%;
      min-height: 360px;
      overflow: hidden;
    }

    .chart-svg {
      width: 100%;
      height: 360px;
      display: block;
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .wide-chart-panel {
      padding-left: 0;
      padding-right: 0;
      overflow: hidden;
    }

    .wide-chart-panel .panel-title,
    .wide-chart-panel .legend {
      padding-left: 18px;
      padding-right: 18px;
    }

    .wide-chart-panel .chart-svg {
      border-left: 0;
      border-right: 0;
      border-radius: 0;
    }

    .chart-grid {
      stroke: #eee4e2;
      stroke-width: 1;
    }

    .chart-axis {
      stroke: #cfc4c1;
      stroke-width: 1.4;
    }

    .chart-label {
      fill: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    .line-path {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chart-point {
      stroke: white;
      stroke-width: 2;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 8px;
      background: white;
      border: 1px solid var(--line);
      border-radius: 99px;
      font-size: 12px;
      font-weight: 800;
    }

    .filter-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .check-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 99px;
      border: 1px solid var(--line);
      background: white;
      font-size: 13px;
      font-weight: 800;
      user-select: none;
    }

    .check-pill input {
      accent-color: var(--pink);
    }

    .jersey-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .jersey-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 15px;
      display: grid;
      gap: 11px;
      min-width: 0;
    }

    .jersey-head {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0;
    }

    .jersey-card img {
      width: 54px;
      height: 54px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .jersey-title {
      font-size: 12px;
      color: var(--muted);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .jersey-leader {
      font-size: 20px;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .mini-ranking {
      display: grid;
      gap: 7px;
    }

    .mini-row {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 7px 0;
      border-top: 1px solid #f1e9e7;
      font-size: 13px;
    }

    .mini-rank {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: white;
      background: #3e383c;
      font-size: 12px;
      font-weight: 900;
    }

    .mini-name {
      font-weight: 900;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .mini-score {
      color: var(--muted);
      font-weight: 900;
    }

    .record-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .record-card {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 15px;
    }

    .record-title {
      display: flex;
      align-items: center;
      gap: 9px;
      margin: 0 0 12px;
      font-size: 17px;
    }

    .medal-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      background: var(--gold);
      flex: 0 0 auto;
    }

    .medal-icon.blue {
      background: var(--blue);
    }

    .medal-icon.dark {
      background: #343036;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: white;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 820px;
      background: white;
    }

    th,
    td {
      padding: 10px 10px;
      border-bottom: 1px solid #efe7e5;
      border-right: 1px solid #f3ecea;
      vertical-align: middle;
      text-align: right;
      white-space: nowrap;
      font-size: 13px;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #fff9fb;
      color: #5f545b;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    td:first-child,
    th:first-child {
      position: sticky;
      left: 0;
      z-index: 3;
      text-align: left;
      background: white;
      font-weight: 900;
      min-width: 160px;
      box-shadow: 1px 0 0 #efe7e5;
    }

    th:first-child {
      background: #fff9fb;
      z-index: 4;
    }

    .muted {
      color: var(--muted);
    }

    .detail-selector {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .select,
    .input {
      min-height: 38px;
      border: 1px solid #d9cecb;
      border-radius: var(--radius);
      background: white;
      padding: 8px 10px;
      color: var(--ink);
      outline: none;
    }

    .input:focus,
    .select:focus {
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(232, 61, 138, 0.16);
    }

    .stage-shell {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 18px;
    }

    .stage-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      align-content: start;
    }

    .stage-button {
      min-height: 44px;
      border-radius: var(--radius);
      background: white;
      border: 1px solid var(--line);
      color: #554c52;
      font-size: 13px;
      font-weight: 900;
      display: grid;
      place-items: center;
      transition: transform 150ms ease, border 150ms ease, background 150ms ease;
    }

    .stage-button:hover {
      transform: translateY(-1px);
      border-color: #d9c6ce;
    }

    .stage-button.active {
      background: var(--pink);
      color: white;
      border-color: var(--pink);
    }

    .stage-button.complete {
      background: var(--green-soft);
      color: var(--green);
      border-color: #b8e4d1;
    }

    .stage-button.cancelled {
      background: #2d2930;
      color: white;
      border-color: #2d2930;
    }

    .stage-button.partial {
      background: #fff4e1;
      color: #9f6610;
      border-color: #f2d7a6;
    }

    .stage-button.active.complete,
    .stage-button.active.cancelled,
    .stage-button.active.partial {
      background: var(--pink);
      color: white;
      border-color: var(--pink);
    }

    .score-form {
      display: grid;
      gap: 11px;
    }

    .score-input-row {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) 140px;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .score-input-row input {
      text-align: right;
      font-weight: 900;
    }

    .score-input-row.disabled {
      opacity: 0.58;
    }

    .stage-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 7px 10px;
      border-radius: 99px;
      background: #f4eff1;
      color: #4e454c;
      font-size: 13px;
      font-weight: 900;
    }

    .status-pill.done {
      background: var(--green-soft);
      color: var(--green);
    }

    .status-pill.saving {
      background: #fff4e1;
      color: #9f6610;
    }

    .status-pill.error {
      background: #fff1f1;
      color: #c23939;
    }

    .status-pill.local {
      background: #f4eff1;
      color: #514850;
    }

    .status-pill.cancelled {
      background: #2d2930;
      color: white;
    }

    .toggle-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
      color: #50464d;
      user-select: none;
    }

    .toggle-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--pink);
    }

    .settings-grid {
      display: grid;
      gap: 12px;
    }

    .settings-row {
      display: grid;
      grid-template-columns: 1.1fr 0.8fr 120px 86px 40px;
      gap: 10px;
      align-items: center;
      padding: 10px;
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
    }

    .settings-row .input,
    .settings-row .select {
      width: 100%;
    }

    .settings-row input[type="color"] {
      width: 100%;
      height: 38px;
      padding: 3px;
    }

    .icon-button {
      width: 38px;
      height: 38px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      color: white;
      background: #342f34;
    }

    .icon-button.danger {
      background: #c23939;
    }

    .action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .primary-btn,
    .secondary-btn,
    .danger-btn {
      min-height: 40px;
      padding: 9px 13px;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
    }

    .primary-btn {
      background: var(--pink);
      color: white;
      box-shadow: 0 12px 24px rgba(232, 61, 138, 0.22);
    }

    .secondary-btn {
      background: white;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    }

    function createDemoData() {
      const players = DEFAULT_PLAYERS.map((player, index) => ({
        id: slugify(player.name),
        name: player.name,
        team: player.team,
        whiteEligible: player.whiteEligible,
        color: PLAYER_COLORS[index % PLAYER_COLORS.length]
      }));

      const stages = Array.from({ length: 21 }, (_, index) => ({
        id: "s" + (index + 1),
        number: index + 1,
        name: "Étape " + (index + 1),
        final: false,
        cancelled: false,
        scores: {}
      }));

      stages.push({
        id: "final",
        number: 22,
        name: "Fin de course",
        final: true,
        cancelled: false,
        scores: {}
      });

      const profiles = {
        Quentin: { base: 355, sprint: 34, climb: 18, final: 1250 },
        Pierre: { base: 340, sprint: 16, climb: 24, final: 980 },
        Nans: { base: 365, sprint: 22, climb: 42, final: 1120 },
        Damien: { base: 348, sprint: 30, climb: 30, final: 1030 },
        Robin: { base: 334, sprint: 12, climb: 48, final: 1080 },
        Mathis: { base: 326, sprint: 26, climb: 37, final: 910 },
        Émilien: { base: 318, sprint: 20, climb: 22, final: 880 },
        Sacha: { base: 351, sprint: 44, climb: 12, final: 940 },
        Agathe: { base: 329, sprint: 24, climb: 32, final: 1010 },
        Lucie: { base: 336, sprint: 38, climb: 19, final: 950 },
        Stella: { base: 322, sprint: 18, climb: 34, final: 900 },
        Charles: { base: 345, sprint: 14, climb: 45, final: 1110 },
        Orlane: { base: 331, sprint: 21, climb: 40, final: 930 },
        Ema: { base: 342, sprint: 36, climb: 21, final: 990 },
        Guillemette: { base: 338, sprint: 28, climb: 39, final: 1040 }
      };

      const sprintStages = new Set([1, 2, 6, 12, 13, 15, 18, 21]);
      const climbStages = new Set([7, 9, 14, 16, 19, 20]);

      for (const stage of stages) {
        for (const [playerIndex, player] of players.entries()) {
          const profile = profiles[player.name];
          if (stage.final) {
            stage.scores[player.id] = profile.final + ((playerIndex % 4) * 35) + wave(playerIndex, 22, 120);
            continue;
          }
          let score = profile.base + wave(playerIndex, stage.number, 115);
          score += sprintStages.has(stage.number) ? profile.sprint * 3 : 0;
          score += climbStages.has(stage.number) ? profile.climb * 3 : 0;
          score += stage.number % 5 === playerIndex % 5 ? 120 : 0;
          score += stage.number % 7 === (playerIndex + 2) % 7 ? -80 : 0;
          stage.scores[player.id] = Math.max(55, Math.round(score));
        }
      }

      return {
        version: 1,
        raceName: "Fantasy Giro 2026",
        players,
        stages,
        rules: {
          cyclamenStages: [1, 2, 6, 12, 13, 15, 18, 21],
          blueStages: [7, 9, 14, 16, 19, 20]
        },
        updatedAt: new Date().toISOString()
      };
    }

    function wave(playerIndex, stageNumber, amplitude) {
      const value = Math.sin((playerIndex + 1) * 1.73 + stageNumber * 0.82) + Math.cos((playerIndex + 2) * 0.91 - stageNumber * 0.41);
      return Math.round(value * amplitude * 0.5);
    }

    function slugify(value) {
      return value
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || "joueur";
    }

    function uniqueId(base, existingIds) {
      let id = slugify(base);
      let suffix = 2;
      while (existingIds.has(id)) {
        id = slugify(base) + "-" + suffix;
        suffix += 1;
      }
      return id;
    }

    function saveData(options = {}) {
      state.data.updatedAt = new Date().toISOString();
      saveLocalData();
      if (!options.localOnly) queueCloudSave();
    }

    function saveLocalData() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
    }

    function loadData() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (!stored) return createDemoData();
      try {
        const parsed = JSON.parse(stored);
        return normalizeData(parsed);
      } catch (error) {
        console.warn(error);
        return createDemoData();
      }
    }

    async function initSupabase() {
      if (!window.supabase || !SUPABASE_CONFIG.url || !SUPABASE_CONFIG.key) {
        setSyncStatus("local", "Supabase non chargé");
        return;
      }
      state.supabaseClient = window.supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.key);
      const { data: sessionData } = await state.supabaseClient.auth.getSession();
      state.supabaseUser = sessionData?.session?.user || null;
      state.supabaseClient.auth.onAuthStateChange((_event, session) => {
        state.supabaseUser = session?.user || null;
        setSyncStatus(state.supabaseUser ? "saved" : "local", state.supabaseUser ? "Connecté au cloud" : "Non connecté");
        renderApp();
        if (state.supabaseUser) queueCloudSave(true);
      });
      await loadCloudData();
    }

    async function loadCloudData() {
      if (!state.supabaseClient) return;
      setSyncStatus("saving", "Chargement cloud");
      try {
        const { data, error } = await state.supabaseClient
          .from(SUPABASE_CONFIG.table)
          .select("data, updated_at")
          .eq("id", SUPABASE_CONFIG.dashboardId)
          .maybeSingle();

        if (error) throw error;
        if (data?.data) {
          state.data = normalizeData(data.data);
          saveLocalData();
          resetSelectionsAfterDataChange();
          setSyncStatus("saved", "Données cloud chargées");
          renderApp();
          return;
        }
        setSyncStatus(state.supabaseUser ? "saving" : "local", state.supabaseUser ? "Aucune donnée cloud" : "Connecte-toi pour sauvegarder");
        if (state.supabaseUser) queueCloudSave(true);
      } catch (error) {
        console.error(error);
        setSyncStatus("error", "Cloud indisponible");
      }
    }

    function queueCloudSave(immediate = false) {
      if (!state.supabaseClient) {
        setSyncStatus("local", "Mode local");
        return;
      }
      if (!state.supabaseUser) {
        setSyncStatus("local", "Non connecté au cloud");
        return;
      }
      window.clearTimeout(state.saveTimer);
      setSyncStatus("saving", "Sauvegarde en cours");
      state.saveTimer = window.setTimeout(saveCloudData, immediate ? 0 : 700);
    }

    async function saveCloudData() {
      if (!state.supabaseClient || !state.supabaseUser || state.isSavingCloud) return;
      state.isSavingCloud = true;
      try {
        const payload = {
          id: SUPABASE_CONFIG.dashboardId,
          data: state.data,
          updated_at: new Date().toISOString()
        };
        const { error } = await state.supabaseClient
          .from(SUPABASE_CONFIG.table)
          .upsert(payload, { onConflict: "id" });
        if (error) throw error;
        setSyncStatus("saved", "Sauvegardé dans Supabase");
      } catch (error) {
        console.error(error);
        setSyncStatus("error", "Sauvegarde cloud refusée");
      } finally {
        state.isSavingCloud = false;
      }
    }

    function resetSelectionsAfterDataChange() {
      const playerIds = new Set(state.data.players.map((player) => player.id));
      state.selectedPlayers = new Set(state.data.players.filter((player) => state.selectedPlayers.has(player.id) || !state.selectedPlayers.size).map((player) => player.id));
      if (!state.selectedPlayers.size) state.selectedPlayers = new Set(playerIds);
      if (!playerIds.has(state.selectedDetailPlayerId)) state.selectedDetailPlayerId = state.data.players[0]?.id || null;
      if (!state.data.stages.some((stage) => stage.id === state.selectedStageId)) state.selectedStageId = state.data.stages[0]?.id || "s1";
    }

    function setSyncStatus(status, message) {
      state.syncStatus = status;
      state.syncMessage = message;
      renderSidebarSummary();
      if (state.activePage === "settings") renderCloudPanelOnly();
    }

    function normalizeData(data) {
      const fallback = createDemoData();
      const normalized = {
        version: 1,
        raceName: data.raceName || fallback.raceName,
        players: Array.isArray(data.players) ? data.players : fallback.players,
        stages: Array.isArray(data.stages) ? data.stages : fallback.stages,
        rules: data.rules || fallback.rules,
        updatedAt: data.updatedAt || new Date().toISOString()
      };
      normalized.players = normalized.players.map((player, index) => ({
        id: player.id || uniqueId(player.name || "Joueur " + (index + 1), new Set()),
        name: player.name || "Joueur " + (index + 1),
        team: player.team || "",
        whiteEligible: Boolean(player.whiteEligible),
        color: player.color || PLAYER_COLORS[index % PLAYER_COLORS.length]
      }));
      const playerIds = new Set(normalized.players.map((player) => player.id));
      normalized.stages = normalized.stages.map((stage, index) => {
        const nextStage = {
          id: stage.id || (index === 21 ? "final" : "s" + (index + 1)),
          number: stage.number || index + 1,
          name: stage.name || (index === 21 ? "Fin de course" : "Étape " + (index + 1)),
          final: Boolean(stage.final || index === 21),
          cancelled: Boolean(stage.cancelled),
          scores: stage.scores && typeof stage.scores === "object" ? stage.scores : {}
        };
        for (const id of playerIds) {
          if (!(id in nextStage.scores)) nextStage.scores[id] = null;
        }
        for (const id of Object.keys(nextStage.scores)) {
          if (!playerIds.has(id)) delete nextStage.scores[id];
          else nextStage.scores[id] = parseScore(nextStage.scores[id]);
        }
        return nextStage;
      });
      if (!normalized.rules.cyclamenStages) normalized.rules.cyclamenStages = fallback.rules.cyclamenStages;
      if (!normalized.rules.blueStages) normalized.rules.blueStages = fallback.rules.blueStages;
      return normalized;
    }

    function parseScore(value) {
      if (value === "" || value === null || typeof value === "undefined") return null;
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return null;
      return Math.round(parsed);
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("fr-FR").format(Math.round(value || 0));
    }

    function getPlayer(id) {
      return state.data.players.find((player) => player.id === id);
    }

    function completedStages(stages = state.data.stages) {
      return stages.filter((stage) => isStageComplete(stage));
    }

    function isStageComplete(stage) {
      if (stage.cancelled) return true;
      return state.data.players.every((player) => Number.isInteger(stage.scores[player.id]));
    }

    function stageCompletion(stage) {
      if (stage.cancelled) return { status: "cancelled", count: state.data.players.length, total: state.data.players.length };
      const count = state.data.players.filter((player) => Number.isInteger(stage.scores[player.id])).length;
      const total = state.data.players.length;
      return { status: count === total ? "complete" : count === 0 ? "empty" : "partial", count, total };
    }

    function scoreOf(stage, playerId) {
      if (stage.cancelled) return 0;
      return Number.isInteger(stage.scores[playerId]) ? stage.scores[playerId] : 0;
    }

    function totalsForStages(stages) {
      const totals = Object.fromEntries(state.data.players.map((player) => [player.id, 0]));
      for (const stage of stages) {
        for (const player of state.data.players) {
          totals[player.id] += scoreOf(stage, player.id);
        }
      }
      return totals;
    }

    function rankingFromTotals(totals, players = state.data.players) {
      const rows = players.map((player) => ({ player, score: totals[player.id] || 0 }));
      rows.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return a.player.name.localeCompare(b.player.name, "fr");
      });
      for (const row of rows) {
        row.rank = 1 + rows.filter((other) => other.score > row.score).length;
      }
      return rows;
    }

    function overallRanking(stageList = completedStages()) {
      return rankingFromTotals(totalsForStages(stageList));
    }

    function previousMovementMap() {
      const complete = completedStages();
      if (complete.length < 2) return {};
      const current = overallRanking(complete);
      const previous = overallRanking(complete.slice(0, -1));
      const previousRanks = Object.fromEntries(previous.map((row) => [row.player.id, row.rank]));
      return Object.fromEntries(current.map((row) => [row.player.id, (previousRanks[row.player.id] || row.rank) - row.rank]));
    }

    function movementLabel(value) {
      if (value > 0) return { text: "+" + value, className: "up" };
      if (value < 0) return { text: String(value), className: "down" };
      return { text: "=", className: "" };
    }

    function rankBadgeClass(rank) {
      if (rank === 1) return "gold";
      if (rank === 2) return "silver";
      if (rank === 3) return "bronze";
      return "";
    }

    function stageRanking(stage) {
      const totals = Object.fromEntries(state.data.players.map((player) => [player.id, scoreOf(stage, player.id)]));
      return rankingFromTotals(totals);
    }

    function evolutionSeries(players = state.data.players) {
      const cumulative = Object.fromEntries(state.data.players.map((player) => [player.id, 0]));
      const points = [];
      const ranks = [];
      for (const stage of state.data.stages) {
        if (!isStageComplete(stage)) continue;
        for (const player of state.data.players) {
          cumulative[player.id] += scoreOf(stage, player.id);
        }
        const ranking = rankingFromTotals(cumulative);
        const rankMap = Object.fromEntries(ranking.map((row) => [row.player.id, row.rank]));
        points.push({
          stage: stage.name,
          values: Object.fromEntries(players.map((player) => [player.id, cumulative[player.id] || 0]))
        });
        ranks.push({
          stage: stage.name,
          values: Object.fromEntries(players.map((player) => [player.id, rankMap[player.id] || null]))
        });
      }
      return { points, ranks };
    }

    function teamNames() {
      return Array.from(new Set(state.data.players.map((player) => player.team).filter(Boolean))).sort((a, b) => a.localeCompare(b, "fr"));
    }

    function teamColor(team) {
      const colors = {
        SALES: "#e83d8a",
        "ÉTUDES": "#1368a8",
        PRODUIT: "#258b66"
      };
      return colors[team] || "#343036";
    }

    function teamMembers(team) {
      return state.data.players.filter((player) => player.team === team);
    }

    function teamTotals(stageList = completedStages()) {
      const playerTotals = totalsForStages(stageList);
      return Object.fromEntries(teamNames().map((team) => {
        const members = teamMembers(team);
        const average = members.length ? members.reduce((sum, player) => sum + (playerTotals[player.id] || 0), 0) / members.length : 0;
        return [team, Math.round(average)];
      }));
    }

    function teamRanking(stageList = completedStages()) {
      const totals = teamTotals(stageList);
      const rows = teamNames().map((team) => ({ team, score: totals[team] || 0, members: teamMembers(team) }));
      rows.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return a.team.localeCompare(b.team, "fr");
      });
      for (const row of rows) {
        row.rank = 1 + rows.filter((other) => other.score > row.score).length;
      }
      return rows;
    }

    function teamMovementMap() {
      const complete = completedStages();
      if (complete.length < 2) return {};
      const current = teamRanking(complete);
      const previous = teamRanking(complete.slice(0, -1));
      const previousRanks = Object.fromEntries(previous.map((row) => [row.team, row.rank]));
      return Object.fromEntries(current.map((row) => [row.team, (previousRanks[row.team] || row.rank) - row.rank]));
    }

    function teamEvolutionSeries() {
      const teams = teamNames();
      const points = [];
      const ranks = [];
      for (const stage of state.data.stages) {
        if (!isStageComplete(stage)) continue;
        const completedUntilStage = state.data.stages.slice(0, state.data.stages.indexOf(stage) + 1).filter(isStageComplete);
        const ranking = teamRanking(completedUntilStage);
        const rankMap = Object.fromEntries(ranking.map((row) => [row.team, row.rank]));
        const totals = teamTotals(completedUntilStage);
        points.push({ stage: stage.name, values: Object.fromEntries(teams.map((team) => [team, totals[team] || 0])) });
        ranks.push({ stage: stage.name, values: Object.fromEntries(teams.map((team) => [team, rankMap[team] || null])) });
      }
      return { teams, points, ranks };
    }

    function rankingForRule(stageNumbers, onlyEligible = false) {
      const ids = new Set(stageNumbers.map((number) => "s" + number));
      const ruleStages = state.data.stages.filter((stage) => ids.has(stage.id) && isStageComplete(stage) && !stage.cancelled);
      const players = onlyEligible ? state.data.players.filter((player) => player.whiteEligible) : state.data.players;
      return rankingFromTotals(totalsForStages(ruleStages), players);
    }

    function whiteRanking() {
      return rankingFromTotals(totalsForStages(completedStages()), state.data.players.filter((player) => player.whiteEligible));
    }

    function raceStageRecords() {
      const records = Object.fromEntries(state.data.players.map((player) => [player.id, { wins: 0, podiums: 0, last: 0 }]));
      const raceStages = state.data.stages.filter((stage) => !stage.final && !stage.cancelled && isStageComplete(stage));
      for (const stage of raceStages) {
        const ranking = stageRanking(stage);
        const minScore = Math.min(...ranking.map((row) => row.score));
        for (const row of ranking) {
          if (row.rank === 1) records[row.player.id].wins += 1;
          if (row.rank <= 3) records[row.player.id].podiums += 1;
          if (row.score === minScore) records[row.player.id].last += 1;
        }
      }
      return records;
    }

      page.innerHTML = `

          ${metric("Joueurs", state.data.players.length, teamNames().length + " équipes actives")}
        </div>
        ${leader ? `
          <div class="leader-strip">
            <img src="Maillot Rose.png" alt="Maillot Rose">
            <div>
              <div class="leader-name">${escapeHtml(leader.player.name)}</div>
              <p class="leader-copy">Porteur virtuel du Maillot Rose avec ${formatNumber(leader.score)} points au classement général.</p>
            </div>
          </div>
        ` : ""}
        <div class="panel">
          <h2 class="panel-title">Classement <small>Écarts au leader et à la place précédente</small></h2>
          ${ranking.length ? `<div class="ranking-list">${ranking.map((row, index) => {
            const gapLeader = leader.score - row.score;
            const previousDistinct = ranking.find((other) => other.score > row.score);
            const gapPrevious = previousDistinct ? previousDistinct.score - row.score : 0;
            const move = movementLabel(movement[row.player.id] || 0);
            return `
              <article class="ranking-row">
                <div class="rank-badge ${rankBadgeClass(row.rank)}">${row.rank}</div>
                <div class="player-cell">
                  <div class="player-name">
                    <span class="color-dot" style="background:${row.player.color}"></span>
                    <span class="name">${escapeHtml(row.player.name)}</span>
                    <span class="movement ${move.className}">${move.text}</span>
                  </div>
                  <div class="tag-row">
                    ${row.player.team ? `<span class="tag">${escapeHtml(row.player.team)}</span>` : `<span class="tag">Sans équipe</span>`}
                    ${row.player.whiteEligible ? `<span class="tag blue">Maillot Blanc</span>` : ""}
                  </div>
                </div>
                <div class="bar-track"><div class="bar-fill" style="width:${Math.max(3, (row.score / maxScore) * 100)}%; background:${row.player.color}"></div></div>
                <div class="score-cell">
                  <div class="score-main">${formatNumber(row.score)} pts</div>
                  <div>Leader : ${gapLeader === 0 ? "0" : "+" + formatNumber(gapLeader)}</div>
                  <div>Devant : ${gapPrevious === 0 ? "0" : "+" + formatNumber(gapPrevious)}</div>
                </div>
              </article>
            `;
          }).join("")}</div>` : emptyState("Aucun classement disponible.")}
        </div>
      `;
    }

    function metric(label, value, note) {
      return `
        <div class="metric">
          <div class="metric-label">${escapeHtml(label)}</div>
          <div class="metric-value">${escapeHtml(String(value))}</div>
          <div class="metric-note">${escapeHtml(String(note))}</div>
        </div>
      `;
    }

    function renderEvolutions() {
      const page = document.getElementById("page-evolutions");
      ensureSelectedPlayers();
      const players = state.data.players.filter((player) => state.selectedPlayers.has(player.id));
      const series = evolutionSeries(players);
      page.innerHTML = `
        <div class="panel flat">
          <h2 class="panel-title">Joueurs visibles <small>Sélection individuelle</small></h2>
          <div class="filter-list">
            ${state.data.players.map((player) => `
              <label class="check-pill">
                <input type="checkbox" data-player-filter="${player.id}" ${state.selectedPlayers.has(player.id) ? "checked" : ""}>
                <span class="color-dot" style="background:${player.color}"></span>
                ${escapeHtml(player.name)}
              </label>
            `).join("")}
          </div>
        </div>
        <div class="grid">
          <div class="panel wide-chart-panel">
            <h2 class="panel-title">Évolution des places <small>Rang 1 en haut</small></h2>
            <div class="chart-wrap">${renderLineChart({
              type: "rank",
              series: series.ranks,
              entities: players,
              valueLabel: "Rang",
              wide: true
            })}</div>
            ${renderLegend(players)}
          </div>
          <div class="panel wide-chart-panel">
            <h2 class="panel-title">Cumul de points <small>Étapes complètes uniquement</small></h2>
            <div class="chart-wrap">${renderLineChart({
              type: "points",
              series: series.points,
              entities: players,
              valueLabel: "Points",
              wide: true
            })}</div>
            ${renderLegend(players)}
          </div>
        </div>
      `;
      page.querySelectorAll("[data-player-filter]").forEach((checkbox) => {
        checkbox.addEventListener("change", () => {
          if (checkbox.checked) state.selectedPlayers.add(checkbox.dataset.playerFilter);
          else state.selectedPlayers.delete(checkbox.dataset.playerFilter);
          renderEvolutions();
        });
      });
    }

    function ensureSelectedPlayers() {
      const currentIds = new Set(state.data.players.map((player) => player.id));
      for (const id of Array.from(state.selectedPlayers)) {
        if (!currentIds.has(id)) state.selectedPlayers.delete(id);
      }
      if (!state.selectedPlayers.size) {
        state.data.players.forEach((player) => state.selectedPlayers.add(player.id));
      }
    }

    function renderLineChart({ type, series, entities, valueLabel, wide = false, rankMax = state.data.players.length }) {
      if (!entities.length) return emptyState("Sélectionne au moins un joueur.");
      if (!series.length) return emptyState("Aucune étape complète pour tracer le graphique.");

      const width = wide ? getMainContentWidth() : 900;
      const height = 360;
      const margin = { top: 24, right: 24, bottom: 48, left: 52 };
      const chartWidth = width - margin.left - margin.right;
      const chartHeight = height - margin.top - margin.bottom;
      const allValues = [];
      for (const point of series) {
        for (const entity of entities) {
          const value = point.values[entity.id || entity.team];
          if (Number.isFinite(value)) allValues.push(value);
        }
      }
      const minValue = type === "rank" ? 1 : Math.min(0, ...allValues);
      const maxValue = type === "rank" ? Math.max(rankMax, ...allValues) : Math.max(1, ...allValues);
      const xFor = (index) => margin.left + (series.length === 1 ? chartWidth / 2 : (index / (series.length - 1)) * chartWidth);
      const yFor = (value) => {
        if (maxValue === minValue) return margin.top + chartHeight / 2;
        if (type === "rank") return margin.top + ((value - minValue) / (maxValue - minValue)) * chartHeight;
        return margin.top + chartHeight - ((value - minValue) / (maxValue - minValue)) * chartHeight;
      };
      const yTicks = type === "rank"
        ? Array.from({ length: Math.min(8, maxValue) }, (_, index) => 1 + Math.round(index * ((maxValue - 1) / Math.max(1, Math.min(8, maxValue) - 1))))
        : makeTicks(minValue, maxValue, 5);
      const xTicks = series.map((point, index) => ({ point, index })).filter((item) => {
        if (series.length <= 8) return true;
        return item.index === 0 || item.index === series.length - 1 || item.index % Math.ceil(series.length / 7) === 0;
      });

      const paths = entities.map((entity) => {
        const key = entity.id || entity.team;
        const coords = series
          .map((point, index) => ({ value: point.values[key], x: xFor(index), y: yFor(point.values[key]) }))
          .filter((coord) => Number.isFinite(coord.value));
        const path = coords.map((coord, index) => (index === 0 ? "M" : "L") + coord.x.toFixed(1) + " " + coord.y.toFixed(1)).join(" ");
        const color = entity.color || teamColor(entity.team);
        return `
          <path class="line-path" d="${path}" stroke="${color}"></path>
          ${coords.map((coord) => `<circle class="chart-point" cx="${coord.x.toFixed(1)}" cy="${coord.y.toFixed(1)}" r="4" fill="${color}"><title>${escapeHtml(entity.name || entity.team)} - ${escapeHtml(series[coords.indexOf(coord)]?.stage || "")} : ${formatNumber(coord.value)}</title></circle>`).join("")}
        `;
      }).join("");

      return `
        <svg class="chart-svg" viewBox="0 0 ${width} ${height}" role="img" aria-label="${escapeHtml(valueLabel)}">
          ${yTicks.map((tick) => `
            <line class="chart-grid" x1="${margin.left}" y1="${yFor(tick).toFixed(1)}" x2="${width - margin.right}" y2="${yFor(tick).toFixed(1)}"></line>
            <text class="chart-label" x="${margin.left - 10}" y="${yFor(tick).toFixed(1)}" text-anchor="end" dominant-baseline="middle">${type === "rank" ? tick : formatNumber(tick)}</text>
          `).join("")}
          ${xTicks.map(({ point, index }) => `
            <line class="chart-grid" x1="${xFor(index).toFixed(1)}" y1="${margin.top}" x2="${xFor(index).toFixed(1)}" y2="${margin.top + chartHeight}"></line>
            <text class="chart-label" x="${xFor(index).toFixed(1)}" y="${height - 18}" text-anchor="middle">${escapeHtml(shortStageLabel(point.stage))}</text>
          `).join("")}
          <line class="chart-axis" x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${margin.top + chartHeight}"></line>
          <line class="chart-axis" x1="${margin.left}" y1="${margin.top + chartHeight}" x2="${width - margin.right}" y2="${margin.top + chartHeight}"></line>
          ${paths}
        </svg>
      `;
    }

    function getMainContentWidth() {
      const main = document.querySelector(".main");
      if (!main) return 900;
      const styles = window.getComputedStyle(main);
      const horizontalPadding = parseFloat(styles.paddingLeft) + parseFloat(styles.paddingRight);
      return Math.max(360, Math.round(main.clientWidth - horizontalPadding - 2));
    }

    function makeTicks(min, max, count) {
      if (max <= min) return [min, max];
      return Array.from({ length: count }, (_, index) => Math.round(min + index * ((max - min) / (count - 1))));
    }

    function shortStageLabel(label) {
      if (label === "Fin de course") return "Final";
      return label.replace("Étape ", "E");
    }

    function renderLegend(entities) {
      return `
        <div class="legend">
          ${entities.map((entity) => `
            <span class="legend-item">
              <span class="color-dot" style="background:${entity.color || teamColor(entity.team)}"></span>
              ${escapeHtml(entity.name || entity.team)}
            </span>
          `).join("")}
        </div>
      `;
    }

      page.innerHTML = `
        <div class="metric-grid">
          ${metric("Équipe leader", leader ? leader.team : "-", leader ? formatNumber(leader.score) + " pts moyens" : "Aucune équipe")}
        </div>
        <div class="panel">
          <h2 class="panel-title">Classement général par équipe <small>Moyenne cumulée</small></h2>
          <div class="ranking-list">
            ${ranking.map((row) => {
              const gapLeader = leader.score - row.score;
              const previousDistinct = ranking.find((other) => other.score > row.score);
              const gapPrevious = previousDistinct ? previousDistinct.score - row.score : 0;
              const move = movementLabel(movement[row.team] || 0);
              return `
                <article class="ranking-row">
                  <div class="rank-badge ${rankBadgeClass(row.rank)}">${row.rank}</div>
                  <div class="player-cell">
                    <div class="player-name">
                      <span class="color-dot" style="background:${teamColor(row.team)}"></span>

                    </div>
                    <div class="tag-row">

                      <span class="tag pink">${escapeHtml(row.members.map((member) => member.name).join(", "))}</span>
                    </div>
                  </div>
                  <div class="bar-track"><div class="bar-fill" style="width:${Math.max(3, (row.score / maxScore) * 100)}%; background:${teamColor(row.team)}"></div></div>
                  <div class="score-cell">
                    <div class="score-main">${formatNumber(row.score)} pts</div>
                    <div>Leader : ${gapLeader === 0 ? "0" : "+" + formatNumber(gapLeader)}</div>
                    <div>Devant : ${gapPrevious === 0 ? "0" : "+" + formatNumber(gapPrevious)}</div>
                  </div>
                </article>
              `;
            }).join("")}
          </div>
        </div>
        <div class="grid">
          <div class="panel wide-chart-panel">
            <h2 class="panel-title">Évolution des places <small>Classement équipes</small></h2>
            <div class="chart-wrap">${renderLineChart({ type: "rank", series: series.ranks, entities: teamEntities, valueLabel: "Rang équipes", wide: true, rankMax: teamEntities.length })}</div>
            ${renderLegend(teamEntities)}
          </div>
          <div class="panel wide-chart-panel">
            <h2 class="panel-title">Moyenne cumulée <small>Arrondie</small></h2>
            <div class="chart-wrap">${renderLineChart({ type: "points", series: series.points, entities: teamEntities, valueLabel: "Moyenne cumulée", wide: true })}</div>
            ${renderLegend(teamEntities)}
          </div>
        </div>
      `;
    }

    function renderTeamStageTable() {
      const stages = completedStages();
      if (!stages.length) return emptyState("Aucune étape complète.");
      const teams = teamNames();
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Équipe</th>
                ${stages.map((stage) => `<th>${escapeHtml(shortStageLabel(stage.name))}</th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${teams.map((team) => `
                <tr>
                  <td><span class="color-dot" style="background:${teamColor(team)}"></span> ${escapeHtml(team)}</td>
                  ${stages.map((stage) => `<td>${formatNumber(teamStageAverage(team, stage))}</td>`).join("")}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function teamStageAverage(team, stage) {
      const members = teamMembers(team);
      if (!members.length) return 0;
      return Math.round(members.reduce((sum, player) => sum + scoreOf(stage, player.id), 0) / members.length);
    }

    function renderAwards() {
      const page = document.getElementById("page-awards");
      const overall = overallRanking();
      const cyclamen = rankingForRule(state.data.rules.cyclamenStages);
      const blue = rankingForRule(state.data.rules.blueStages);
      const white = whiteRanking();
      const records = raceStageRecords();

      page.innerHTML = `
        <div class="jersey-grid">
          ${renderJerseyCard("Maillot Rose", "Classement général", "Maillot Rose.png", overall)}
          ${renderJerseyCard("Maillot Cyclamen", "Étapes " + state.data.rules.cyclamenStages.join(", "), "Maillot Cyclamen.png", cyclamen)}
          ${renderJerseyCard("Maillot Bleu", "Étapes " + state.data.rules.blueStages.join(", "), "Maillot Bleu.png", blue)}
          ${renderJerseyCard("Maillot Blanc", "Joueurs éligibles, total complet", "Maillot Blanc.png", white)}
        </div>
        <div class="record-grid">

    function renderJerseyCard(title, subtitle, image, ranking) {

            <div>
              <div class="jersey-title">${escapeHtml(title)}</div>

                <span class="mini-rank">${row.rank}</span>
                <span class="mini-name"><span class="color-dot" style="background:${row.player.color}"></span> ${escapeHtml(row.player.name)}</span>

            `).join("") || emptyState("Aucune donnée")}

    function renderRecordCard(title, iconName, key, records) {
      const rows = state.data.players.map((player) => ({
        player,
        score: records[player.id]?.[key] || 0
      })).sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return a.player.name.localeCompare(b.player.name, "fr");
      });
      rows.forEach((row) => {
        row.rank = 1 + rows.filter((other) => other.score > row.score).length;
      });
      return `
        <article class="record-card">
          <h2 class="record-title"><span class="medal-icon ${key === "podiums" ? "blue" : key === "last" ? "dark" : ""}">${icon(iconName)}</span>${escapeHtml(title)}</h2>
          <div class="mini-ranking">
            ${rows.slice(0, 8).map((row) => `
              <div class="mini-row">
                <span class="mini-rank">${row.rank}</span>
                <span class="mini-name"><span class="color-dot" style="background:${row.player.color}"></span> ${escapeHtml(row.player.name)}</span>
                <span class="mini-score">${formatNumber(row.score)}</span>
              </div>
            `).join("")}
          </div>
        </article>
      `;
    }

    function renderDetails() {

    function renderFullDetailTable() {
      const stages = state.data.stages;
      const cumulative = Object.fromEntries(state.data.players.map((player) => [player.id, 0]));
      const stageMaps = [];
      for (const stage of stages) {
        if (!isStageComplete(stage)) {
          stageMaps.push(null);
          continue;
        }
        const stageRankMap = Object.fromEntries(stageRanking(stage).map((row) => [row.player.id, row.rank]));
        for (const player of state.data.players) cumulative[player.id] += scoreOf(stage, player.id);
        const generalRankMap = Object.fromEntries(rankingFromTotals(cumulative).map((row) => [row.player.id, row.rank]));
        stageMaps.push({ stageRankMap, generalRankMap, cumulative: { ...cumulative } });
      }
      return `
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Joueur</th>
                ${stages.map((stage) => `<th>${escapeHtml(shortStageLabel(stage.name))}</th>`).join("")}
              </tr>
            </thead>
            <tbody>
              ${state.data.players.map((player) => `
                <tr>
                  <td><span class="color-dot" style="background:${player.color}"></span> ${escapeHtml(player.name)}</td>
                  ${stages.map((stage, index) => {
                    const info = stageMaps[index];
                    if (!info) return `<td class="muted">Non saisie</td>`;
                    if (stage.cancelled) return `<td class="muted">Annulée</td>`;
                    return `<td><strong>${formatNumber(scoreOf(stage, player.id))}</strong><br><span class="muted">E${info.stageRankMap[player.id]} · CG${info.generalRankMap[player.id]}</span></td>`;
                  }).join("")}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderPlayerDetail(playerId) {
      const player = getPlayer(playerId);
      if (!player) return emptyState("Aucun joueur sélectionné.");
      let cumulative = 0;
      const rows = [];
      for (const stage of state.data.stages) {
        if (!isStageComplete(stage)) {
          rows.push({ stage, status: "Non saisie" });
          continue;
        }
        const stageRankMap = Object.fromEntries(stageRanking(stage).map((row) => [row.player.id, row.rank]));
        const totalsBeforeRank = totalsForStages(state.data.stages.slice(0, state.data.stages.indexOf(stage) + 1).filter(isStageComplete));
        const generalRankMap = Object.fromEntries(rankingFromTotals(totalsBeforeRank).map((row) => [row.player.id, row.rank]));
        cumulative += scoreOf(stage, player.id);
        rows.push({
          stage,
          points: scoreOf(stage, player.id),
          cumulative,
          stageRank: stage.cancelled ? null : stageRankMap[player.id],
          generalRank: generalRankMap[player.id],
          status: stage.cancelled ? "Annulée" : "OK"
        });
      }
      return `
        <div class="metric-grid">
          ${metric("Total", formatNumber(cumulative), "Points sur étapes complètes")}
          ${metric("Équipe", player.team || "Sans équipe", player.team ? "Compte pour le classement équipe" : "Exclu des équipes")}
          ${metric("Maillot Blanc", player.whiteEligible ? "Éligible" : "Non", player.whiteEligible ? "Inclus dans le classement jeune" : "Non inclus")}
          ${metric("Couleur", player.color, "Trait fixe sur les graphiques")}
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Étape</th>
                <th>Points</th>
                <th>Rang étape</th>
                <th>Cumul</th>
                <th>Rang général</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((row) => `
                <tr>
                  <td>${escapeHtml(row.stage.name)}</td>
                  <td>${row.status === "Non saisie" ? "Non saisie" : row.status === "Annulée" ? "0" : formatNumber(row.points)}</td>
                  <td>${row.stageRank ? row.stageRank : row.status}</td>
                  <td>${Number.isFinite(row.cumulative) ? formatNumber(row.cumulative) : "-"}</td>
                  <td>${row.generalRank || "-"}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function renderEntry() {
      const page = document.getElementById("page-entry");
      const activeStage = state.data.stages.find((stage) => stage.id === state.selectedStageId) || state.data.stages[0];
      state.selectedStageId = activeStage.id;

      const completeClass = completion.status === "complete" ? "done" : completion.status === "cancelled" ? "cancelled" : "";
      const statusText = activeStage.cancelled ? "Étape annulée" : completion.count + "/" + completion.total + " joueurs saisis";

      page.innerHTML = `

                return `<button class="stage-button ${stage.id === activeStage.id ? "active" : ""} ${status}" type="button" data-stage="${stage.id}">${escapeHtml(shortStageLabel(stage.name))}</button>`;

            </div>
          </div>
          <div class="panel">
            <div class="stage-toolbar">
              <h2 class="panel-title" style="margin:0">${escapeHtml(activeStage.name)} <small>${activeStage.final ? "Saisie finale" : "Saisie étape"}</small></h2>
              <span class="status-pill ${completeClass}">${statusText}</span>
            </div>
            <div class="stage-toolbar">
              <label class="toggle-row">
                <input type="checkbox" id="stageCancelled" ${activeStage.cancelled ? "checked" : ""}>
                Étape annulée
              </label>
              <button class="secondary-btn" type="button" id="clearStage">${icon("reset")}Vider cette saisie</button>
            </div>
            <div class="score-form">
              ${state.data.players.map((player) => `
                <label class="score-input-row ${activeStage.cancelled ? "disabled" : ""}">
                  <span class="player-name">
                    <span class="color-dot" style="background:${player.color}"></span>
                    <span class="name">${escapeHtml(player.name)}</span>
                    ${player.team ? `<span class="tag">${escapeHtml(player.team)}</span>` : ""}
                  </span>
                  <input class="input" type="number" step="1" min="0" inputmode="numeric" data-score-player="${player.id}" value="${Number.isInteger(activeStage.scores[player.id]) ? activeStage.scores[player.id] : ""}" ${activeStage.cancelled ? "disabled" : ""} placeholder="Non saisi">
                </label>
              `).join("")}
            </div>
          </div>
        </div>
      `;

      page.querySelectorAll("[data-stage]").forEach((button) => {
        button.addEventListener("click", () => {
          state.selectedStageId = button.dataset.stage;
          renderEntry();
        });
      });
      page.querySelectorAll("[data-score-player]").forEach((input) => {
        input.addEventListener("input", () => {
          activeStage.scores[input.dataset.scorePlayer] = parseScore(input.value);

          renderSidebarSummary();
          refreshEntryVisuals(activeStage);
        });
      });
      document.getElementById("stageCancelled")?.addEventListener("change", (event) => {
        activeStage.cancelled = event.target.checked;
        saveData();
        renderEntry();
      });
      document.getElementById("clearStage")?.addEventListener("click", () => {
        if (!confirm("Vider les points de " + activeStage.name + " ?")) return;
        activeStage.cancelled = false;
        for (const player of state.data.players) activeStage.scores[player.id] = null;
        saveData();
        renderEntry();
      });
    }

    function refreshEntryVisuals(stage) {
      const completion = stageCompletion(stage);
      const status = document.querySelector(".status-pill");
      if (status) {
        status.classList.toggle("done", completion.status === "complete");
        status.classList.toggle("cancelled", completion.status === "cancelled");
        status.textContent = stage.cancelled ? "Étape annulée" : completion.count + "/" + completion.total + " joueurs saisis";
      }
      document.querySelectorAll("[data-stage]").forEach((button) => {
        const buttonStage = state.data.stages.find((item) => item.id === button.dataset.stage);
        const buttonStatus = stageCompletion(buttonStage).status;
        button.classList.remove("complete", "partial", "cancelled", "empty");
        button.classList.add(buttonStatus);
      });
    }

        <div class="settings-grid">

    function bindCloudPanelEvents() {
      document.getElementById("sendMagicLink")?.addEventListener("click", sendMagicLink);
      document.getElementById("signOutCloud")?.addEventListener("click", signOutCloud);
      document.getElementById("reloadCloud")?.addEventListener("click", loadCloudData);
      document.getElementById("saveCloudNow")?.addEventListener("click", () => queueCloudSave(true));
    }

    async function sendMagicLink() {
      if (!state.supabaseClient) {
        showToast("Supabase n’est pas chargé.");
        return;
      }
      const input = document.getElementById("cloudEmail");
      const email = input?.value.trim();
      if (!email) {
        showToast("Ajoute ton email.");
        return;
      }
      setSyncStatus("saving", "Envoi du lien");
      const redirectTo = window.location.href.split("#")[0];
      const { error } = await state.supabaseClient.auth.signInWithOtp({
        email,
        options: { emailRedirectTo: redirectTo }
      });
      if (error) {
        console.error(error);
        setSyncStatus("error", "Lien non envoyé");
        showToast("Impossible d’envoyer le lien de connexion.");
        return;
      }
      setSyncStatus("local", "Lien envoyé par email");
      showToast("Lien de connexion envoyé.");
    }

    async function signOutCloud() {
      if (!state.supabaseClient) return;
      await state.supabaseClient.auth.signOut();
      state.supabaseUser = null;
      setSyncStatus("local", "Déconnecté du cloud");
      renderApp();
    }

    function syncShortLabel() {
      if (state.syncStatus === "saved") return "Sauvegardé";
      if (state.syncStatus === "saving") return "En cours";
      if (state.syncStatus === "error") return "Erreur";
      return state.supabaseUser ? "Connecté" : "Local";
    }

    function updatePlayer(playerId, patch) {
      const player = getPlayer(playerId);
      if (!player) return;
      Object.assign(player, patch);
      saveData();
      showToast("Joueur mis à jour.");
      renderApp();
    }

    function addPlayer() {
      const nameInput = document.getElementById("newPlayerName");
      const teamInput = document.getElementById("newPlayerTeam");
      const whiteInput = document.getElementById("newPlayerWhite");
      const name = nameInput.value.trim();
      if (!name) {
        showToast("Ajoute un nom de joueur.");
        return;
      }
      const id = uniqueId(name, new Set(state.data.players.map((player) => player.id)));
      const player = {
        id,
        name,
        team: teamInput.value.trim().toUpperCase(),
        whiteEligible: whiteInput.checked,
        color: PLAYER_COLORS[state.data.players.length % PLAYER_COLORS.length]
      };
      state.data.players.push(player);
      for (const stage of state.data.stages) stage.scores[id] = null;
      state.selectedPlayers.add(id);
      saveData();
      showToast("Joueur ajouté.");
      renderApp();
    }

    function deletePlayer(playerId) {
      const player = getPlayer(playerId);
      if (!player) return;
      if (state.data.players.length <= 1) {
        showToast("Il faut garder au moins un joueur.");
        return;
      }
      if (!confirm("Supprimer définitivement " + player.name + " et tous ses scores ?")) return;
      state.data.players = state.data.players.filter((item) => item.id !== playerId);
      for (const stage of state.data.stages) delete stage.scores[playerId];
      state.selectedPlayers.delete(playerId);
      if (state.selectedDetailPlayerId === playerId) state.selectedDetailPlayerId = state.data.players[0]?.id || null;
      saveData();
      showToast("Joueur supprimé.");
      renderApp();
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(state.data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "fantasy-giro-2026.json";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      showToast("Export JSON lancé.");
    }

    function importJson(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          state.data = normalizeData(JSON.parse(reader.result));
          state.selectedPlayers = new Set(state.data.players.map((player) => player.id));
          state.selectedDetailPlayerId = state.data.players[0]?.id || null;
          saveData();
          showToast("Import terminé.");
          renderApp();
        } catch (error) {
          console.error(error);
          showToast("Import impossible : JSON invalide.");
        }
      };
      reader.readAsText(file);
      event.target.value = "";
    }

      state.data = createDemoData();
      state.selectedPlayers = new Set(state.data.players.map((player) => player.id));
      state.selectedStageId = "s1";
      state.selectedDetailPlayerId = state.data.players[0]?.id || null;
      saveData();
      showToast("Données démo restaurées.");
      renderApp();
    }

    }

    function emptyState(text) {
      return `<div class="empty-state">${escapeHtml(text)}</div>`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    let toastTimer = null;
    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function bootstrap() {
      state.data = loadData();
      state.selectedPlayers = new Set(state.data.players.map((player) => player.id));
      state.selectedDetailPlayerId = state.data.players[0]?.id || null;
      saveData({ localOnly: true });
      renderApp();
      initSupabase();
    }

    bootstrap();
  </script>
</body>
</html>
